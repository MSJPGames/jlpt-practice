<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲーム ・ 日本語の部屋</title>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1C1C1C;
    --text-muted: #6B6560;
    --text-hint: #9E9890;
    --radius: 14px;
    --radius-sm: 10px;
    --game: #3B6D11;
    --game-soft: #EAF3DE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 1rem 3rem;
    -webkit-text-size-adjust: 100%;
  }
  .container { max-width: 480px; margin: 0 auto; }

  .back-link {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 1.25rem;
    font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .back-link:hover { color: var(--text); }

  .app-header { text-align: center; padding: 1rem 0 0.5rem; }
  .app-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-hint); margin-bottom: 8px; }
  .app-title { font-size: 24px; font-weight: 700; letter-spacing: 0.02em; }
  .app-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }

  .list { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 10px; }

  /* ── ゲームバナー（緑＝ゲーム色） ── */
  .play-banner {
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(135deg, #FFFFFF, #F2F7EA);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; text-decoration: none; color: inherit;
    position: relative; overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .play-banner:active { transform: scale(0.98); }
  .play-banner:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .play-banner::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--game); border-radius: 3px 0 0 3px;
  }
  .pb-float { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .pb-float span { position: absolute; font-weight: 800; color: var(--game); opacity: 0.06; }
  .pb-icon {
    width: 52px; height: 52px; border-radius: 13px; flex-shrink: 0;
    background: var(--game-soft); color: var(--game);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800;
  }
  .pb-info { flex: 1; min-width: 0; position: relative; }
  .pb-title { font-size: 15px; font-weight: 700; }
  .pb-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .pb-pill {
    display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 700;
    padding: 2px 9px; border-radius: 20px; background: var(--game-soft); color: var(--game);
  }
  .pb-arrow { font-size: 20px; color: var(--game); flex-shrink: 0; position: relative; transition: transform 0.12s; }
  .play-banner:hover .pb-arrow { transform: translateX(3px); }

  /* ── 準備中（無効） ── */
  .play-banner.soon { opacity: 0.6; pointer-events: none; background: var(--surface); }
  .play-banner.soon::before { background: #D8D3CB; }
  .play-banner.soon .pb-icon { background: #F0EEE8; color: var(--text-hint); }
  .play-banner.soon .pb-pill { background: #F0EEE8; color: var(--text-hint); }
  .play-banner.soon .pb-arrow { color: var(--text-hint); opacity: 0.4; }
  .play-banner.soon .pb-float span { color: var(--text-hint); }

  .app-footer { text-align: center; font-size: 11px; color: var(--text-hint); margin-top: 2.5rem; line-height: 1.8; }
</style>
</head>
<body>
<div class="container">

  <a href="index.html" class="back-link">‹ ホーム</a>

  <div class="app-header">
    <div class="app-logo">NIHONGO NO HEYA</div>
    <div class="app-title">ゲーム</div>
    <div class="app-sub">あそんで なれる ・ Play &amp; Learn</div>
  </div>

  <div class="list">

    <a href="mogura.html" class="play-banner">
      <div class="pb-float">
        <span style="top:4px;right:18px;font-size:42px;">も</span>
        <span style="bottom:6px;right:58px;font-size:34px;">ぐ</span>
      </div>
      <div class="pb-icon">も</div>
      <div class="pb-info">
        <div class="pb-title">もぐらたたき</div>
        <div class="pb-desc">なかまはずれの文字をさがしてたたく。ひらがな・カタカナ</div>
        <span class="pb-pill">なかまはずれ ・ かな</span>
      </div>
      <span class="pb-arrow">›</span>
    </a>

    <div class="play-banner soon">
      <div class="pb-float">
        <span style="top:4px;right:18px;font-size:42px;">語</span>
        <span style="bottom:6px;right:58px;font-size:34px;">彙</span>
      </div>
      <div class="pb-icon">語</div>
      <div class="pb-info">
        <div class="pb-title">ことばパズル</div>
        <div class="pb-desc">文字をならべて、ことばを作る</div>
        <span class="pb-pill">準備中</span>
      </div>
      <span class="pb-arrow">›</span>
    </div>

    <div class="play-banner soon">
      <div class="pb-float">
        <span style="top:4px;right:18px;font-size:42px;">記</span>
        <span style="bottom:6px;right:58px;font-size:34px;">憶</span>
      </div>
      <div class="pb-icon">記</div>
      <div class="pb-info">
        <div class="pb-title">きおくゲーム</div>
        <div class="pb-desc">カードをめくって、ペアをさがす</div>
        <span class="pb-pill">準備中</span>
      </div>
      <span class="pb-arrow">›</span>
    </div>

  </div>

  <div class="app-footer">
    あたらしいゲームを じゅんび中<br>
    © 2025 日本語の部屋
  </div>

</div>
</body>
</html>
