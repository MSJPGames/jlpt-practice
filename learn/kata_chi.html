<style>  :root{--bg:#F7F5F0;--surface:#FFFFFF;--border:#E2DDD6;--text:#1C1C1C;--text-muted:#6B6560;--text-hint:#9E9890;

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;

  .char-hero{display:flex;flex-direction:column;align-items:center;gap:12px;margin:1rem 0 .5rem;}
  .strokebox{width:168px;height:168px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:8px;}
  .strokesvg{width:100%;height:100%;display:block;}
  .gline{stroke:#E7E2DB;stroke-width:1;stroke-dasharray:3 4;}
  .ghost path{fill:none;stroke:#ECE8E1;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round;}
  .ink path{fill:none;stroke:#1C1C1C;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round;}
  .nums circle{fill:var(--accent);}
  .nums text{fill:#fff;font-size:7px;font-weight:700;font-family:'Segoe UI',system-ui,sans-serif;}
  .replay{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 16px;
    font-family:inherit;font-size:12px;font-weight:700;color:var(--text-muted);cursor:pointer;}
  .replay:active{transform:scale(.96);}
  .reading{text-align:center;margin-top:4px;}
  .rom{font-size:30px;font-weight:800;color:var(--accent-deep);letter-spacing:.02em;}
  .ipa2{font-size:15px;color:var(--text-muted);margin-top:2px;font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;}
  .kaku{display:inline-block;margin-top:10px;font-size:11px;font-weight:700;color:var(--accent-deep);
    background:var(--accent-soft);padding:3px 11px;border-radius:20px;}
  .label{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--text-hint);margin:1.7rem 0 .7rem;text-transform:uppercase;}
  .note{font-size:13px;color:var(--text-muted);line-height:1.8;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:12px 14px;}
  .note b{color:var(--text);font-weight:700;}
  .words{display:flex;flex-direction:column;gap:8px;}
  .word{display:flex;align-items:baseline;gap:10px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:11px 14px;}
  .word .ww{font-size:19px;font-weight:700;}
  .word .wk{font-size:13px;color:var(--text-muted);}
  .word .we{font-size:12px;color:var(--text-hint);margin-left:auto;}
  .sim{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
  .sim .sc{font-size:38px;font-weight:700;color:var(--text-muted);line-height:1;flex-shrink:0;width:44px;text-align:center;}
  .sim .st{font-size:13px;color:var(--text-muted);line-height:1.7;}
  a.sim:active{opacity:.7;}
  .play-link{display:flex;align-items:center;gap:14px;margin-top:1.4rem;background:linear-gradient(135deg,#FFFFFF,#EEF4FB);
    border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-decoration:none;color:inherit;
    position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s;}
  .play-link:active{transform:scale(.98);}
  .play-link::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
  .pl-icon{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;}
  .pl-info{flex:1;min-width:0;}.pl-title{font-size:14px;font-weight:700;}
  .pl-desc{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.5;}
  .pl-arrow{font-size:20px;color:var(--accent);flex-shrink:0;}
  .charnav{display:flex;gap:8px;margin-top:1.4rem;}
  .charnav a{flex:1;text-align:center;padding:11px 8px;border:1px solid var(--border);border-radius:12px;
    text-decoration:none;color:var(--text);font-weight:700;font-size:15px;background:var(--surface);}
  .charnav a:active{opacity:.7;}.charnav a.disabled{opacity:.35;pointer-events:none;}
  .charnav .s{font-size:10px;color:var(--text-hint);display:block;font-weight:600;letter-spacing:.04em;}
  .foot{text-align:center;font-size:11px;color:var(--text-hint);margin-top:2.2rem;line-height:1.9;}
  .foot a{color:var(--text-muted);}
  .credit{font-size:10px;color:var(--text-hint);margin-top:6px;}

  <script>  (function(){
    var svg=document.querySelector('.strokesvg'); if(!svg) return;
    var inks=[].slice.call(svg.querySelectorAll('.ink path'));
    var numsG=svg.querySelector('.nums');
    var lens=inks.map(function(p){var L=p.getTotalLength();p.style.strokeDasharray=L;p.style.strokeDashoffset=L;return L;});
    var nums=[];
    inks.forEach(function(p,i){
      var pt=p.getPointAtLength(0);
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r',6.2);c.style.opacity=0;
      var t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',pt.x);t.setAttribute('y',pt.y+2.6);t.setAttribute('text-anchor','middle');t.textContent=i+1;t.style.opacity=0;
      numsG.appendChild(c);numsG.appendChild(t);nums.push({c:c,t:t});
    });
    var timers=[];
    function reset(){
      timers.forEach(clearTimeout);timers=[];
      inks.forEach(function(p,i){p.style.transition='none';p.style.strokeDashoffset=lens[i];});
      nums.forEach(function(n){n.c.style.transition='none';n.t.style.transition='none';n.c.style.opacity=0;n.t.style.opacity=0;});
    }
    function play(){
      reset(); void svg.getBoundingClientRect();
      var delay=200;
      inks.forEach(function(p,i){
        var dur=Math.max(380,lens[i]*7);
        timers.push(setTimeout(function(){
          nums[i].c.style.transition='opacity .2s';nums[i].t.style.transition='opacity .2s';
          nums[i].c.style.opacity=1;nums[i].t.style.opacity=1;
          p.style.transition='stroke-dashoffset '+dur+'ms linear';p.style.strokeDashoffset=0;
        },delay));
        delay+=dur+180;
      });
    }
    var btn=document.querySelector('.replay'); if(btn) btn.addEventListener('click',play);
    setTimeout(play,350);
  })();
</script>
