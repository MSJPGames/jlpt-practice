<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文法 ・ Grammar — 日本語の部屋</title>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1C1C1C;
    --text-muted: #6B6560;
    --text-hint: #9E9890;
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 1rem 2rem;
  }
  .container { max-width: 480px; margin: 0 auto; }

  /* ヘッダー */
  .app-header { text-align: center; padding: 2rem 0 1.5rem; }
  .app-logo { font-size: 13px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-hint); margin-bottom: 10px; }
  .app-title { font-size: 26px; font-weight: 700; color: #1C1C1C; letter-spacing: 0.02em; }
  .app-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }

  /* セクションラベル */
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--text-hint); margin: 1.5rem 0 0.75rem;
    text-transform: uppercase;
  }

  /* グループ見出し（4分類） */
  .group-head { display: flex; align-items: center; gap: 10px; margin: 1.9rem 0 0.85rem; }
  .group-head:first-of-type { margin-top: 1.5rem; }
  .gh-bar { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }
  .gh-title { font-size: 16px; font-weight: 700; letter-spacing: 0.01em; }
  .gh-en { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-hint); text-transform: uppercase; margin-left: 7px; }
  .gh-bar.bar-game { background: #3B6D11; }
  .gh-bar.bar-char { background: #1F6F6B; }
  .gh-bar.bar-gram { background: #854F0B; }
  .gh-bar.bar-test { background: #185FA5; }

  /* レベルリスト */
  .level-list { display: flex; flex-direction: column; gap: 10px; }

  .level-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    text-decoration: none; color: inherit;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .level-card.available:active {
    transform: scale(0.98);
  }
  .level-card.available:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .level-card.disabled {
    opacity: 0.6;
    pointer-events: none;
  }

  /* レベルバッジ */
  .level-badge {
    width: 52px; height: 52px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    flex-shrink: 0; letter-spacing: 0.02em;
  }
  .badge-n5 { background: #EAF3DE; color: #3B6D11; }
  .badge-n4 { background: #E6F1FB; color: #185FA5; }
  .badge-n3 { background: #EEEDFE; color: #3C3489; }
  .badge-n2 { background: #FAEEDA; color: #854F0B; }
  .badge-n1 { background: #FAECE7; color: #993C1D; }

  /* レベル情報 */
  .level-info { flex: 1; min-width: 0; }
  .level-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .level-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .level-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

  /* ステータスバッジ */
  .status-pill {
    font-size: 10px; font-weight: 700;
    padding: 2px 9px; border-radius: 20px;
    display: inline-block;
  }
  .pill-ready { background: #EAF3DE; color: #3B6D11; }
  .pill-coming { background: #F0EEE8; color: var(--text-hint); }
  .level-count { font-size: 11px; color: var(--text-hint); }

  /* 矢印 */
  .level-arrow {
    font-size: 20px; color: var(--text-hint);
    flex-shrink: 0; transition: transform 0.12s;
  }
  .level-card.available:hover .level-arrow { transform: translateX(3px); }
  .level-arrow.dim { opacity: 0.3; }

  /* アクセントライン */
  .level-card.available::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 3px 0 0 3px;
  }
  .card-n3::before { background: #534AB7; }
  .card-n4::before { background: #185FA5; }
  .card-n5::before { background: #3B6D11; }

  /* フッター */
  .app-footer {
    text-align: center; font-size: 11px; color: var(--text-hint);
    margin-top: 2rem; line-height: 1.8;
  }

  /* あそび場への入口バナー */
  .play-banner {
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(135deg, #FFFFFF, #F2F7EA);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; text-decoration: none; color: inherit;
    position: relative; overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .play-banner:active { transform: scale(0.98); }
  .play-banner:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .play-banner::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: #3B6D11; border-radius: 3px 0 0 3px;
  }
  .pb-float { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .pb-float span { position: absolute; font-weight: 800; color: #3B6D11; opacity: 0.06; }
  .pb-icon {
    width: 52px; height: 52px; border-radius: 13px; flex-shrink: 0;
    background: #EAF3DE; color: #3B6D11;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800;
  }
  .pb-info { flex: 1; min-width: 0; position: relative; }
  .pb-title { font-size: 15px; font-weight: 700; }
  .pb-en { font-size: 10.5px; font-weight: 600; letter-spacing: 0.03em; color: var(--text-hint); margin-top: 1px; }
  .pb-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .pb-pill {
    display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 700;
    padding: 2px 9px; border-radius: 20px; background: #EAF3DE; color: #3B6D11;
  }
  .pb-arrow { font-size: 20px; color: #3B6D11; flex-shrink: 0; position: relative; transition: transform 0.12s; }
  .play-banner:hover .pb-arrow { transform: translateX(3px); }
  .play-banner.learn { background: linear-gradient(135deg, #FFFFFF, #F0EFFA); }
  .play-banner.learn::before { background: #3C3489; }
  .play-banner.learn .pb-icon { background: #EEEDFE; color: #3C3489; }
  .play-banner.learn .pb-pill { background: #EEEDFE; color: #3C3489; }
  .play-banner.learn .pb-arrow { color: #3C3489; }
  .play-banner.learn .pb-float span { color: #3C3489; }
  .play-banner.kanji { background: linear-gradient(135deg, #FFFFFF, #E6F0EF); }
  .play-banner.kanji::before { background: #1F6F6B; }
  .play-banner.kanji .pb-icon { background: #DFF0EE; color: #1F6F6B; }
  .play-banner.kanji .pb-pill { background: #DFF0EE; color: #1F6F6B; }
  .play-banner.kanji .pb-arrow { color: #1F6F6B; }
  .play-banner.kanji .pb-float span { color: #1F6F6B; }
  .play-banner.conj { background: linear-gradient(135deg, #FFFFFF, #FAF3E6); }
  .play-banner.conj::before { background: #854F0B; }
  .play-banner.conj .pb-icon { background: #FAEEDA; color: #854F0B; }
  .play-banner.conj .pb-pill { background: #FAEEDA; color: #854F0B; }
  .play-banner.conj .pb-arrow { color: #854F0B; }
  .play-banner.conj .pb-float span { color: #854F0B; }
  .play-banner.drill { background: linear-gradient(135deg, #FFFFFF, #FAEEEA); }
  .play-banner.drill::before { background: #9A3D1C; }
  .play-banner.drill .pb-icon { background: #FAECE7; color: #9A3D1C; }
  .play-banner.drill .pb-pill { background: #FAECE7; color: #9A3D1C; }
  .play-banner.drill .pb-arrow { color: #9A3D1C; }
  .play-banner.drill .pb-float span { color: #9A3D1C; }
  .play-banner.test { background: linear-gradient(135deg, #FFFFFF, #EAF1FA); }
  .play-banner.test::before { background: #185FA5; }
  .play-banner.test .pb-icon { background: #E6F1FB; color: #185FA5; }
  .play-banner.test .pb-pill { background: #E6F1FB; color: #185FA5; }
  .play-banner.test .pb-arrow { color: #185FA5; }
  .play-banner.test .pb-float span { color: #185FA5; }
  .play-banner.lang { background: linear-gradient(135deg, #FFFFFF, #E7F1EC); }
  .play-banner.lang::before { background: #2F7168; }
  .play-banner.lang .pb-icon { background: #DDEEE7; color: #2F7168; }
  .play-banner.lang .pb-pill { background: #DDEEE7; color: #2F7168; }
  .play-banner.lang .pb-arrow { color: #2F7168; }
  .play-banner.lang .pb-float span { color: #2F7168; }

  /* --- ハブ用の戻る＆準備中バナー（追加） --- */
  .topbar{display:flex;align-items:center;padding:14px 0 0;}
  .back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--text-muted);text-decoration:none;padding:6px 13px 6px 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);-webkit-tap-highlight-color:transparent;transition:transform .12s;}
  .back-link:active{transform:scale(.97);}
  .back-arrow{font-size:16px;line-height:1;}
  .play-banner.learn{background:linear-gradient(135deg,#FFFFFF,#F0EFFA);}
  .play-banner.learn::before{background:#3C3489;}
  .play-banner.learn .pb-icon{background:#EEEDFE;color:#3C3489;}
  .play-banner.learn .pb-pill{background:#EEEDFE;color:#3C3489;}
  .play-banner.learn .pb-arrow{color:#3C3489;}
  .play-banner.learn .pb-float span{color:#3C3489;}
  .play-banner.kanji{background:linear-gradient(135deg,#FFFFFF,#E6F0EF);}
  .play-banner.kanji::before{background:#1F6F6B;}
  .play-banner.kanji .pb-icon{background:#DFF0EE;color:#1F6F6B;}
  .play-banner.kanji .pb-pill{background:#DFF0EE;color:#1F6F6B;}
  .play-banner.kanji .pb-arrow{color:#1F6F6B;}
  .play-banner.kanji .pb-float span{color:#1F6F6B;}
  .play-banner.conj{background:linear-gradient(135deg,#FFFFFF,#FAF3E6);}
  .play-banner.conj::before{background:#854F0B;}
  .play-banner.conj .pb-icon{background:#FAEEDA;color:#854F0B;}
  .play-banner.conj .pb-pill{background:#FAEEDA;color:#854F0B;}
  .play-banner.conj .pb-arrow{color:#854F0B;}
  .play-banner.conj .pb-float span{color:#854F0B;}
  .play-banner.test{background:linear-gradient(135deg,#FFFFFF,#EAF1FA);}
  .play-banner.test::before{background:#185FA5;}
  .play-banner.test .pb-icon{background:#E6F1FB;color:#185FA5;}
  .play-banner.test .pb-pill{background:#E6F1FB;color:#185FA5;}
  .play-banner.test .pb-arrow{color:#185FA5;}
  .play-banner.test .pb-float span{color:#185FA5;}
  .play-banner.lang{background:linear-gradient(135deg,#FFFFFF,#E7F1EC);}
  .play-banner.lang::before{background:#2F7168;}
  .play-banner.lang .pb-icon{background:#DDEEE7;color:#2F7168;}
  .play-banner.lang .pb-pill{background:#DDEEE7;color:#2F7168;}
  .play-banner.lang .pb-arrow{color:#2F7168;}
  .play-banner.lang .pb-float span{color:#2F7168;}
  .play-banner.red{background:linear-gradient(135deg,#FFFFFF,#FAEEEA);}
  .play-banner.red::before{background:#9A3D1C;}
  .play-banner.red .pb-icon{background:#FAECE7;color:#9A3D1C;}
  .play-banner.red .pb-pill{background:#FAECE7;color:#9A3D1C;}
  .play-banner.red .pb-arrow{color:#9A3D1C;}
  .play-banner.red .pb-float span{color:#9A3D1C;}
  .play-banner.soon{opacity:.6;pointer-events:none;background:linear-gradient(135deg,#FFFFFF,#F3F1EC);}
  .play-banner.soon::before{background:#C9C2B8;}
  .play-banner.soon .pb-icon{background:#F0EEE8;color:#9E9890;}
  .play-banner.soon .pb-pill{background:#F0EEE8;color:#9E9890;}
  .play-banner.soon .pb-float span{color:#9E9890;}
</style>
</head>

<script>
/* === EN表示トグル（英語補助の表示/非表示・localStorageで保持） === */
(function(){
  var KEY='nnh_en_off';
  var st=document.createElement('style');
  st.textContent=
    "body.hide-en .en,body.hide-en .pb-en,body.hide-en .hero-desc-en,body.hide-en .game-en,"
   +"body.hide-en .level-en,body.hide-en .en-sub,body.hide-en .en-i,body.hide-en .gh-en,"
   +"body.hide-en .hero-en{display:none!important;}"
   +".en-toggle{position:fixed;top:10px;right:10px;z-index:9999;font-family:inherit;font-size:11px;"
   +"font-weight:700;letter-spacing:.04em;padding:6px 11px;border-radius:999px;border:1px solid #E2DDD6;"
   +"background:rgba(255,255,255,.92);color:#1C1C1C;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);"
   +"-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent;}"
   +".en-toggle .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:#3B6D11;"
   +"margin-left:6px;vertical-align:middle;}"
   +".en-toggle.off{color:#9E9890;}.en-toggle.off .d{background:#C9C2B8;}";
  document.head.appendChild(st);
  var off=false; try{ off=localStorage.getItem(KEY)==='1'; }catch(e){}
  if(off) document.body.classList.add('hide-en');
  var b=document.createElement('button'); b.type='button';
  function paint(){ var h=document.body.classList.contains('hide-en');
    b.className='en-toggle'+(h?' off':''); b.innerHTML='EN<span class="d"></span>';
    b.setAttribute('aria-pressed', h?'false':'true');
    b.title=h?'英語の補助：OFF（タップで表示 / show English）':'英語の補助：ON（タップで非表示 / hide English）'; }
  b.addEventListener('click',function(){
    var h=document.body.classList.toggle('hide-en');
    try{ localStorage.setItem(KEY, h?'1':'0'); }catch(e){}
    paint();
  });
  paint(); document.body.appendChild(b);
})();
</script>
