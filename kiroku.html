<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習記録・苦手分野 ・ 日本語の部屋</title>
<meta name="description" content="テスト対策クイズの成績と、間違いが多い苦手分野を、この端末の記録からまとめて表示します。">
<style>
  :root{
    --bg:#F7F5F0; --surface:#FFFFFF; --border:#E2DDD6;
    --text:#1C1C1C; --text-muted:#6B6560; --text-hint:#9E9890;
    --accent:#185FA5; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;padding:0 1rem 3rem;-webkit-text-size-adjust:100%;}
  .container{max-width:560px;margin:0 auto;}
  .topbar{display:flex;align-items:center;gap:8px;padding:14px 0 2px;flex-wrap:wrap;}
  .back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--text-muted);
    text-decoration:none;padding:6px 13px 6px 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);}
  .back-arrow{font-size:16px;line-height:1;}

  .page-head{text-align:center;padding:1.2rem 0 0.4rem;}
  .ph-title{font-size:23px;font-weight:700;}
  .ph-sub{font-size:12.5px;color:var(--text-muted);margin-top:5px;}

  .note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 15px;font-size:12.5px;color:var(--text-muted);line-height:1.75;margin-top:14px;}
  .note b{color:var(--text);}

  .summary{display:flex;gap:10px;margin-top:16px;}
  .sum-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;}
  .sum-num{font-size:24px;font-weight:800;color:var(--accent);line-height:1;}
  .sum-lbl{font-size:11px;color:var(--text-hint);margin-top:5px;}

  .sec-head{font-size:13px;font-weight:800;color:var(--text-muted);margin:22px 2px 8px;letter-spacing:.04em;}

  .qcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:11px;position:relative;overflow:hidden;}
  .qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,#999);}
  .qc-top{display:flex;align-items:center;gap:11px;}
  .qc-badge{min-width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
  .qc-name{font-size:15px;font-weight:700;flex:1;min-width:0;}
  .qc-acc{font-size:12px;color:var(--text-muted);text-align:right;flex-shrink:0;}
  .qc-acc b{font-size:16px;color:var(--text);}
  .qc-out{display:inline-block;font-size:11px;font-weight:700;color:#B96A12;background:#FFF1DE;border-radius:20px;padding:2px 9px;margin-top:2px;}
  .qc-out.zero{color:#3B6D11;background:#EAF3DE;}

  .bars{margin-top:11px;display:flex;flex-direction:column;gap:6px;}
  .bar-row{display:flex;align-items:center;gap:9px;}
  .bar-name{font-size:12px;width:38%;flex-shrink:0;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:14px;background:#F0EDE7;border-radius:7px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:7px;min-width:3px;}
  .bar-val{font-size:11px;font-weight:700;color:var(--text-muted);width:34px;text-align:right;flex-shrink:0;}

  .qc-actions{margin-top:11px;display:flex;gap:8px;}
  .qc-btn{flex:1;text-align:center;font-size:12.5px;font-weight:700;text-decoration:none;padding:9px;border-radius:9px;border:1px solid var(--border);color:var(--text-muted);background:var(--bg);}
  .qc-btn.primary{border-color:#E8912D;color:#B96A12;background:#FFF6EA;}

  .empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px 18px;text-align:center;color:var(--text-muted);margin-top:18px;line-height:1.8;}
  .clearall{text-align:center;margin-top:20px;}
  .clearall span{font-size:11px;color:var(--text-hint);text-decoration:underline;cursor:pointer;}
  .app-footer{text-align:center;font-size:11px;color:var(--text-hint);margin-top:2rem;line-height:1.8;}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="taisaku.html" class="back-link"><span class="back-arrow">‹</span>テスト対策</a>
    <a href="index.html" class="back-link">ホーム</a>
  </div>

  <div class="page-head">
    <div class="ph-title">学習記録・苦手分野</div>
    <div class="ph-sub">この端末に保存された、あなたの練習の記録です</div>
  </div>

  <div class="note">
    各クイズで解いた成績と、まだ解き直していない<b>間違い</b>を分野別にまとめました。<b>間違いが多い分野＝苦手分野</b>です。「復習する」から間違いだけを解き直すと、正解した分は自動で減っていきます。
    <span style="display:block;margin-top:6px;color:var(--text-hint)">※ 記録はこの端末・このブラウザだけに保存されています（他の端末とは共有されません）。</span>
  </div>

  <div id="content"></div>

  <div class="app-footer">© 2025 日本語の部屋</div>
</div>

<script>
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function readJSON(k){ try{ return JSON.parse(localStorage.getItem(k)||'null'); }catch(e){ return null; } }

var QUIZZES=[
  {key:'n1', label:'JLPT N1', badge:'N1', color:'#993C1D', bg:'#FAECE7', statsKey:'jlpt_n1_stats', wrongKey:'jlpt_n1_wrong', href:'n1_quiz.html'},
  {key:'n2', label:'JLPT N2', badge:'N2', color:'#854F0B', bg:'#FAEEDA', statsKey:'jlpt_n2_stats', wrongKey:'jlpt_n2_wrong', href:'n2_quiz.html'},
  {key:'n3', label:'JLPT N3', badge:'N3', color:'#3C3489', bg:'#EEEDFE', statsKey:'jlpt_n3_stats', wrongKey:'jlpt_n3_wrong', href:'n3_quiz.html'},
  {key:'n4', label:'JLPT N4', badge:'N4', color:'#185FA5', bg:'#E6F1FB', statsKey:'jlpt_n4_stats', wrongKey:'jlpt_n4_wrong', href:'n4_quiz.html'},
  {key:'n5', label:'JLPT N5', badge:'N5', color:'#3B6D11', bg:'#EAF3DE', statsKey:'jlpt_n5_stats', wrongKey:'jlpt_n5_wrong', href:'n5_quiz.html'},
  {key:'jt_ac', label:'J.TEST A-C', badge:'JT', color:'#1E6E8C', bg:'#E1EFF4', wrongKey:'nnhwrong_jtest_ac', href:'jtest_ac.html'},
  {key:'jt_de', label:'J.TEST D-E', badge:'JT', color:'#1E6E8C', bg:'#E1EFF4', wrongKey:'nnhwrong_jtest_de', href:'jtest_de.html'},
  {key:'jt_fg', label:'J.TEST F-G', badge:'JT', color:'#1E6E8C', bg:'#E1EFF4', wrongKey:'nnhwrong_jtest_fg', href:'jtest_fg.html'},
  {key:'bjt_c', label:'BJT 聴解', badge:'BJT', color:'#3C5A78', bg:'#E4EAF1', wrongKey:'nnhwrong_bjt_choukai', href:'bjt_choukai.html'},
  {key:'bjt_d', label:'BJT 読解', badge:'BJT', color:'#3C5A78', bg:'#E4EAF1', wrongKey:'nnhwrong_bjt_dokkai', href:'bjt_dokkai.html'}
];

function catOf(entry){ return entry.sub || entry.sec || 'その他'; }

function analyze(q){
  var wrong=readJSON(q.wrongKey)||{};
  var byCat={}, out=0;
  Object.keys(wrong).forEach(function(k){
    var c=catOf(wrong[k]); byCat[c]=(byCat[c]||0)+1; out++;
  });
  var stats=q.statsKey?readJSON(q.statsKey):null;
  var acc=null;
  if(stats && stats.total>0){ acc={total:stats.total, correct:stats.correct, pct:Math.round(stats.correct/stats.total*100)}; }
  var cats=Object.keys(byCat).map(function(c){return {name:c, n:byCat[c]};}).sort(function(a,b){return b.n-a.n;});
  return {out:out, acc:acc, cats:cats, hasData:(out>0 || acc)};
}

function render(){
  var content=document.getElementById('content');
  var results=QUIZZES.map(function(q){ return {q:q, a:analyze(q)}; }).filter(function(r){ return r.a.hasData; });

  if(results.length===0){
    content.innerHTML='<div class="empty">まだ記録がありません。<br>テスト対策のクイズを解くと、ここに成績と<b>苦手分野</b>がたまっていきます。<br><br><a href="taisaku.html" style="color:var(--accent);font-weight:700;text-decoration:none">クイズを始める ›</a></div>';
    return;
  }

  var totalOut=results.reduce(function(a,r){return a+r.a.out;},0);
  var sumT=0, sumC=0;
  results.forEach(function(r){ if(r.a.acc){ sumT+=r.a.acc.total; sumC+=r.a.acc.correct; } });
  var overallPct = sumT>0 ? Math.round(sumC/sumT*100) : null;

  var html='<div class="summary">'
    + '<div class="sum-box"><div class="sum-num">'+totalOut+'</div><div class="sum-lbl">未克服の間違い（問）</div></div>'
    + '<div class="sum-box"><div class="sum-num">'+(overallPct!=null?overallPct+'%':'—')+'</div><div class="sum-lbl">全体の正答率</div></div>'
    + '<div class="sum-box"><div class="sum-num">'+sumT+'</div><div class="sum-lbl">これまで解いた数</div></div>'
    + '</div>';

  html+='<div class="sec-head">レベル・試験ごとの記録</div>';

  results.forEach(function(r){
    var q=r.q, a=r.a;
    var maxN=a.cats.length?a.cats[0].n:1;
    html+='<div class="qcard" style="--c:'+q.color+'">'
      + '<div class="qc-top">'
        + '<div class="qc-badge" style="background:'+q.bg+';color:'+q.color+'">'+esc(q.badge)+'</div>'
        + '<div class="qc-name">'+esc(q.label)+'</div>'
        + '<div class="qc-acc">'+(a.acc?('<b>'+a.acc.pct+'%</b><br><span style="font-size:10.5px;color:var(--text-hint)">'+a.acc.correct+'/'+a.acc.total+'</span>'):'<span style="font-size:11px;color:var(--text-hint)">正答率は<br>記録対象外</span>')+'</div>'
      + '</div>'
      + '<div style="margin-top:8px"><span class="qc-out'+(a.out===0?' zero':'')+'">'+(a.out===0?'苦手なし（未克服 0問）':'未克服の間違い '+a.out+'問')+'</span></div>';

    if(a.cats.length){
      html+='<div class="bars">';
      a.cats.forEach(function(c){
        var w=Math.round(c.n/maxN*100);
        html+='<div class="bar-row"><div class="bar-name" title="'+esc(c.name)+'">'+esc(c.name)+'</div>'
          + '<div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+q.color+'"></div></div>'
          + '<div class="bar-val">'+c.n+'</div></div>';
      });
      html+='</div>';
    }

    html+='<div class="qc-actions">'
      + '<a class="qc-btn primary" href="'+q.href+'">🔁 復習する</a>'
      + '<a class="qc-btn" href="'+q.href+'">問題を解く</a>'
      + '</div>'
    + '</div>';
  });

  html+='<div class="clearall"><span id="clearAll">すべての学習記録を消す</span></div>';
  content.innerHTML=html;

  var ca=document.getElementById('clearAll');
  if(ca) ca.addEventListener('click', function(){
    if(!confirm('この端末に保存された、すべての成績と間違い記録を消しますか？この操作は元に戻せません。')) return;
    QUIZZES.forEach(function(q){ try{ localStorage.removeItem(q.wrongKey); if(q.statsKey) localStorage.removeItem(q.statsKey); }catch(e){} });
    render();
  });
}
render();
</script>
<script>
/* === EN表示トグル（他ページと共通・このページは日本語主体のため最小） === */
(function(){ var KEY='nnh_en_off'; try{ if(localStorage.getItem(KEY)==='1') document.body.classList.add('hide-en'); }catch(e){} })();
</script>
</body>
</html>
