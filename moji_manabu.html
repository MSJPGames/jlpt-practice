<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字を学ぶ ・ 日本語の部屋</title>
<meta name="description" content="ひらがな・カタカナ・漢字。日本語の文字を学ぶための入口をまとめました。">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1C1C1C;
    --text-muted: #6B6560;
    --text-hint: #9E9890;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 1rem 2.5rem;
    line-height: 1.6;
  }
  .container { max-width: 480px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; padding: 1.1rem 0 0; }
  .back { font-size: 13px; color: var(--text-muted); text-decoration: none; font-weight: 600; }

  .app-header { padding: 1.3rem 0 0.4rem; }
  .app-title { font-size: 23px; font-weight: 700; letter-spacing: 0.02em; }
  .app-sub { font-size: 12.5px; color: var(--text-muted); margin-top: 5px; }

  .entry {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 5px solid var(--c);
    border-radius: var(--radius);
    padding: 16px; margin-bottom: 11px;
    text-decoration: none; color: var(--text);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .entry:active { transform: scale(0.985); }
  .entry:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .entry-ic {
    width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
    background: var(--cs); color: var(--c);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800;
  }
  .entry-tx { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .entry-title { font-size: 15.5px; font-weight: 700; }
  .entry-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; }
  .entry-ar { font-size: 22px; color: var(--text-hint); flex-shrink: 0; }

  .app-footer {
    text-align: center; font-size: 11px; color: var(--text-hint);
    margin-top: 2rem; line-height: 1.9;
  }
  .app-footer a { color: var(--text-muted); }
</style>
</head>
<body>
<div class="container">

  <div class="topbar"><a href="manabu.html" class="back">‹ 日本語を学ぶ</a></div>

  <div class="app-header">
    <div class="app-title">文字を学ぶ</div>
    <div class="app-sub">ひらがな・カタカナ・漢字 ・ Learn the writing systems</div>
  </div>

  <div style="margin-top:16px"></div>

  <a href="hiragana.html" class="entry" style="--c:#3C3489;--cs:#EEEDFE">
    <span class="entry-ic">あ</span>
    <span class="entry-tx">
      <span class="entry-title">ひらがな</span>
      <span class="entry-sub">五十音を書き順・発音から学ぶ</span>
    </span>
    <span class="entry-ar">›</span>
  </a>

  <a href="katakana.html" class="entry" style="--c:#2F7168;--cs:#E3EFED">
    <span class="entry-ic">ア</span>
    <span class="entry-tx">
      <span class="entry-title">カタカナ</span>
      <span class="entry-sub">カタカナを書き順・発音から学ぶ</span>
    </span>
    <span class="entry-ar">›</span>
  </a>

  <a href="kanji.html" class="entry" style="--c:#1F6F6B;--cs:#DFF0EE">
    <span class="entry-ic">漢</span>
    <span class="entry-tx">
      <span class="entry-title">漢字</span>
      <span class="entry-sub">JLPT・学年・漢検の級で、漢字をまとめて見る</span>
    </span>
    <span class="entry-ar">›</span>
  </a>

  <div class="app-footer">
    <a href="manabu.html">日本語を学ぶにもどる</a><br>© 2025 日本語の部屋
  </div>

</div>
</body>
</html>
