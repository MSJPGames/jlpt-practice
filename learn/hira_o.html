  <script>  (function(){
    var svg=document.querySelector('.strokesvg'); if(!svg) return;
    var inks=[].slice.call(svg.querySelectorAll('.ink path'));
    var numsG=svg.querySelector('.nums');
    var lens=inks.map(function(p){var L=p.getTotalLength();p.style.strokeDasharray=L;p.style.strokeDashoffset=L;return L;});
    var nums=[];
    inks.forEach(function(p,i){
      var pt=p.getPointAtLength(0);
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r',6.2);c.style.opacity=0;
      var t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',pt.x);t.setAttribute('y',pt.y+2.6);t.setAttribute('text-anchor','middle');t.textContent=i+1;t.style.opacity=0;
      numsG.appendChild(c);numsG.appendChild(t);nums.push({c:c,t:t});
    });
    var timers=[];
    function reset(){
      timers.forEach(clearTimeout);timers=[];
      inks.forEach(function(p,i){p.style.transition='none';p.style.strokeDashoffset=lens[i];});
      nums.forEach(function(n){n.c.style.transition='none';n.t.style.transition='none';n.c.style.opacity=0;n.t.style.opacity=0;});
    }
    function play(){
      reset(); void svg.getBoundingClientRect();
      var delay=200;
      inks.forEach(function(p,i){
        var dur=Math.max(380,lens[i]*7);
        timers.push(setTimeout(function(){
          nums[i].c.style.transition='opacity .2s';nums[i].t.style.transition='opacity .2s';
          nums[i].c.style.opacity=1;nums[i].t.style.opacity=1;
          p.style.transition='stroke-dashoffset '+dur+'ms linear';p.style.strokeDashoffset=0;
        },delay));
        delay+=dur+180;
      });
    }
    var btn=document.querySelector('.replay'); if(btn) btn.addEventListener('click',play);
    setTimeout(play,350);
  })();
</script>
