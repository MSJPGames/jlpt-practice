<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習記録・苦手分野 ・ 日本語の部屋</title>
<meta name="description" content="テスト対策クイズの成績と、分野ごとの正答率・苦手分野を、この端末の記録からまとめて表示します。">
<style>
  :root{
    --bg:#F7F5F0; --surface:#FFFFFF; --border:#E2DDD6;
    --text:#1C1C1C; --text-muted:#6B6560; --text-hint:#9E9890;
    --accent:#185FA5; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;padding:0 1rem 3rem;-webkit-text-size-adjust:100%;}
  .container{max-width:560px;margin:0 auto;}
  .topbar{display:flex;align-items:center;gap:8px;padding:14px 0 2px;flex-wrap:wrap;}
  .back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--text-muted);
    text-decoration:none;padding:6px 13px 6px 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);}
  .back-arrow{font-size:16px;line-height:1;}

  .page-head{text-align:center;padding:1.2rem 0 0.4rem;}
  .ph-title{font-size:23px;font-weight:700;}
  .ph-sub{font-size:12.5px;color:var(--text-muted);margin-top:5px;}

  .note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 15px;font-size:12.5px;color:var(--text-muted);line-height:1.75;margin-top:14px;}
  .note b{color:var(--text);}

  .summary{display:flex;gap:10px;margin-top:16px;}
  .sum-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;}
  .sum-num{font-size:24px;font-weight:800;color:var(--accent);line-height:1;}
  .sum-lbl{font-size:11px;color:var(--text-hint);margin-top:5px;}

  .sec-head{font-size:13px;font-weight:800;color:var(--text-muted);margin:22px 2px 8px;letter-spacing:.04em;}

  .qcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:11px;position:relative;overflow:hidden;}
  .qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,#999);}
  .qc-top{display:flex;align-items:center;gap:11px;}
  .qc-badge{min-width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
  .qc-name{font-size:15px;font-weight:700;flex:1;min-width:0;}
  .qc-acc{font-size:12px;color:var(--text-muted);text-align:right;flex-shrink:0;}
  .qc-acc b{font-size:17px;color:var(--text);}
  .qc-out{display:inline-block;font-size:11px;font-weight:700;color:#B96A12;background:#FFF1DE;border-radius:20px;padding:2px 9px;margin-top:8px;}
  .qc-out.zero{color:#3B6D11;background:#EAF3DE;}

  .bars{margin-top:11px;display:flex;flex-direction:column;gap:7px;}
  .bar-row{display:flex;align-items:center;gap:9px;}
  .bar-name{font-size:12px;width:34%;flex-shrink:0;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:15px;background:#F0EDE7;border-radius:7px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:7px;min-width:2px;}
  .bar-right{font-size:11px;font-weight:700;color:var(--text-muted);width:66px;text-align:right;flex-shrink:0;}
  .bar-right .out{color:#B96A12;}
  .leg{font-size:11px;color:var(--text-hint);margin-top:9px;line-height:1.6;}

  .qc-actions{margin-top:12px;display:flex;gap:8px;}
  .qc-btn{flex:1;text-align:center;font-size:12.5px;font-weight:700;text-decoration:none;padding:9px;border-radius:9px;border:1px solid var(--border);color:var(--text-muted);background:var(--bg);}
  .qc-btn.primary{border-color:#E8912D;color:#B96A12;background:#FFF6EA;}

  .empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px 18px;text-align:center;color:var(--text-muted);margin-top:18px;line-height:1.8;}
  .clearall{text-align:center;margin-top:20px;}
  .clearall span{font-size:11px;color:var(--text-hint);text-decoration:underline;cursor:pointer;}
  .app-footer{text-align:center;font-size:11px;color:var(--text-hint);margin-top:2rem;line-height:1.8;}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="taisaku.html" class="back-link"><span class="back-arrow">‹</span>テスト対策</a>
    <a href="index.html" class="back-link">ホーム</a>
  </div>

  <div class="page-head">
    <div class="ph-title">学習記録・苦手分野</div>
    <div class="ph-sub">この端末に保存された、あなたの練習の記録です</div>
  </div>

  <div class="note">
    分野ごとの<b>正答率</b>を、正答率の<b>低い順（苦手な順）</b>に並べています。オレンジの数字は、まだ解き直していない<b>間違い</b>の数です。「復習する」から間違いだけを解き直すと減っていきます。
    <span style="display:block;margin-top:6px;color:var(--text-hint)">※ 記録はこの端末・このブラウザだけに保存されています。分野別の正答率は、この記録を入れて以降の練習から集計されます。</span>
  </div>

  <div id="content"></div>

  <div class="app-footer">© 2025 日本語の部屋</div>
</div>

<script>
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function readJSON(k){ try{ return JSON.parse(localStorage.getItem(k)||'null'); }catch(e){ return null; } }

var QUIZZES=[
  {label:'JLPT N1', badge:'N1', color:'#993C1D', bg:'#FAECE7', statsKey:'jlpt_n1_stats', wrongKey:'jlpt_n1_wrong', catKey:'jlpt_n1_catstats', href:'n1_quiz.html'},
  {label:'JLPT N2', badge:'N2', color:'#854F0B', bg:'#FAEEDA', statsKey:'jlpt_n2_stats', wrongKey:'jlpt_n2_wrong', catKey:'jlpt_n2_catstats', href:'n2_quiz.html'},
  {label:'JLPT N3', badge:'N3', color:'#3C3489', bg:'#EEEDFE', statsKey:'jlpt_n3_stats', wrongKey:'jlpt_n3_wrong', catKey:'jlpt_n3_catstats', href:'n3_quiz.html'},
  {label:'JLPT N4', badge:'N4', color:'#185FA5', bg:'#E6F1FB', statsKey:'jlpt_n4_stats', wrongKey:'jlpt_n4_wrong', catKey:'jlpt_n4_catstats', href:'n4_quiz.html'},
  {label:'JLPT N5', badge:'N5', color:'#3B6D11', bg:'#EAF3DE', statsKey:'jlpt_n5_stats', wrongKey:'jlpt_n5_wrong', catKey:'jlpt_n5_catstats', href:'n5_quiz.html'},
  {label:'J.TEST A-C', badge:'JT', color:'#1E6E8C', bg:'#E1EFF4', wrongKey:'nnhwrong_jtest_ac', catKey:'nnhcat_jtest_ac', href:'jtest_ac.html'},
  {label:'J.TEST D-E', badge:'JT', color:'#1E6E8C', bg:'#E1EFF4', wrongKey:'nnhwrong_jtest_de', catKey:'nnhcat_jtest_de', href:'jtest_de.html'},
  {label:'J.TEST F-G', badge:'JT', color:'#1E6E8C', bg:'#E1EFF4', wrongKey:'nnhwrong_jtest_fg', catKey:'nnhcat_jtest_fg', href:'jtest_fg.html'},
  {label:'BJT 聴解', badge:'BJT', color:'#3C5A78', bg:'#E4EAF1', wrongKey:'nnhwrong_bjt_choukai', catKey:'nnhcat_bjt_choukai', href:'bjt_choukai.html'},
  {label:'BJT 読解', badge:'BJT', color:'#3C5A78', bg:'#E4EAF1', wrongKey:'nnhwrong_bjt_dokkai', catKey:'nnhcat_bjt_dokkai', href:'bjt_dokkai.html'}
];

function catOf(entry){ return entry.sub || entry.sec || 'その他'; }
function accColor(pct){ return pct>=80 ? '#3B6D11' : pct>=60 ? '#C08A1E' : '#C0392B'; }

function analyze(q){
  var wrong=readJSON(q.wrongKey)||{}, outByCat={}, out=0;
  Object.keys(wrong).forEach(function(k){ var c=catOf(wrong[k]); outByCat[c]=(outByCat[c]||0)+1; out++; });
  var cat=readJSON(q.catKey)||{};
  var names={}; Object.keys(cat).forEach(function(c){names[c]=1;}); Object.keys(outByCat).forEach(function(c){names[c]=1;});
  var cats=Object.keys(names).map(function(name){
    var cs=cat[name]||{s:0,c:0};
    return {name:name, seen:cs.s||0, correct:cs.c||0, acc:(cs.s>0?cs.c/cs.s:null), out:(outByCat[name]||0)};
  });
  // 苦手順：正答率の低い順（記録ありを先に）、記録なしは間違い数の多い順で後ろ
  cats.sort(function(a,b){
    if(a.acc==null && b.acc==null) return b.out-a.out;
    if(a.acc==null) return 1;
    if(b.acc==null) return -1;
    if(a.acc!==b.acc) return a.acc-b.acc;
    return b.out-a.out;
  });
  var stats=q.statsKey?readJSON(q.statsKey):null;
  var seenSum=0, corrSum=0; Object.keys(cat).forEach(function(c){ seenSum+=cat[c].s||0; corrSum+=cat[c].c||0; });
  var overall=null;
  if(stats && stats.total>0) overall={total:stats.total, correct:stats.correct, pct:Math.round(stats.correct/stats.total*100)};
  else if(seenSum>0) overall={total:seenSum, correct:corrSum, pct:Math.round(corrSum/seenSum*100)};
  return {out:out, overall:overall, cats:cats, hasData:(out>0 || overall || cats.length>0)};
}

function render(){
  var content=document.getElementById('content');
  var results=QUIZZES.map(function(q){ return {q:q, a:analyze(q)}; }).filter(function(r){ return r.a.hasData; });

  if(results.length===0){
    content.innerHTML='<div class="empty">まだ記録がありません。<br>テスト対策のクイズを解くと、ここに成績と<b>苦手分野</b>がたまっていきます。<br><br><a href="taisaku.html" style="color:var(--accent);font-weight:700;text-decoration:none">クイズを始める ›</a></div>';
    return;
  }

  var totalOut=results.reduce(function(a,r){return a+r.a.out;},0);
  var sumT=0, sumC=0;
  results.forEach(function(r){ if(r.a.overall){ sumT+=r.a.overall.total; sumC+=r.a.overall.correct; } });
  var overallPct = sumT>0 ? Math.round(sumC/sumT*100) : null;

  var html='<div class="summary">'
    + '<div class="sum-box"><div class="sum-num">'+(overallPct!=null?overallPct+'%':'—')+'</div><div class="sum-lbl">全体の正答率</div></div>'
    + '<div class="sum-box"><div class="sum-num">'+totalOut+'</div><div class="sum-lbl">未克服の間違い（問）</div></div>'
    + '<div class="sum-box"><div class="sum-num">'+sumT+'</div><div class="sum-lbl">これまで解いた数</div></div>'
    + '</div>';

  html+='<div class="sec-head">レベル・試験ごとの記録（苦手な分野が上）</div>';

  results.forEach(function(r){
    var q=r.q, a=r.a;
    html+='<div class="qcard" style="--c:'+q.color+'">'
      + '<div class="qc-top">'
        + '<div class="qc-badge" style="background:'+q.bg+';color:'+q.color+'">'+esc(q.badge)+'</div>'
        + '<div class="qc-name">'+esc(q.label)+'</div>'
        + '<div class="qc-acc">'+(a.overall?('<b>'+a.overall.pct+'%</b><br><span style="font-size:10.5px;color:var(--text-hint)">'+a.overall.correct+'/'+a.overall.total+'</span>'):'<span style="font-size:11px;color:var(--text-hint)">記録なし</span>')+'</div>'
      + '</div>'
      + '<div><span class="qc-out'+(a.out===0?' zero':'')+'">'+(a.out===0?'未克服の間違い 0問':'未克服の間違い '+a.out+'問')+'</span></div>';

    if(a.cats.length){
      html+='<div class="bars">';
      a.cats.forEach(function(c){
        var right, fill;
        if(c.acc!=null){
          var pct=Math.round(c.acc*100);
          fill='<div class="bar-fill" style="width:'+pct+'%;background:'+accColor(pct)+'"></div>';
          right='<span style="color:'+accColor(pct)+'">'+pct+'%</span> <span style="color:var(--text-hint);font-weight:400">'+c.correct+'/'+c.seen+'</span>'+(c.out>0?' <span class="out">・'+c.out+'</span>':'');
        } else {
          fill='<div class="bar-fill" style="width:100%;background:#F0D8B0"></div>';
          right='<span class="out">間違い '+c.out+'</span>';
        }
        html+='<div class="bar-row"><div class="bar-name" title="'+esc(c.name)+'">'+esc(c.name)+'</div>'
          + '<div class="bar-track">'+fill+'</div>'
          + '<div class="bar-right">'+right+'</div></div>';
      });
      html+='</div><div class="leg">数字＝正答率（正解/挑戦）。「・数字」＝未克服の間違い。棒は 赤=要注意／黄=あと少し／緑=得意。</div>';
    }

    html+='<div class="qc-actions">'
      + (a.out>0 ? '<a class="qc-btn primary" href="'+q.href+'?review=1">🔁 間違いだけ復習（'+a.out+'）</a>' : '')
      + '<a class="qc-btn" href="'+q.href+'">問題を解く</a>'
      + '</div>'
    + '</div>';
  });

  html+='<div class="clearall"><span id="clearAll">すべての学習記録を消す</span></div>';
  content.innerHTML=html;

  var ca=document.getElementById('clearAll');
  if(ca) ca.addEventListener('click', function(){
    if(!confirm('この端末に保存された、すべての成績・分野別記録・間違い記録を消しますか？この操作は元に戻せません。')) return;
    QUIZZES.forEach(function(q){ try{ localStorage.removeItem(q.wrongKey); if(q.statsKey) localStorage.removeItem(q.statsKey); if(q.catKey) localStorage.removeItem(q.catKey); }catch(e){} });
    render();
  });
}
render();
</script>
</body>
</html>
