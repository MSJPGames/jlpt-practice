<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文型解説 ・ Grammar Patterns ・ 日本語の部屋</title>
<style>
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --border: #E2DDD6;
    --text: #1C1C1C; --text-muted: #6B6560; --text-hint: #9E9890;
    --radius: 14px; --radius-sm: 10px;
    --n5: #3B6D11; --n5-bg: #EAF3DE;
    --n4: #185FA5; --n4-bg: #E6F1FB;
    --n3: #3C3489; --n3-bg: #EEEDFE;
    --n2: #854F0B; --n2-bg: #FAEEDA;
    --n1: #993C1D; --n1-bg: #FAECE7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 1rem 3rem;
    -webkit-text-size-adjust: 100%;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .back {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 1.25rem;
    font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .back:hover { color: var(--text); }
  .app-header { text-align: center; padding: 1rem 0 0.5rem; }
  .app-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-hint); margin-bottom: 8px; }
  .app-title { font-size: 24px; font-weight: 700; letter-spacing: 0.02em; }
  .app-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }

  .filter { display: flex; gap: 6px; margin: 1rem 0 1.25rem; background: #ECE8E1; padding: 4px; border-radius: 11px; }
  .filter button {
    flex: 1; padding: 9px 4px; font-size: 13px; font-weight: 700; color: var(--text-muted);
    background: transparent; border: none; border-radius: 8px; cursor: pointer; font-family: inherit;
    transition: background 0.15s, color 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .filter button.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  #filterBook { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: thin; scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch; cursor: grab; padding-bottom: 5px; }
  #filterBook.dragging { cursor: grabbing; scroll-behavior: auto; }
  #filterBook::-webkit-scrollbar { height: 7px; }
  #filterBook::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.22); border-radius: 4px; }
  #filterBook::-webkit-scrollbar-track { background: transparent; }
  #filterBook button { flex: 0 0 auto; white-space: nowrap; padding-left: 12px; padding-right: 12px; }

  .cat-head { font-size: 16px; font-weight: 700; margin: 1.6rem 0 0.3rem; display: flex; align-items: center; gap: 9px; }
  .cat-head:first-of-type { margin-top: 0.5rem; }
  .cat-bar { width: 4px; height: 19px; border-radius: 2px; }
  .form-head { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-hint); text-transform: uppercase; margin: 1rem 0 0.5rem; }

  .bk-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 15px 16px; margin-bottom: 10px; scroll-margin-top: 16px;
  }
  .bk-card:target { animation: flash 1.4s ease; border-color: var(--n4); }
  @keyframes flash { 0% { background: #FFF3DC; } 100% { background: var(--surface); } }
  .bk-top { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .bk-p { font-size: 18px; font-weight: 700; }
  .bk-lvl { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 8px; }
  .lvl-n5 { background: var(--n5-bg); color: var(--n5); }
  .lvl-n4 { background: var(--n4-bg); color: var(--n4); }
  .lvl-n3 { background: var(--n3-bg); color: var(--n3); }
  .lvl-n2 { background: var(--n2-bg); color: var(--n2); }
  .lvl-n1 { background: var(--n1-bg); color: var(--n1); }
  .lvl-other { background: #ECE8E1; color: var(--text-muted); }
  .bk-en { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .bk-setsuzoku {
    font-size: 12px; color: var(--text); background: #FAF8F4; border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 11px; margin-top: 10px;
  }
  .bk-setsuzoku b { font-weight: 700; }
  .bk-ex { margin-top: 11px; display: flex; flex-direction: column; gap: 9px; }
  .bk-ex-item { padding-left: 11px; border-left: 2px solid var(--border); }
  .bk-ex-ja { font-size: 14px; font-weight: 600; line-height: 1.5; }
  .bk-ex-en { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
  .bk-note { font-size: 11.5px; color: var(--text-hint); margin-top: 10px; line-height: 1.55; }
  .bk-note b { color: var(--text-muted); }
  .bk-kaiwa { display: inline-flex; align-items: center; gap: 5px; margin-top: 12px; font-size: 12.5px; font-weight: 700;
    color: #4A5DB0; background: #ECEEF9; border: 1px solid #C9CEF0; border-radius: 20px; padding: 7px 14px;
    text-decoration: none; -webkit-tap-highlight-color: transparent; transition: background .15s, transform .1s; }
  .bk-kaiwa:hover { background: #E1E4F6; }
  .bk-kaiwa:active { transform: scale(.98); }
  .bk-renshu { color: #6B4B12; background: #FAEEDA; border-color: #EAD6AE; margin-left: 6px; }
  .bk-renshu:hover { background: #F3E4C6; }

  .app-footer { text-align: center; font-size: 11px; color: var(--text-hint); margin-top: 2.5rem; line-height: 1.8; }

  /* 検索窓 */
  .search-wrap { position: relative; margin: 1.1rem 0 0.7rem; }
  .search-wrap .s-ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-hint); pointer-events: none; }
  #search {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--text);
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    padding: 12px 40px; -webkit-appearance: none; appearance: none; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search:focus { border-color: var(--n4); box-shadow: 0 0 0 3px var(--n4-bg); }
  #search::placeholder { color: var(--text-hint); }
  #search::-webkit-search-cancel-button { display: none; }
  .s-clear {
    position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px; border: none; background: #ECE8E1; color: var(--text-muted);
    border-radius: 50%; font-size: 16px; line-height: 1; cursor: pointer; padding: 0;
    display: none; align-items: center; justify-content: center;
  }
  .s-clear.show { display: flex; }

  .result-meta { font-size: 11px; color: var(--text-hint); margin: 0 2px 1rem; }

  /* 五十音の行見出し */
  .goju-head {
    display: inline-block; font-size: 14px; font-weight: 800; color: var(--n4);
    background: var(--n4-bg); padding: 2px 13px; border-radius: 999px; margin: 1.4rem 0 0.6rem;
  }
  .goju-head:first-of-type { margin-top: 0.2rem; }

  /* カードの分類タグ */
  .bk-cat { font-size: 10px; font-weight: 700; color: var(--text-hint); letter-spacing: 0.03em; margin-bottom: 5px; }
  .bk-cat b { color: var(--text-muted); font-weight: 700; }

  .no-result { text-align: center; color: var(--text-muted); padding: 36px 10px; font-size: 14px; line-height: 1.7; }

  /* モード切替（解説 / 課別） */
  .mode-toggle { display: flex; gap: 6px; margin: 1rem 0 0.9rem; background: #ECE8E1; padding: 4px; border-radius: 11px; }
  .mode-toggle button {
    flex: 1; padding: 10px 4px; font-size: 13.5px; font-weight: 700; color: var(--text-muted);
    background: transparent; border: none; border-radius: 8px; cursor: pointer; font-family: inherit;
    transition: background 0.15s, color 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .mode-toggle button.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.07); }

  /* 出典タグ（解説カード内・教科書＋課） */
  .src-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .src-tag { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 9px; border-radius: 8px; }

  /* 課別モード */
  .ka-head { display: flex; align-items: center; gap: 8px; margin: 1.5rem 0 0.6rem; }
  .ka-head:first-of-type { margin-top: 0.3rem; }
  .ka-badge { font-size: 14px; font-weight: 800; padding: 3px 12px; border-radius: 999px; }
  .ka-book { font-size: 11px; font-weight: 700; color: var(--text-hint); }
  .ka-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px 16px; margin-bottom: 10px; }
  .ka-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 11px 0; border-top: 1px solid var(--border); font-size: 14.5px; line-height: 1.5; }
  .ka-row:first-child { border-top: none; }
  .ka-row .kdot { color: var(--text-hint); font-size: 11px; flex-shrink: 0; }
  .ka-row .kp { flex: 1; min-width: 55%; }
  .row-tags { display: flex; gap: 5px; margin-left: auto; flex-shrink: 0; }
  .tg { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; border: none; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }
  .tg-book { background: #F1EEE8; color: var(--text-muted); }
  .tg.lv-n5 { background: var(--n5-bg); color: var(--n5); }
  .tg.lv-n4 { background: var(--n4-bg); color: var(--n4); }
  .tg.lv-n3 { background: var(--n3-bg); color: var(--n3); }
  .tg.lv-n2 { background: var(--n2-bg); color: var(--n2); }
  .tg.lv-n1 { background: var(--n1-bg); color: var(--n1); }
  .tg.lv-other { background: #ECE8E1; color: var(--text-muted); }
  .book-sec-head { display: flex; align-items: center; gap: 9px; font-size: 16px; font-weight: 700; margin: 1.7rem 0 0.8rem; }
  .book-sec:first-child .book-sec-head { margin-top: 0.4rem; }
  .book-bar { width: 4px; height: 19px; border-radius: 2px; flex-shrink: 0; }
  .book-sec-num { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--text-hint); }
  .ka-links { padding: 11px 0 13px; border-top: 1px dashed var(--border); display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .ka-links .lab { font-size: 11px; font-weight: 700; color: var(--text-hint); }
  .ka-link { font-size: 12px; font-weight: 700; color: var(--n5); background: var(--n5-bg); padding: 3px 10px; border-radius: 999px; text-decoration: none; cursor: pointer; border: none; font-family: inherit; }
  .ka-link:hover { filter: brightness(0.97); }
  mark { background: #FBE7C2; color: inherit; border-radius: 3px; padding: 0 1px; }
</style>
</head>
<body>
<div class="container">

  <a href="katsuyo.html" class="back">‹ 活用表にもどる</a>

  <div class="app-header">
    <div class="app-logo">NIHONGO NO HEYA</div>
    <div class="app-title">文型解説</div>
    <div class="app-sub">活用を使う文型 ・ Grammar Patterns</div>
  </div>

  <div class="mode-toggle" id="mode">
    <button data-mode="kaisetsu" class="on">解説で見る</button>
    <button data-mode="book">教科書で見る</button>
  </div>

  <div class="search-wrap">
    <span class="s-ico">🔍</span>
    <input id="search" type="search" inputmode="search" autocomplete="off" placeholder="文型・タグでさがす（例：たい・N5・15課）">
    <button id="sClear" class="s-clear" type="button" aria-label="消す">×</button>
  </div>

  <div class="filter" id="filter">
    <button data-lv="all" class="on">すべて</button>
    <button data-lv="N5">N5</button>
    <button data-lv="N4">N4</button>
    <button data-lv="N3">N3</button>
    <button data-lv="N2">N2</button>
    <button data-lv="N1">N1</button>
    <button data-lv="その他">その他</button>
  </div>

  <div class="filter" id="filterBook" style="display:none;"></div>

  <div class="result-meta" id="meta"></div>

  <div id="list"></div>

  <div class="app-footer">
    例文・レベルは目安です（『みんなの日本語』ほか参考）<br>
    © 2025 日本語の部屋
  </div>

</div>

<script>
const CATBAR={ '動詞':'#185FA5', 'い形容詞':'#854F0B', 'な形容詞':'#1F6F6B' };
const D=[
  // 動詞 ・ 辞書形
  {cat:'動詞',form:'辞書形',id:'dict-koto-dekiru',p:'〜ことができます',lvl:'N4',en:'can do ~ / be able to ~',setu:'辞書形 ＋ ことができます',ex:[['私はピアノを弾くことができます。','I can play the piano.'],['ここで写真を撮ることができます。','You can take photos here.']],note:'名詞のときは「名詞＋ができます」。'},
  {cat:'動詞',form:'辞書形',id:'dict-mae-ni',p:'〜まえに',lvl:'N4',en:'before doing ~',setu:'辞書形 ＋ まえに',ex:[['寝るまえに、歯をみがきます。','I brush my teeth before going to bed.']],note:'名詞のときは「名詞＋のまえに」（食事のまえに）。'},
  {cat:'動詞',form:'辞書形',id:'dict-toki',p:'〜とき',lvl:'N4',en:'when ~',setu:'辞書形・た形・ない形・い形/な形/名詞 ＋ とき',ex:[['日本へ行くとき、かばんを買いました。','When I was on my way to Japan, I bought a bag.'],['子どものとき、よく泣きました。','When I was a child, I cried a lot.']],note:'「行くとき」は出発前、「行ったとき」は到着後。'},
  {cat:'動詞',form:'辞書形',id:'dict-tsumori',p:'〜つもりです',lvl:'N4',en:'intend to ~ / plan to ~',setu:'辞書形 ＋ つもりです（否定は ないつもりです）',ex:[['夏休みに国へ帰るつもりです。','I intend to go back to my country during summer vacation.']],note:''},
  {cat:'動詞',form:'辞書形',id:'tameni',p:'〜ために',lvl:'N3',en:"in order to ~ (purpose)",setu:'辞書形 ＋ ために',ex:[['日本語を勉強するために、日本へ来ました。',"I came to Japan in order to study Japanese."]],note:'名詞のときは「名詞＋のために」。'},
  {cat:'動詞',form:'辞書形',id:'tokoroda',p:'〜ところです',lvl:'N3',en:"be about to ~",setu:'辞書形 ＋ ところだ',ex:[['これから出かけるところです。',"I'm just about to go out now."]],note:'「〜ているところ」＝最中、「〜たところ」＝直後。'},
  {cat:'動詞',form:'辞書形',id:'uchini',p:'〜うちに',lvl:'N3',en:"while ~ / before it changes",setu:'辞書形・〜ている・ない形 ＋ うちに',ex:[['熱いうちに、召し上がってください。',"Please eat it while it's hot."]],note:'名詞のときは「名詞＋のうちに」。'},
  {cat:'動詞',form:'辞書形',id:'kotonisuru',p:'〜ことにします',lvl:'N4',en:"decide to ~",setu:'辞書形・ない形 ＋ ことにする',ex:[['来月から運動することにしました。',"I've decided to start exercising next month."]],note:'自分の意志で決めるとき。'},
  {cat:'動詞',form:'辞書形',id:'kotoninaru',p:'〜ことになります',lvl:'N4',en:"it has been decided that ~",setu:'辞書形・ない形 ＋ ことになる',ex:[['来月、大阪へ転勤することになりました。',"It has been decided that I'll be transferred to Osaka next month."]],note:'自分の決定は「ことにする」。'},
  {cat:'動詞',form:'辞書形',id:'bekida',p:'〜べきです',lvl:'N2',en:"should ~ / ought to ~",setu:'辞書形 ＋ べきだ（する→すべき／するべき）',ex:[['約束は守るべきだ。',"You should keep your promises."]],note:'否定は「〜べきではない」。'},
  {cat:'動詞',form:'辞書形',id:'tokorodatta',p:'〜ところでした',lvl:'N2',en:"almost ~ed / was about to ~",setu:'辞書形 ＋ ところだった',ex:[['あぶない！車にぶつかるところだった。',"Watch out! I almost got hit by a car."]],note:'実際には起こらなかったことを表す。'},
  // 動詞 ・ 普通形（推量・伝聞）
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'souda-hearsay',p:'〜そうです',lvl:'N3',en:"I hear that ~ (hearsay)",setu:'普通形 ＋ そうだ',ex:[['田中さんは来月結婚するそうだ。',"I hear that Mr. Tanaka is getting married next month."]],note:'様態の「降りそうだ（=今にも降る）」とは別。'},
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'youda',p:'〜ようです／みたいです',lvl:'N3',en:"it seems ~ / looks like ~",setu:'普通形 ＋ ようだ（な形＋な・名詞＋の）',ex:[['だれか来たようだ。',"It seems that someone has come."]],note:'話し言葉では「みたいだ」。'},
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'rashii',p:'〜らしいです',lvl:'N3',en:"apparently ~ / seem ~",setu:'普通形 ＋ らしい',ex:[['山田さんは会社をやめたらしい。',"Apparently Mr. Yamada has quit the company."]],note:'人から聞いた情報にもとづく推量。'},
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'hazuda',p:'〜はずです',lvl:'N3',en:"should be ~ / be supposed to",setu:'普通形 ＋ はずだ（な形＋な・名詞＋の）',ex:[['彼は今日来るはずです。',"He is supposed to come today."]],note:'根拠のある確信。'},
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'kamoshirenai',p:'〜かもしれません',lvl:'N3',en:"might ~ / maybe ~",setu:'普通形 ＋ かもしれない',ex:[['明日は雨が降るかもしれません。',"It might rain tomorrow."]],note:'可能性は「〜だろう」より低い。'},
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'darou',p:'〜でしょう',lvl:'N3',en:"probably ~",setu:'普通形 ＋ だろう（ていねいは でしょう）',ex:[['試験は難しいだろう。',"The exam will probably be difficult."]],note:'「でしょう？」と上げると確認になる。'},
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'nichigainai',p:'〜にちがいありません',lvl:'N2',en:"must be ~ / surely ~",setu:'普通形 ＋ にちがいない',ex:[['彼は知っているにちがいない。',"He must know."]],note:'強い確信。'},
  {cat:'動詞',form:'普通形（推量・伝聞）',id:'monoda',p:'〜ものです',lvl:'N2',en:"should ~ / used to ~ (general truth)",setu:'普通形 ＋ ものだ',ex:[['子どもは早く寝るものだ。',"Children should go to bed early."]],note:'「〜たものだ」は「昔よく〜した」。'},
  // 動詞 ・ 普通形（理由・逆接）
  {cat:'動詞',form:'普通形（理由・逆接）',id:'node',p:'〜ので',lvl:'N3',en:"because ~ (reason)",setu:'普通形 ＋ ので（な形＋な・名詞＋な）',ex:[['用事があるので、お先に失礼します。',"I have something to do, so I'll leave first."]],note:'「から」よりていねい・客観的。'},
  {cat:'動詞',form:'普通形（理由・逆接）',id:'noni',p:'〜のに',lvl:'N3',en:"although ~ / even though ~",setu:'普通形 ＋ のに（な形＋な・名詞＋な）',ex:[['薬を飲んだのに、まだ熱が下がらない。',"Even though I took medicine, my fever still hasn't gone down."]],note:'意外・不満の気持ちを含む。'},
  {cat:'動詞',form:'普通形（理由・逆接）',id:'shi',p:'〜し',lvl:'N3',en:"and (besides) ~ (listing reasons)",setu:'普通形 ＋ し',ex:[['この店は安いし、おいしい。',"This shop is cheap, and the food is good too."]],note:'理由を並べて述べる。'},
  {cat:'動詞',form:'普通形（理由・逆接）',id:'kuseni',p:'〜くせに',lvl:'N2',en:"even though ~ (criticism)",setu:'普通形 ＋ くせに',ex:[['知っているくせに、教えてくれない。',"Even though he knows, he won't tell me."]],note:'非難・不満の気持ちを含む。主語は同じ。'},
  {cat:'動詞',form:'普通形（理由・逆接）',id:'wakeda',p:'〜わけです',lvl:'N2',en:"that's why ~ / no wonder ~",setu:'普通形 ＋ わけだ',ex:[['道理で寒いわけだ。雪が降っている。',"No wonder it's cold — it's snowing."]],note:'当然の結論として納得するとき。'},
  // 動詞 ・ 連用形（ます形）
  {cat:'動詞',form:'連用形（ます形）',id:'masu-tai',p:'〜たいです',lvl:'N5',en:'want to ~',setu:'ます形（語幹）＋ たいです',ex:[['冷たい水が飲みたいです。','I want to drink some cold water.']],note:'他人の願望は「〜たがっています」。'},
  {cat:'動詞',form:'連用形（ます形）',id:'masu-nagara',p:'〜ながら',lvl:'N4',en:'while doing ~',setu:'ます形（語幹）＋ ながら',ex:[['音楽を聞きながら、勉強します。','I study while listening to music.']],note:'二つの動作を同時にする。主語は同じ。'},
  {cat:'動詞',form:'連用形（ます形）',id:'masu-mashou',p:'〜ましょう',lvl:'N5',en:"let's ~ / shall we ~",setu:'ます形（語幹）＋ ましょう／ましょうか／ませんか',ex:[['いっしょに昼ごはんを食べましょう。',"Let's eat lunch together."]],note:'「〜ませんか」はより控えめな誘い方。'},
  {cat:'動詞',form:'連用形（ます形）',id:'masu-yasui',p:'〜やすいです／〜にくいです',lvl:'N4',en:'easy / hard to ~',setu:'ます形（語幹）＋ やすい／にくい',ex:[['このペンは書きやすいです。','This pen is easy to write with.'],['この道は暗くて歩きにくいです。','This street is dark and hard to walk on.']],note:'い形容詞として活用する。'},
  {cat:'動詞',form:'連用形（ます形）',id:'sugiru',p:'〜すぎます',lvl:'N3',en:"too much / over~",setu:'ます形（語幹）＋ すぎる',ex:[['ゆうべは飲みすぎました。',"I drank too much last night."]],note:'い形・な形にも付く（高すぎる・ひますぎる）。'},
  {cat:'動詞',form:'連用形（ます形）',id:'hajimeru',p:'〜はじめます',lvl:'N3',en:"start ~ing",setu:'ます形（語幹）＋ 始める（／終わる・続ける）',ex:[['桜が咲き始めました。',"The cherry blossoms have started to bloom."]],note:'「〜終わる」「〜続ける」も同じ作り方。'},
  {cat:'動詞',form:'連用形（ます形）',id:'tagaru',p:'〜たがります',lvl:'N3',en:"(third person) wants to ~",setu:'ます形（語幹）＋ たがる',ex:[['子どもは外で遊びたがる。',"Children want to play outside."]],note:'自分の願望は「〜たい」。'},
  {cat:'動詞',form:'連用形（ます形）',id:'nasai',p:'〜なさい',lvl:'N4',en:"(gentle command) do ~",setu:'ます形（語幹）＋ なさい',ex:[['早く起きなさい。',"Get up quickly."]],note:'親が子に、先生が生徒に使う。'},
  {cat:'動詞',form:'連用形（ます形）',id:'youganai',p:'〜ようがありません',lvl:'N2',en:"there's no way to ~",setu:'ます形（語幹）＋ ようがない',ex:[['連絡先がないので、知らせようがない。',"I have no contact details, so there's no way to let them know."]],note:'手段がなくて不可能なとき。'},
  {cat:'動詞',form:'連用形（ます形）',id:'tsutsuaru',p:'〜つつあります',lvl:'N1',en:"be gradually ~ing",setu:'ます形（語幹）＋ つつある',ex:[['景気は回復しつつある。',"The economy is gradually recovering."]],note:'書き言葉的。変化が進行中であることを表す。'},
  {cat:'動詞',form:'連用形（ます形）',id:'kaneru',p:'〜かねます',lvl:'N1',en:"cannot ~ / be unable to ~",setu:'ます形（語幹）＋ かねる',ex:[['その件については、お答えしかねます。',"I am unable to answer regarding that matter."]],note:'ていねいに断るときに使う改まった表現。'},
  // 動詞 ・ て形
  {cat:'動詞',form:'て形',id:'te-kudasai',p:'〜てください',lvl:'N5',en:'please do ~ (request)',setu:'て形 ＋ ください',ex:[['ここに住所を書いてください。','Please write your address here.']],note:'やわらかく言うときは「〜てくださいませんか」。'},
  {cat:'動詞',form:'て形',id:'te-mo-ii',p:'〜てもいいです',lvl:'N5',en:"may ~ / it's OK to ~ (permission)",setu:'て形 ＋ もいいです',ex:[['ここでたばこを吸ってもいいですか。','May I smoke here?']],note:'答えは「はい、どうぞ」「いいえ、〜てはいけません」。'},
  {cat:'動詞',form:'て形',id:'te-wa-ikenai',p:'〜てはいけません',lvl:'N5',en:'must not ~ (prohibition)',setu:'て形 ＋ はいけません',ex:[['ここに入ってはいけません。','You must not enter here.']],note:'話し言葉では「〜ちゃいけない」。'},
  {cat:'動詞',form:'て形',id:'te-iru',p:'〜ています',lvl:'N5',en:'be ~ing / state / habit',setu:'て形 ＋ います',ex:[['今、雨が降っています。','It is raining now.'],['兄は銀行で働いています。','My older brother works at a bank.']],note:'進行・結果の状態・習慣を表す。'},
  {cat:'動詞',form:'て形',id:'te-kara',p:'〜てから',lvl:'N4',en:'after doing ~',setu:'て形 ＋ から',ex:[['手を洗ってから、ごはんを食べます。','I eat after washing my hands.']],note:'前の動作が終わってから次をする。'},
  {cat:'動詞',form:'て形',id:'temiru',p:'〜てみます',lvl:'N4',en:"try ~ing",setu:'て形 ＋ みる',ex:[['この服を着てみてもいいですか。',"May I try on this dress?"]],note:'ためしに何かをする。'},
  {cat:'動詞',form:'て形',id:'temo',p:'〜ても',lvl:'N3',en:"even if ~",setu:'て形 ＋ も',ex:[['雨が降っても、行きます。',"Even if it rains, I'll go."]],note:'疑問詞と使うと「いくら〜ても」。'},
  {cat:'動詞',form:'て形',id:'teshimau',p:'〜てしまいます',lvl:'N3',en:"do completely / by mistake (regret)",setu:'て形 ＋ しまう',ex:[['大切な書類をなくしてしまった。',"I lost an important document (unfortunately)."]],note:'完了、または残念な気持ち。話し言葉「〜ちゃう」。'},
  {cat:'動詞',form:'て形',id:'teoku',p:'〜ておきます',lvl:'N3',en:"do ~ in advance / leave as is",setu:'て形 ＋ おく',ex:[['旅行の前にホテルを予約しておきます。',"I'll book a hotel in advance before the trip."]],note:'準備。話し言葉「〜とく」。'},
  {cat:'動詞',form:'て形',id:'tehoshii',p:'〜てほしいです',lvl:'N3',en:"want someone to ~",setu:'て形 ＋ ほしい',ex:[['もっと早く来てほしかった。',"I wanted you to come earlier."]],note:'相手にしてもらいたいこと。'},
  // 動詞 ・ ない形
  {cat:'動詞',form:'ない形',id:'nai-de-kudasai',p:'〜ないでください',lvl:'N5',en:"please don't ~",setu:'ない形 ＋ でください',ex:[['ここで写真を撮らないでください。',"Please don't take photos here."]],note:''},
  {cat:'動詞',form:'ない形',id:'nakereba-naranai',p:'〜なければなりません',lvl:'N4',en:'must ~ / have to ~',setu:'ない形（語幹）＋ なければなりません',ex:[['毎日薬を飲まなければなりません。','I have to take medicine every day.']],note:'＝「〜なくてはいけません」。話し言葉「〜なきゃ」。'},
  {cat:'動詞',form:'ない形',id:'nakutemo-ii',p:'〜なくてもいいです',lvl:'N4',en:"don't have to ~",setu:'ない形（語幹）＋ なくてもいいです',ex:[['明日は来なくてもいいです。',"You don't have to come tomorrow."]],note:''},
  {cat:'動詞',form:'ない形',id:'nai-hou-ga-ii',p:'〜ないほうがいいです',lvl:'N4',en:'had better not ~ (advice)',setu:'ない形 ＋ ほうがいいです',ex:[['たばこは吸わないほうがいいです。',"You'd better not smoke."]],note:'肯定の助言は「た形＋ほうがいいです」。'},
  {cat:'動詞',form:'ない形',id:'naito',p:'〜ないと（いけない）',lvl:'N4',en:"have to ~ / if not ~",setu:'ない形 ＋ と（いけない・だめだ）',ex:[['もう行かないと。',"I have to go now."]],note:'「〜なければならない」のくだけた言い方。'},
  {cat:'動詞',form:'ない形',id:'nakunaru',p:'〜なくなります',lvl:'N3',en:"come not to ~ / stop ~ing",setu:'ない形（語幹）＋ なくなる',ex:[['最近、彼は学校に来なくなった。',"Recently he stopped coming to school."]],note:'できなくなる変化は「〜られなくなる」。'},
  // 動詞 ・ た形
  {cat:'動詞',form:'た形',id:'ta-koto-ga-aru',p:'〜たことがあります',lvl:'N4',en:'have done ~ (experience)',setu:'た形 ＋ ことがあります',ex:[['北海道へ行ったことがあります。','I have been to Hokkaido.']],note:'過去の経験を表す。'},
  {cat:'動詞',form:'た形',id:'ta-hou-ga-ii',p:'〜たほうがいいです',lvl:'N4',en:'had better ~ (advice)',setu:'た形 ＋ ほうがいいです',ex:[['早く病院へ行ったほうがいいです。',"You'd better go to the hospital soon."]],note:''},
  {cat:'動詞',form:'た形',id:'tari-tari',p:'〜たり〜たりします',lvl:'N4',en:'do things like ~ and ~',setu:'た形 ＋ り、〜た形 ＋ り します',ex:[['日曜日はそうじをしたり、せんたくをしたりします。','On Sundays I do things like cleaning and laundry.']],note:'動作を例として並べる。'},
  {cat:'動詞',form:'た形',id:'ta-ato-de',p:'〜たあとで',lvl:'N4',en:'after ~',setu:'た形 ＋ あとで',ex:[['仕事が終わったあとで、飲みに行きます。','After work, I go out for a drink.']],note:'名詞のときは「名詞＋のあとで」。'},
  {cat:'動詞',form:'た形',id:'tara',p:'〜たら',lvl:'N4',en:"if / when ~",setu:'た形 ＋ ら',ex:[['駅に着いたら、電話してください。',"When you arrive at the station, please call me."]],note:'最も広く使える条件表現。'},
  {cat:'動詞',form:'た形',id:'tatokoro',p:'〜たところです',lvl:'N3',en:"have just ~ed",setu:'た形 ＋ ところだ',ex:[['今、家に帰ってきたところです。',"I've just come home now."]],note:'動作の直後を表す。'},
  {cat:'動詞',form:'た形',id:'tabakari',p:'〜たばかりです',lvl:'N3',en:"just did ~ (a moment ago)",setu:'た形 ＋ ばかりだ',ex:[['さっき昼ごはんを食べたばかりです。',"I just ate lunch a little while ago."]],note:'「〜たところ」より時間に幅がある。'},
  {cat:'動詞',form:'た形',id:'tamama',p:'〜たまま',lvl:'N3',en:"leaving ~ (in a state)",setu:'た形 ＋ まま',ex:[['電気をつけたまま、寝てしまった。',"I fell asleep with the light left on."]],note:'ある状態が続いたまま次のことをする。'},
  // 動詞 ・ 意向形
  {cat:'動詞',form:'意向形',id:'you-to-omou',p:'〜（よ）うと思います',lvl:'N4',en:'I think I will ~ / intend to ~',setu:'意向形 ＋ と思います',ex:[['週末はうちで休もうと思います。','I think I will rest at home this weekend.']],note:'その場で決めたことは「〜ようと思います」より「〜ます」。'},
  {cat:'動詞',form:'意向形',id:'you-to-suru',p:'〜（よ）うとします',lvl:'N4',en:'try to ~ / be about to ~',setu:'意向形 ＋ とします',ex:[['出かけようとしたとき、電話が鳴りました。','Just as I was about to go out, the phone rang.']],note:''},
  // 動詞 ・ 条件形
  {cat:'動詞',form:'条件形',id:'ba',p:'〜ば、…',lvl:'N4',en:'if ~ (condition)',setu:'条件形（〜ば）',ex:[['安ければ、買います。',"If it's cheap, I'll buy it."],['ボタンを押せば、ドアが開きます。','If you press the button, the door opens.']],note:'自然・一般的な条件によく使う。'},
  {cat:'動詞',form:'条件形',id:'ba-yokatta',p:'〜ばよかった',lvl:'N3',en:'should have ~ (regret)',setu:'条件形 ＋ よかった',ex:[['もっと早く来ればよかった。','I should have come earlier.']],note:'しなかったことへの後悔。'},
  // 動詞 ・ 可能動詞
  {cat:'動詞',form:'可能動詞',id:'you-ni-naru',p:'〜ようになります',lvl:'N4',en:'come to be able to ~ (change)',setu:'可能動詞（辞書形）＋ ようになります',ex:[['日本語が話せるようになりました。','I have become able to speak Japanese.']],note:'能力・習慣の変化。否定は「〜なくなりました」。'},
  {cat:'動詞',form:'可能動詞',id:'kanou-joukyou',p:'可能動詞〈能力・状況〉',lvl:'N4',en:'can ~ (ability / situation)',setu:'〈物・こと〉が ＋ 可能動詞',ex:[['私は日本語が話せます。','I can speak Japanese.'],['このカードで払えます。','You can pay with this card.']],note:'能力（話せる）だけでなく、状況的な可能（払える・入れる）にも使う。対象は「が」で示す。'},
  {cat:'動詞',form:'可能動詞',id:'dekiru-kansei',p:'できます〈完成・出現〉',lvl:'N4',en:'be ready / come into being',setu:'できる ＝ 出来上がる・生じる（可能とは別の用法）',ex:[['昼ごはんができました。','Lunch is ready.'],['駅前に新しい店ができました。','A new shop has opened near the station.'],['日本人の友達ができました。','I made a Japanese friend.']],note:'「〜できる（可能）」とは別の用法。「赤ちゃんができる」＝妊娠する。'},
  // 動詞 ・ 受身動詞
  {cat:'動詞',form:'受身動詞',id:'ukemi-chokusetsu',p:'〜（ら）れます〈直接受身〉',lvl:'N4',en:'be ~ed (direct passive)',setu:'〈受ける人〉は〈する人〉に ＋ 受身動詞',ex:[['私は先生にほめられました。','I was praised by the teacher.'],['弟は父にしかられました。','My brother was scolded by our father.']],note:'動作を受ける人が主語。する人は「に」で示す。'},
  {cat:'動詞',form:'受身動詞',id:'ukemi-mochinushi',p:'〜（ら）れます〈持ち主の受身〉',lvl:'N4',en:'have your ~ ~ed',setu:'〈人〉は〈人〉に〈体・持ち物〉を ＋ 受身動詞',ex:[['私は弟に日記を読まれました。','I had my diary read by my brother.'],['電車で足を踏まれました。','I had my foot stepped on in the train.']],note:'体の一部や持ち物を「を」で示す。迷惑・被害を表すことが多い。'},
  {cat:'動詞',form:'受身動詞',id:'ukemi-meiwaku',p:'〜（ら）れます〈迷惑・間接受身〉',lvl:'N3',en:'be adversely affected by ~',setu:'自動詞でも作れる：〈人〉は〜に ＋ 受身動詞',ex:[['雨に降られて、ぬれてしまいました。','I got rained on and got wet.'],['夜、子どもに泣かれて眠れませんでした。',"The baby cried on me at night, so I could not sleep."]],note:'「迷惑の受身」。降る・泣く・来る などの自動詞からも作り、被害・迷惑を表す。'},
  {cat:'動詞',form:'受身動詞',id:'ukemi-hijou',p:'〜（ら）れます〈物の受身〉',lvl:'N4',en:'(a thing) is ~ed',setu:'〈物・こと〉が／は ＋ 受身動詞。作り手は「〜によって」',ex:[['このお酒は米から作られます。','This sake is made from rice.'],['オリンピックは4年に一度開かれます。','The Olympics are held once every four years.']],note:'「非情の受身」。作られる・行われる・輸出される など。行為者は「に」より「によって」。'},
  {cat:'動詞',form:'受身動詞',id:'jihatsu',p:'〜（ら）れます〈自発〉',lvl:'N2',en:'~ comes about naturally (spontaneous)',setu:'思考・感情の動詞 ＋ （ら）れる',ex:[['故郷のことが思い出されます。','Memories of my hometown come to mind naturally.'],['子どもの将来が案じられます。',"I cannot help worrying about my child's future."]],note:'「自然とそうなる」用法。思い出される・感じられる・案じられる など限られた動詞で使う。'},
  // 動詞 ・ 使役動詞
  {cat:'動詞',form:'使役動詞',id:'saseru-kyousei',p:'〜（さ）せます〈強制・指示〉',lvl:'N4',en:'make someone do ~ (coercion)',setu:'〈人〉に〈物〉を ＋ 使役（他動詞）／〈人〉を ＋ 使役（自動詞）',ex:[['先生は学生に本を読ませました。','The teacher made the students read the book.'],['母は子どもを塾へ行かせます。','The mother makes her child go to cram school.']],note:'目上が目下にさせる基本の使役。他動詞は人を「に」、自動詞は人を「を」で示す。目上の人には使えない。'},
  {cat:'動詞',form:'使役動詞',id:'saseru-kyoka',p:'〜（さ）せます〈許可・容認〉',lvl:'N4',en:'let / allow someone to ~ (permission)',setu:'〈人〉に ＋ 使役（相手の希望を認める）',ex:[['母は子どもを好きなだけ遊ばせました。','The mother let her child play as much as they wanted.'],['娘が行きたがっているので、留学させます。','My daughter wants to go, so I will let her study abroad.']],note:'強制と同じ形だが、相手の希望を認める「〜させる」。「〜させてあげる／〜させておく」も許可・放任の用法。文脈で強制と区別する。'},
  {cat:'動詞',form:'使役動詞',id:'saseru-yuuhatsu',p:'〜（さ）せます〈誘発・感情〉',lvl:'N3',en:'cause (an emotion) in someone',setu:'〈人〉を ＋ 感情の使役（泣く→泣かせる 等）',ex:[['彼はいつもみんなを笑わせます。','He always makes everyone laugh.'],['私は両親を心配させてしまった。','I ended up making my parents worry.']],note:'感情・生理的反応を引き起こす用法。喜ばせる・悲しませる・驚かせる・困らせる など。相手は「を」で示す。'},
  {cat:'動詞',form:'使役動詞',id:'sasete-kudasai',p:'〜（さ）せてください',lvl:'N4',en:'please let me ~',setu:'使役動詞の て形 ＋ ください',ex:[['その仕事は私にやらせてください。','Please let me do that job.']],note:'自分がしたいことの許可を求める。'},
  {cat:'動詞',form:'使役動詞',id:'saserareru',p:'〜（さ）せられます',lvl:'N3',en:"be made to ~ (causative-passive)",setu:'使役動詞 → せる を せられる に変える',ex:[['子どものとき、毎日ピアノを練習させられた。',"As a child, I was made to practice the piano every day."]],note:'1グループは「〜される」とも（飲ませられる→飲まされる）。'},
  // 動詞 ・ 命令形・禁止形
  {cat:'動詞',form:'命令形・禁止形',id:'meirei-kinshi',p:'〜ろ（命令）／〜な（禁止）',lvl:'N4',en:'(blunt) command / prohibition',setu:'命令形（〜ろ・〜け）／ 辞書形 ＋ な',ex:[['早く起きろ。','Get up, now!'],['ここに入るな。',"Don't come in here!"]],note:'とても強い言い方。ふつうは「〜てください／〜ないでください」を使う。'},
  // い形容詞
  {cat:'い形容詞',form:'て形',id:'i-te',p:'〜くて、…',lvl:'N5',en:'~ and ~ / because ~',setu:'い形容詞：〜い → 〜くて',ex:[['このへやは広くて明るいです。','This room is spacious and bright.']],note:'文をつなぐ。理由を表すこともある。'},
  {cat:'い形容詞',form:'副詞形',id:'i-ku-naru',p:'〜くなります',lvl:'N4',en:'become ~ (change)',setu:'い形容詞：〜い → 〜く ＋ なります',ex:[['さむくなりましたね。',"It's gotten cold, hasn't it?"]],note:'自然な変化。'},
  {cat:'い形容詞',form:'副詞形',id:'i-ku-suru',p:'〜くします',lvl:'N4',en:'make it ~',setu:'い形容詞：〜い → 〜く ＋ する',ex:[['テレビの音を大きくしてください。','Please make the TV louder.']],note:'人が意図的に変える。'},
  {cat:'い形容詞',form:'条件形',id:'i-kereba',p:'〜ければ、…',lvl:'N4',en:'if ~ (i-adjective)',setu:'い形容詞：〜い → 〜ければ',ex:[['天気がよければ、出かけます。',"If the weather is good, I'll go out."]],note:'「いい」は「よければ」。'},
  // な形容詞
  {cat:'な形容詞',form:'て形',id:'na-de',p:'〜で、…',lvl:'N5',en:'~ and ~ / because ~',setu:'な形容詞：語幹 ＋ で',ex:[['この町はしずかできれいです。','This town is quiet and beautiful.']],note:'名詞文も同じ：「学生で…」。'},

/* === 文型データ（教科書横断） ======================================================
   1つの文型が「どの教科書の何課に出るか」を持つ。重なる文型は複数の教科書タグが付く。
   ・みん日：上の LESSONS から自動生成。
   ・げんき：下の GENKI_MAP で合流。 s='みん日の文型'（重なる→タグ追加） / n='新しい文型'（重ならない→新規追加）。
     同じ文型が複数の課に出る場合は、その課ぶんだけ行を並べればOK（例：{g:2,s:'〜も〜です'} と {g:4,s:'〜も〜です'}）。
   ================================================================================ */
const PATTERNS = [];
const _byText = {};
function _add(text){ if(!_byText[text]){ const o={ p:text, books:{} }; _byText[text]=o; PATTERNS.push(o); } return _byText[text]; }
function _tag(o, bookId, lesson){ const a=(o.books[bookId]=o.books[bookId]||[]); if(!a.includes(lesson)) a.push(lesson); }

// みん日（LESSONS から）
LESSONS.forEach(ls => ls.p.forEach(p => _tag(_add(p), 'minna', ls.l)));

// みん中 → 共通文型 対応表（一致すれば統合し相互参照、無ければ独自文型）
const MINCHU_MERGE = {
  "〜こそ（取りたて助詞）":"〜こそ／〜からこそ",
  "〜た（名詞修飾）":"名詞修飾",
  "〜（さ）せられる・〜される（使役受身）":"使役受身（〜させられる）"
,
  "〜あまり（に）":"〜あまり（に）／〜あまりの"
};
function minchuAdd(p, l){ const c=MINCHU_MERGE[p]; if(c && _byText[c]){ _tag(_byText[c],'minchu',l); } else { _tag(_add(p),'minchu',l); } }
MINCHU_DATA.forEach(ls=> ls.p.forEach(p=> minchuAdd(p,ls.l)));

// 教科書ごとの「課 → 文型リスト」索引を作る
function lessonsOf(bookId){
  const map={};
  PATTERNS.forEach(o=>{ (o.books[bookId]||[]).forEach(l=>{ (map[l]=map[l]||[]).push(o); }); });
  return Object.keys(map).map(Number).sort((a,b)=>a-b).map(l=>({ l, items: map[l] }));
}

/* --- 五十音順ソート・検索 --- */
function toHira(s){ return s.replace(/[\u30A1-\u30F6]/g, c=>String.fromCharCode(c.charCodeAt(0)-0x60)); }
function yomiKey(p){ return toHira(p.replace(/^[〜～\s]+/,'').replace(/[（）()]/g,'')); }
const GOJU=[
  ['あ','あいうえおぁぃぅぇぉ'],['か','かきくけこがぎぐげご'],['さ','さしすせそざじずぜぞ'],
  ['た','たちつてとだぢづでどっ'],['な','なにぬねの'],['は','はひふへほばびぶべぼぱぴぷぺぽ'],
  ['ま','まみむめも'],['や','やゆよゃゅょ'],['ら','らりるれろ'],['わ','わをん']
];
function rowLabel(key){ const c=key[0]||''; for(const [lab,set] of GOJU){ if(set.indexOf(c)>=0) return lab; } return 'その他'; }
const CATSHORT={'動詞':'動詞','い形容詞':'い形容詞','な形容詞':'な形容詞','文型':'文型'};
const SORTED=[...D].map(d=>({...d,_key:yomiKey(d.p)}))
  .sort((a,b)=> a._key<b._key?-1 : a._key>b._key?1 : 0);

function matches(d,q){
  if(!q) return true;
  const bkStr = (d.ka!=null) ? ('みんなの日本語 初級 第2版 みん日 第'+d.ka+'課 '+d.ka+'課') : '';
  const gkStr = (d.gka!=null) ? ('げんき 第3版 第'+d.gka+'課 '+d.gka+'課') : '';
  const tkStr = (d.tka!=null) ? ('つなぐ日本語 初級 初版 つなぐ 第'+d.tka+'課 '+d.tka+'課') : '';
  const dkStr = (d.dka!=null) ? ('大地 初級 初版 第'+d.dka+'課 '+d.dka+'課') : '';
  const ekStr = (d.eka!=null) ? ('できる日本語 中級 初版 第'+d.eka+'課 '+d.eka+'課') : '';
  const skStr = (d.ska!=null) ? ('できる日本語 初中級 初版 第'+d.ska+'課 '+d.ska+'課') : '';
  const kkStr = (d.kka!=null) ? ('できる日本語 初級 初版 第'+d.kka+'課 '+d.kka+'課') : '';
  const hay = toHira(d.p+' '+d.en+' '+d.setu+' '+(d.note||'')+' '+d._key+' '+d.lvl+' '+bkStr+' '+gkStr+' '+tkStr+' '+dkStr+' '+ekStr+' '+skStr+' '+kkStr).toLowerCase();
  return hay.indexOf(q)>=0;
}

let curLevel='all', curQuery='', mode='kaisetsu', curBook='all';

/* ---- ハイライト（toHiraは文字数を変えないので元文字列にそのまま対応） ---- */
function esc(s){ return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function hi(text,q){
  if(!q) return esc(text);
  const h=toHira(text).toLowerCase(), i=h.indexOf(q);
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}

/* 練習ページ(bunkei_renshu.html)がある文型。練習を増やしたらここに追加。 */
const PRACTICE_PATTERNS = {'〜たいです':1,'〜てください':1,'〜ています':1,'〜てもいいです':1,'〜てはいけません':1,'〜ないでください':1,'〜ましょう':1,'〜ながら':1,'〜てから':1,'〜たことがあります':1,'〜なければなりません':1,'〜たり〜たりします':1};
/* ---- 解説モード（既存の解説カード＋課タグ） ---- */
function renderKaisetsu(){
  const list=document.getElementById('list');
  const rows=SORTED.filter(d=>(curLevel==='all'||d.lvl===curLevel)&&matches(d,curQuery));
  document.getElementById('meta').textContent = rows.length+' 件'+(curLevel!=='all'?' ・ '+curLevel:'');
  if(!rows.length){ list.innerHTML='<div class="no-result">見つかりませんでした。<br>ことばを変えてさがしてみてください。</div>'; return; }
  let html='', curRow='';
  rows.forEach(d=>{
    const rl=rowLabel(d._key);
    if(rl!==curRow){ curRow=rl; html+=`<div class="goju-head">${rl}</div>`; }
    const ex=d.ex.map(e=>`<div class="bk-ex-item"><div class="bk-ex-ja">${e[0]}</div><div class="bk-ex-en">${e[1]}</div></div>`).join('');
    const _srcMap={ minna:d.ka, genki:d.gka, tsunagu:d.tka, daichi:d.dka, dekiru:d.eka, dekirus:d.ska, dekiruk:d.kka };
    const _srcTags=BOOKS.filter(b=>_srcMap[b.id]!=null).map(b=>
      `<span class="src-tag" style="background:${b.bg};color:${b.accent}">${b.short} 第${_srcMap[b.id]}課</span>`);
    const tag=_srcTags.length?`<div class="src-tags">${_srcTags.join('')}</div>`:'';
    html+=`<div class="bk-card" id="${d.id}">
      <div class="bk-cat"><b>${CATSHORT[d.cat]}</b> ・ ${d.form}</div>
      <div class="bk-top"><span class="bk-p">${d.p}</span><span class="bk-lvl lvl-${lvCls(d.lvl)}">${d.lvl}</span></div>
      <div class="bk-en">${d.en}</div>
      <div class="bk-setsuzoku"><b>接続：</b>${d.setu}</div>
      <div class="bk-ex">${ex}</div>
      ${d.note?`<div class="bk-note">${d.note}</div>`:''}
      ${tag}
      <div><a class="bk-kaiwa" href="kaiwa.html?g=${encodeURIComponent(d.p)}&lv=${encodeURIComponent(d.lvl)}&ex=${encodeURIComponent(d.ex&&d.ex[0]?d.ex[0][0]:'')}">🗣️ この文法で会話練習</a>${PRACTICE_PATTERNS[d.p]?`<a class="bk-kaiwa bk-renshu" href="bunkei_renshu.html?p=${encodeURIComponent(d.p)}">✍️ パターン練習</a>`:''}</div>
    </div>`;
  });
  list.innerHTML=html;
}

/* ---- 教科書で見るモード（教科書ごと・全文型、教科書＆レベルのタグ付き） ---- */
function renderBooks(){
  const list=document.getElementById('list');
  const q=curQuery;
  let total=0, html='';
  BOOKS.forEach(book=>{
    if(curBook!=='all' && curBook!==book.id) return;
    let inner='', bookCount=0;
    lessonsOf(book.id).forEach(ls=>{
      const lv=levelOf(book, ls.l);
      if(curLevel!=='all' && curLevel!==lv) return;
      const items=ls.items.filter(o=>{
        if(!q) return true;
        const others=Object.keys(o.books).map(bid=>{ const bb=BOOKS.find(x=>x.id===bid); return bb?(bb.short+' '+bb.name):''; }).join(' ');
        return toHira(o.p+' '+book.short+' '+book.name+' '+lv+' 第'+ls.l+'課 '+ls.l+'課 '+others).toLowerCase().indexOf(q)>=0;
      });
      if(!items.length) return;
      bookCount+=items.length; total+=items.length;
      const rows=items.map(o=>{
        // 他の教科書のタグ（重なっている文型に表示）
        const xt=Object.keys(o.books).filter(bid=>bid!==book.id).map(bid=>{
          const bb=BOOKS.find(x=>x.id===bid); if(!bb) return '';
          return `<button class="tg xtag" type="button" data-book="${bid}" style="background:${bb.bg};color:${bb.accent}">${bb.short} L${o.books[bid].join('・')}</button>`;
        }).join('');
        return `<div class="ka-row"><span class="kdot">●</span><span class="kp">${hi(o.p,q)}</span>${xt?`<span class="row-tags">${xt}</span>`:''}</div>`;
      }).join('');
      const links = (book.id==='minna') ? D.filter(d=> d.ka===ls.l) : [];
      const linkHtml = links.length?`<div class="ka-links"><span class="lab">🔎 解説へ</span>`+
        links.map(d=>`<button class="ka-link" type="button" data-jump="${d.id}">${d.p}</button>`).join('')+`</div>`:'';
      inner += `<div class="ka-head"><span class="ka-badge" style="background:${book.bg};color:${book.accent}">第${ls.l}課</span>`+
        `<button class="tg tg-book" type="button" data-book="${book.id}">${book.short}</button>`+
        `<button class="tg lv-${lvCls(lv)}" type="button" data-lv="${lv}">${lv}</button>`+
        `</div><div class="ka-card">${rows}${linkHtml}</div>`;
    });
    if(!bookCount) return;
    html += `<div class="book-sec"><div class="book-sec-head"><span class="book-bar" style="background:${book.accent}"></span><span>${book.name}</span><span class="book-sec-num">${bookCount}文型</span></div>${inner}</div>`;
  });
  const bkName = (curBook!=='all') ? ((BOOKS.find(b=>b.id===curBook)||{}).short||'') : '';
  document.getElementById('meta').textContent = (q?'該当 ':'ぜんぶで ')+total+' 文型'+(bkName?' ・ '+bkName:'')+(curLevel!=='all'?' ・ '+curLevel:'');
  if(!html){ list.innerHTML='<div class="no-result">見つかりませんでした。<br>ことば・レベル（例：N5）・課番号（例：15）でさがしてください。</div>'; return; }
  list.innerHTML=html;
  list.querySelectorAll('.ka-link').forEach(a=>a.addEventListener('click',()=>jumpToKaisetsu(a.dataset.jump)));
  list.querySelectorAll('.tg[data-book]').forEach(a=>a.addEventListener('click',()=>setBook(a.dataset.book)));
  list.querySelectorAll('.tg[data-lv]').forEach(a=>a.addEventListener('click',()=>setLevel(a.dataset.lv)));
}

function render(){ if(mode==='book') renderBooks(); else renderKaisetsu(); }

function swapFilters(){
  document.getElementById('filter').style.display = 'flex'; // レベルフィルタは両モードで使う
  document.getElementById('filterBook').style.display = (mode==='book') ? 'flex' : 'none';
}
function setModeButtons(){ document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode)); }

function setBook(id){
  curBook=id;
  document.querySelectorAll('#filterBook button').forEach(x=>x.classList.toggle('on',x.dataset.bk===id));
  render();
}
function setLevel(lv){
  curLevel=lv;
  document.querySelectorAll('#filter button').forEach(x=>x.classList.toggle('on',x.dataset.lv===lv));
  render();
}

// 教科書フィルタを BOOKS から生成（教科書を足すと自動で増える）
function buildBookFilter(){
  const box=document.getElementById('filterBook');
  box.innerHTML='';
  const items=[{bk:'all',label:'すべて'}].concat(BOOKS.map(b=>({bk:b.id,label:b.short})));
  items.forEach(it=>{ const btn=document.createElement('button'); btn.type='button'; btn.dataset.bk=it.bk; btn.textContent=it.label; if(it.bk===curBook) btn.classList.add('on'); btn.onclick=()=>setBook(it.bk); box.appendChild(btn); });
  if(!box.dataset.scrollBound){ box.dataset.scrollBound='1'; bindHScroll(box); }
}

// PC（マウス）でも教科書フィルタを横スクロールできるようにする
function bindHScroll(box){
  // マウスホイールの縦回転を横スクロールに変換
  box.addEventListener('wheel', e=>{
    if(box.scrollWidth<=box.clientWidth) return;               // はみ出していなければ何もしない
    const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if(d===0) return;
    box.scrollLeft += d;
    e.preventDefault();                                        // ページの縦スクロールを止める
  }, {passive:false});
  // ドラッグ（クリック＆スワイプ）で移動
  let down=false, startX=0, startL=0, moved=0;
  box.addEventListener('pointerdown', e=>{
    if(e.pointerType==='mouse' && e.button!==0) return;
    down=true; moved=0; startX=e.clientX; startL=box.scrollLeft;
    box.classList.add('dragging');
  });
  box.addEventListener('pointermove', e=>{
    if(!down) return;
    const dx=e.clientX-startX; moved=Math.max(moved,Math.abs(dx));
    box.scrollLeft=startL-dx;
    if(Math.abs(dx)>3) e.preventDefault();
  });
  const end=()=>{ down=false; box.classList.remove('dragging'); };
  box.addEventListener('pointerup', end);
  box.addEventListener('pointercancel', end);
  box.addEventListener('pointerleave', end);
  // ドラッグ後の誤クリック（ボタン選択）を防ぐ
  box.addEventListener('click', e=>{ if(moved>6){ e.preventDefault(); e.stopPropagation(); } }, true);
}

// 「解説へ」から該当の解説カードへ移動
function jumpToKaisetsu(id){
  mode='kaisetsu'; setModeButtons(); swapFilters();
  setLevel('all');
  sIn.value=''; curQuery=''; sClear.classList.remove('show');
  render();
  requestAnimationFrame(()=>{ const el=document.getElementById(id); if(el){ history.replaceState(null,'','#'+id); el.scrollIntoView({behavior:'smooth',block:'start'}); } });
}

buildBookFilter();
swapFilters();
render();

// モード切替（解説 / 教科書）
document.querySelectorAll('#mode button').forEach(b=>{
  b.onclick=()=>{ mode=b.dataset.mode; setModeButtons(); swapFilters(); render(); window.scrollTo({top:0}); };
});
// レベルフィルタ（両モード）
document.getElementById('filter').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>setLevel(b.dataset.lv);
});
// 検索（両モード共通）
const sIn=document.getElementById('search'), sClear=document.getElementById('sClear');
sIn.addEventListener('input',()=>{
  curQuery=toHira(sIn.value.trim()).toLowerCase();
  sClear.classList.toggle('show', sIn.value.length>0);
  render();
});
sClear.addEventListener('click',()=>{ sIn.value=''; curQuery=''; sClear.classList.remove('show'); render(); sIn.focus(); });

// ハッシュがあれば解説モードでその文型へスクロール
if(location.hash){ const el=document.getElementById(location.hash.slice(1)); if(el){ el.scrollIntoView(); } }
