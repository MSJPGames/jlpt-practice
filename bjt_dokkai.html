<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJT 第3部 読解 練習 ・ 日本語の部屋</title>
<style>
  :root{
    --bg:#F7F5F0; --surface:#FFFFFF; --border:#E2DDD6;
    --text:#1C1C1C; --text-muted:#6B6560; --text-hint:#9E9890;
    --radius:14px; --radius-sm:10px; --accent:#3C5A78; --accent-bg:#E4EAF1;
    --ok:#3B6D11; --ok-bg:#EAF3DE; --ng:#9A3D1C; --ng-bg:#FAECE7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:0 1rem 3rem;line-height:1.7;-webkit-text-size-adjust:100%}
  .container{max-width:480px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:5px;margin-top:1.25rem;font-size:13px;font-weight:600;color:var(--text-muted);text-decoration:none;cursor:pointer;background:none;border:0;font-family:inherit}
  .app-header{text-align:center;padding:1.1rem 0 .5rem}
  .app-logo{font-size:12px;font-weight:700;letter-spacing:.15em;color:var(--text-hint);margin-bottom:8px}
  .app-title{font-size:22px;font-weight:700}
  .app-sub{font-size:12.5px;color:var(--text-muted);margin-top:6px}
  .note{background:#FAF6EE;border:1px solid #EBDFC7;border-radius:var(--radius);padding:11px 14px;font-size:12px;color:#6b5d40;line-height:1.65;margin:.6rem 0 1rem}
  .hidden{display:none}
  .lead{font-size:13px;color:var(--text-muted);margin:.2rem 2px 1rem}
  .cat{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);
    border-radius:var(--radius);padding:14px 15px;margin-bottom:11px;cursor:pointer;width:100%;text-align:left;font-family:inherit;
    -webkit-tap-highlight-color:transparent;transition:transform .1s,box-shadow .12s}
  .cat:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
  .cat:active{transform:scale(.99)}
  .cat.mix{border-left-color:#854F0B;background:linear-gradient(135deg,#FFFFFF,#FAF3E6)}
  .cat-ic{width:44px;height:44px;border-radius:11px;background:var(--accent-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .cat.mix .cat-ic{background:#FAEEDA;color:#854F0B}
  .cat-info{flex:1;min-width:0}
  .cat-name{font-size:15px;font-weight:700}
  .cat-desc{font-size:12px;color:var(--text-muted);margin-top:2px}
  .cat-arrow{font-size:20px;color:var(--text-hint)}
  /* quiz */
  .qtop{display:flex;align-items:center;gap:10px;margin:.4rem 0 1rem}
  .pill{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;background:var(--accent-bg);color:var(--accent)}
  .prog{font-size:13px;font-weight:700;color:var(--text-muted)}
  .progbar{flex:1;height:7px;background:#ECE8E1;border-radius:5px;overflow:hidden}
  .progbar>span{display:block;height:100%;background:var(--accent);border-radius:5px;transition:width .25s}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;margin-bottom:14px}
  .q-text{font-size:16px;font-weight:600;white-space:pre-line;line-height:1.8}
  .passage{background:#F7F5F0;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:14px;white-space:pre-line;font-weight:400;line-height:1.9}
  .q-sub{font-size:15px;font-weight:600;margin-top:8px}
  .choices{display:flex;flex-direction:column;gap:8px}
  .choice{display:flex;align-items:flex-start;gap:10px;padding:12px 13px;border:1px solid var(--border);border-radius:11px;cursor:pointer;
    font-size:15px;background:#fff;-webkit-tap-highlight-color:transparent;transition:background .1s,border-color .1s;width:100%;text-align:left;font-family:inherit}
  .choice:hover{background:#FAF9F6}
  .choice .cn{font-weight:700;color:var(--text-muted);flex-shrink:0}
  .choice.correct{border-color:var(--ok);background:var(--ok-bg)}
  .choice.wrong{border-color:var(--ng);background:var(--ng-bg)}
  .choice:disabled{cursor:default}
  .exp{margin-top:12px;font-size:13px;color:var(--text-muted);background:#F3F0EA;border-radius:10px;padding:11px 13px;line-height:1.7;display:none}
  .exp.show{display:block}
  .exp .mk{font-weight:700;margin-right:6px}
  .mk.ok{color:var(--ok)} .mk.ng{color:var(--ng)}
  .btn{font-family:inherit;font-size:15px;font-weight:700;border:0;border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;width:100%;transition:transform .1s}
  .primary{background:var(--accent);color:#fff}
  .primary:active{transform:scale(.99)}
  .ghost{background:#F0EEE8;color:var(--text)}
  /* result */
  .rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px;text-align:center;margin-bottom:14px}
  .rbig{font-size:34px;font-weight:700;color:var(--accent)}
  .rsub{font-size:13px;color:var(--text-muted);margin-top:6px}
  .rmsg{font-size:14px;font-weight:700;margin-top:10px}
  .foot{text-align:center;font-size:11px;color:var(--text-hint);margin-top:1.5rem}
</style>
</head>
<body>
<div class="container">
  <button class="back" id="backBtn">‹ もどる</button>
  <div class="app-header">
    <div class="app-logo">BJT — 練習</div>
    <div class="app-title">第3部 読解テスト 練習</div>
    <div class="app-sub">ビジネス日本語 ・ 語彙・文法／表現読解／総合読解</div>
  </div>

  <!-- ホーム -->
  <div id="home">
    <div class="note">これは BJT の<b>出題形式に合わせたオリジナル練習問題</b>です（公式の問題ではありません）。1回<b>10問</b>を出題します。隙間時間にどうぞ。</div>
    <div class="lead">練習する パートを えらんでください。</div>
    <div id="cats"></div>
  </div>

  <!-- クイズ -->
  <div id="quiz" class="hidden">
    <div class="qtop">
      <span class="pill" id="secPill"></span>
      <span class="prog" id="prog"></span>
      <span class="prog" id="qTimer" style="color:var(--accent)">⏱ 0:00</span>
      <span class="progbar"><span id="progFill" style="width:0%"></span></span>
    </div>
    <div class="card">
      <div class="q-text" id="qText"></div>
      <div id="qExtra"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="exp" id="exp"></div>
    <button class="btn primary hidden" id="nextBtn" style="margin-top:14px"></button>
  </div>

  <!-- 結果 -->
  <div id="result" class="hidden">
    <div class="rcard">
      <div class="rbig" id="rScore"></div>
      <div class="rsub" id="rRate"></div>
      <div class="rsub" id="rTime" style="opacity:.85;font-size:13px"></div>
      <div class="rmsg" id="rMsg"></div>
    </div>
    <div id="nnhRecordHost"></div>
    <button class="btn primary" id="againBtn" style="margin-bottom:10px">同じパートで もう10問</button>
    <button class="btn ghost" id="homeBtn">パートを えらびなおす</button>
  </div>

  <div class="foot">© 2025 日本語の部屋 ・ BJT形式 練習（オリジナル）</div>
</div>

<script>
(function(){
  "use strict";
  var PER=10;
  /*<DATA>*/ var SECTIONS=[{"key":"goi","name":"語彙・文法","ic":"語","desc":"ビジネスの ことば・文法を えらぶ","items":[{"q":"「アポイント（アポ）」の いみは？","cs":["面会や打ち合わせの約束","会社の住所","出張の費用","名刺のこと"],"a":0,"ex":"アポイント＝面会の約束。「アポを取る」のように使います。"},{"q":"「納期」の いみは？","cs":["商品などを納める期限","会議の日時","給料日","入社の日"],"a":0,"ex":"納期＝品物やサービスを納める期限。読みは「のうき」。"},{"q":"「先方の ご都合を うかがう」の「先方」は だれですか。","cs":["相手・取引先","自分の上司","会社の受付","自分自身"],"a":0,"ex":"先方（せんぽう）＝相手方。取引先など話している相手を指します。"},{"q":"会議は 都合により 来週に （　）ことに なりました。","cs":["延期する","出席する","報告する","記入する"],"a":0,"ex":"日程を後ろにずらす＝延期する。「延期になりました」。"},{"q":"メールの 最後に「ご不明な点が ございましたら、お気軽に （　）ください。」","cs":["お問い合わせ","お問い合わせて","ご問い合わせし","問い合わせられ"],"a":0,"ex":"「お＋ます形＋ください」。お問い合わせください、が正しい形。"},{"q":"「議事録」とは 何ですか。","cs":["会議の内容を記録した文書","出張の申請書","商品の見積もり","社員の名簿"],"a":0,"ex":"議事録（ぎじろく）＝会議で話し合った内容・決定事項の記録。"},{"q":"「本件に つきまして、（　）ご確認ください。」いちばん ていねいなのは？","cs":["ご査収のうえ","確認して","見て","チェックで"],"a":0,"ex":"「ご査収（さしゅう）のうえ」＝内容を確認して受け取ってください、の意。ビジネス文書向き。"},{"q":"電話で「山田は ただいま 席を （　）おります。」","cs":["外して","はずれて","抜けて","離れて"],"a":0,"ex":"慣用表現「席を外す」。不在を表す丁寧な言い方。"},{"q":"「〜に ともない」の 使い方が 正しいのは？","cs":["組織変更に伴い、担当が変わります","雨に伴い、映画を見た","本を伴い、読みました","昼に伴い、食べます"],"a":0,"ex":"「〜に伴い」＝〜と一緒に／〜の変化につれて。あらたまった書き言葉。"},{"q":"「早急に ご対応 いたします。」の「早急」の 読みは？","cs":["さっきゅう","そうきゅう","はやきゅう","そうがら"],"a":0,"ex":"本来は「さっきゅう」。「そうきゅう」も広く使われますが、正式には「さっきゅう」。"},{"q":"「あいにく その 商品は （　）おります。」在庫が ない ときの 言い方。","cs":["品切れになって","品切れをして","品切れがなって","品切れにされて"],"a":0,"ex":"「品切れになる」。「〜になっております」で丁寧に状況を伝える。"},{"q":"会議 （　） 出席します。正しい 助詞は？","cs":["に","を","へ","で"],"a":0,"ex":"「会議に出席する」。出席・参加の対象は「に」。"},{"q":"「請求書」と「領収書」の ちがいで 正しいのは？","cs":["請求書は代金を求める書類、領収書は受け取った証明","どちらも同じもの","請求書は受取証明、領収書は見積もり","領収書は注文書のこと"],"a":0,"ex":"請求書＝支払いを求める。領収書＝支払いを受け取った証明。"},{"q":"「その ご依頼には （　）かねます。」の 意味は？","cs":["応じることができない","すぐに応じる","喜んで応じる","必ず応じる"],"a":0,"ex":"「〜かねます」＝〜できない、の丁寧な言い方。断りの表現。"},{"q":"「お手数を （　）が、ご返信ください。」","cs":["おかけします","かけます","おかけになります","かけられます"],"a":0,"ex":"相手に迷惑をかける側なので謙譲の「おかけします」。依頼の前置きの定番。"},{"q":"「折り返し お電話 いたします。」の「折り返し」の いみは？","cs":["こちらからすぐにかけ直すこと","電話を切ること","伝言を残すこと","会議を始めること"],"a":0,"ex":"折り返し＝受けた電話に対して、こちらからかけ直すこと。"},{"q":"「見積もり」の いみは？","cs":["商品を発送すること","かかる費用を前もって計算した金額","代金を支払うこと","契約を結ぶこと"],"a":1,"ex":"見積もりは、あらかじめ費用や価格を算出して示すこと。"},{"q":"「請求書」の いみは？","cs":["支払いを求める文書","注文を確認する文書","会議の議題を記した文書","商品の説明書"],"a":0,"ex":"請求書は、代金の支払いを求めるために送る書類。"},{"q":"「稟議」の いみは？","cs":["会議を欠席すること","担当者が案を作り関係者の承認を得る手続き","取引を断ること","給料を計算すること"],"a":1,"ex":"稟議は、書類を回して上司や関係者の承認を得る社内手続き。"},{"q":"「取引先」の いみは？","cs":["会社の株主","商品を仕入れたり売ったりする相手の会社","社内の別の部署","会社の顧客名簿"],"a":1,"ex":"取引先は、商売の相手となる会社や個人のこと。"},{"q":"「弊社」の いみは？","cs":["相手の会社を敬っていう語","自分の会社をへりくだっていう語","本社のこと","子会社のこと"],"a":1,"ex":"弊社は自分の会社をへりくだって言う謙譲表現。相手の会社は御社。"},{"q":"「アジェンダ」の いみは？","cs":["会議の議題・進行予定","出席者の名簿","会議室の予約","議事録"],"a":0,"ex":"アジェンダ（agenda）は会議で話し合う議題や進行表のこと。"},{"q":"「リスケ」の いみは？","cs":["予定を組み直すこと","経費を削減すること","人事を異動すること","在庫を管理すること"],"a":0,"ex":"リスケはreschedule（リスケジュール）の略で、日程を組み直すこと。"},{"q":"「エビデンス」の いみは？","cs":["根拠・証拠となる資料","会議の要約","経費の見積もり","顧客からの苦情"],"a":0,"ex":"エビデンス（evidence）は主張や結果を裏づける根拠・証拠。"},{"q":"「決裁」の いみは？","cs":["代金を支払うこと","権限のある人が案の可否を決めること","商品を発注すること","会議を開くこと"],"a":1,"ex":"決裁は、決定権のある上司が申請などの可否を決めること。支払いの「決済」とは別。"},{"q":"「与信」の いみは？","cs":["取引相手にどれだけ信用を与えられるか判断すること","給与を支払うこと","商品を保証すること","融資を受けること"],"a":0,"ex":"与信は、取引先の支払い能力を評価して信用の限度を設けること。"},{"q":"「棚卸し」の いみは？","cs":["商品を陳列すること","在庫の数量や金額を数えて確認すること","古い商品を処分すること","棚を新しくすること"],"a":1,"ex":"棚卸しは、決算などのため在庫を実際に数えて確認する作業。"},{"q":"「与件」の いみは？","cs":["前提として与えられている条件","追加の要望","未解決の問題","契約の特典"],"a":0,"ex":"与件は、すでに与えられている前提条件のこと。"},{"q":"「ドラフト」の いみは？","cs":["最終版の文書","下書き・草案","参考資料","添付ファイル"],"a":1,"ex":"ドラフト（draft）は、正式に仕上げる前の下書き・草案。"},{"q":"「たたき台」の いみは？","cs":["議論のもとにする素案","会議で使う道具","反対意見","最終決定案"],"a":0,"ex":"たたき台は、議論を進めるためにまず出す素案のこと。"},{"q":"「コンプライアンス」の いみは？","cs":["顧客満足度","法令や社会規範を守ること","業務の効率化","社内の連絡体制"],"a":1,"ex":"コンプライアンスは、法令遵守をはじめ社会的ルールを守ること。"},{"q":"部長は今 席を（　）が、まもなく戻ります。","cs":["拝見しています","外しております","ご覧になります","伺っております"],"a":1,"ex":"「席を外しております」で不在を丁寧に伝える定番表現。"},{"q":"ご不明な点が（　）、担当までお問い合わせください。","cs":["ございましたら","おっしゃったら","拝見したら","申し上げたら"],"a":0,"ex":"「ございましたら」は「ありましたら」の丁寧な言い方。"},{"q":"資料が完成（　）、すぐにお送りいたします。","cs":["するなり","し次第","するうちに","するばかり"],"a":1,"ex":"「〜し次第」は「〜したらすぐに」という意味の丁寧な表現。"},{"q":"あいにく その件については お答え（　）。","cs":["かねます","おきます","きれます","つづけます"],"a":0,"ex":"「〜かねます」は「〜できない」を婉曲に言う丁寧表現。"},{"q":"円安に（　）、輸入コストが上昇している。","cs":["伴い","比べ","限り","おいて"],"a":0,"ex":"「〜に伴い」は「〜とともに・〜につれて」という変化を表す。"},{"q":"予算が足りないため、計画の見直しを（　）。","cs":["したがりません","せざるを得ない","するはずがない","してはならない"],"a":1,"ex":"「〜ざるを得ない」は「〜するしかない」という意味。"},{"q":"打ち合わせの日程を（　）いただけますでしょうか。","cs":["調整させて","調整して差し上げて","調整なさって","調整申される"],"a":0,"ex":"「〜させていただけますか」で相手の許可を得る謙譲表現。ここは「調整させていただけますか」。"},{"q":"先方の（　）を確認してから、返答いたします。","cs":["意向","気配","気質","風潮"],"a":0,"ex":"「意向」は相手の考えや希望のこと。"},{"q":"納品が遅れる（　）、事前にご連絡ください。","cs":["ようなら","ばかりに","わりに","くせに"],"a":0,"ex":"「〜ようなら」は「〜という状況になりそうなら」という条件を表す。"},{"q":"本日は お忙しい中、お時間を（　）ありがとうございます。","cs":["いただき","くださり","差し上げ","申し上げ"],"a":0,"ex":"時間をもらう側なので謙譲語「いただき」が適切。"},{"q":"会議の資料は 各自で（　）ようお願いします。","cs":["ご持参する","ご持参いただく","持参なさる","ご持参くださる"],"a":3,"ex":"相手の動作を敬うので「ご持参くださる」が適切。"},{"q":"この案件は 私が（　）ますので、ご安心ください。","cs":["担当し","担当なさい","ご担当になり","担当してくださり"],"a":0,"ex":"自分の動作なので敬語を付けず「担当します」とする。"},{"q":"社長が まもなく（　）ます。","cs":["参られ","いらっしゃい","拝見し","伺い"],"a":1,"ex":"「いらっしゃる」は「来る・行く・いる」の尊敬語。目上の人の来訪に用いる。"},{"q":"次の文で 敬語の使い方が正しいものは どれか。","cs":["部長が資料を拝見されました","お客様が受付でお待ちしております","課長はもうお帰りになりました","私が御社へいらっしゃいます"],"a":2,"ex":"「お帰りになる」は正しい尊敬語。他は尊敬語と謙譲語の取り違え。"},{"q":"「取り急ぎご連絡まで」の使い方として適切な場面は どれか。","cs":["要件を簡潔に先に伝えるメールの結び","正式な契約書の署名欄","会議での自己紹介","商品の宣伝文句"],"a":0,"ex":"「取り急ぎご連絡まで」は、まず用件だけ手短に伝えるメールの結びの定型句。"},{"q":"「〜のほど よろしくお願いいたします」の「ほど」の働きとして正しいものは どれか。","cs":["数量を強調する","断定を避け表現を柔らかくする","時間を限定する","理由を示す"],"a":1,"ex":"「ご検討のほど」などの「ほど」は、言い方をやわらげる働きをする。"},{"q":"「お世話になっております」を使う場面として最も適切なのは どれか。","cs":["社内の同僚への朝のあいさつ","取引先へのメールや電話の冒頭のあいさつ","会議の終わりのしめの言葉","苦情への謝罪の言葉"],"a":1,"ex":"「お世話になっております」は取引先など社外への冒頭のあいさつの定番。"},{"q":"「〜させていただきます」を使うのが不自然なのは どれか。","cs":["本日は休業させていただきます","資料を送らせていただきます","こちらの商品が壊れさせていただきます","日程を変更させていただきます"],"a": 。"],"a":0,"ex":"「恐れ入ります」で 切り出し、用件（約束）を 伝えるのが 適切です。"},{"q":"上司の 指示が よく 分からず、確認したい ときの 言い方は？","cs":["確認ですが、こちらを 先に すすめる、という ことで よろしいでしょうか。","え、意味 分からない。","もう一回。","どういうこと？"],"a":0,"ex":"「確認ですが〜という ことで よろしいでしょうか」は 内容を 確かめる 丁寧な 表現です。"},{"q":"ミスを して、上司に あやまる ときの 表現として 適切なのは？","cs":["申し訳ございません。すぐに 対応いたします。","ごめんね。","しかたない。","わたしの せいじゃ ないです。"],"a":0,"ex":"「申し訳ございません」は 丁寧に わびる 表現。原因より まず 謝罪と 対応を 示します。"},{"q":"取引先へ 送る メールの 結びとして 適切なのは？","cs":["今後とも よろしく お願いいたします。","じゃあ また。","よろしく。","終わり。"],"a":0,"ex":"「今後とも よろしく お願いいたします」は ビジネスメールの 定番の 結びです。"},{"q":"来客を 会議室へ 案内する ときの 一言は？","cs":["どうぞ こちらへ お願いいたします。","ついて きて。","あっち。","勝手に どうぞ。"],"a":0,"ex":"「どうぞ こちらへ」と 手で 示しながら 案内するのが ていねいです。"},{"q":"訪問先から 帰る ときの あいさつとして 適切なのは？","cs":["本日は お時間を いただき、ありがとう ございました。","じゃ、帰ります。","もう 行くね。","さよなら。"],"a":0,"ex":"時間を さいて もらった ことへの お礼を 述べて 辞去します。"},{"q":"電話で 相手の 名前が 聞き取れなかった とき、失礼の ない 言い方は？","cs":["恐れ入りますが、もう一度 お名前を うかがえますか。","え、名前 なに？","聞こえない。","もう一回 言って。"],"a":0,"ex":"「恐れ入りますが、もう一度〜」で ていねいに 聞き返します。"},{"q":"上司に 早く 帰りたいと 願い出る とき、適切な 言い方は？","cs":["本日、私用のため お先に 失礼しても よろしいでしょうか。","もう 帰る。","早退します、いい？","帰っても いい？"],"a":0,"ex":"「〜しても よろしいでしょうか」で 許可を 求めるのが ていねいです。"},{"q":"同僚に 仕事を 手伝って もらった あと、かける 言葉は？","cs":["助かりました。ありがとう ございます。","当然だよ。","やって くれて 当たり前。","ふーん。"],"a":0,"ex":"手伝いへの お礼は「助かりました」「ありがとう ございます」。"},{"q":"取引先に 資料の 作り直しを 頼む とき、やわらかい 言い方は？","cs":["お手数ですが、こちらを 修正して いただけませんか。","作り直して。","これ だめ。","もう一回 やって。"],"a":0,"ex":"「お手数ですが〜いただけませんか」は ていねいな 依頼の 形です。"},{"q":"会議を 始める とき、司会の 第一声として 適切なのは？","cs":["それでは、ただ今より 会議を 始めさせて いただきます。","はじめる よ。","えー、では。","会議 スタート。"],"a":0,"ex":"「ただ今より〜始めさせて いただきます」は 会議の 始めの 定型表現です。"},{"q":"お酒を すすめられたが、飲めない とき、感じよく 断るには？","cs":["せっかくですが、あいにく お酒は 飲めないんです。","いらない。","飲めません。","けっこう。"],"a":0,"ex":"「せっかくですが、あいにく〜」で 相手に 配慮しつつ 断ります。"},{"q":"転勤する 先輩に かける、別れの あいさつとして 適切なのは？","cs":["お体に 気を つけて、お元気で。","じゃあね。","がんばって。","さよなら。"],"a":0,"ex":"転勤する 人には「お体に 気を つけて」など 相手を 気づかう 一言を そえます。"},{"q":"メールで 添付を 送る とき、本文に そえる 表現として 適切なのは？","cs":["資料を 添付ファイルにて お送りいたします。ご確認ください。","ファイル つけたよ。","見て。","添付。よろしく。"],"a":0,"ex":"「添付ファイルにて お送りいたします」「ご確認ください」が ていねいな 言い方です。"}]},{"key":"sogo","name":"総合読解","ic":"文","desc":"ビジネス文書・メールを 読んで こたえる","items":[{"passage":"件名：会議日程 変更のお知らせ\n\n営業部の みなさま\n\nお疲れさまです。総務部の 佐藤です。\n来週 火曜に 予定していた 定例会議ですが、\n会議室の 都合により、同じ週の 木曜 15時からに\n変更いたします。場所は これまでどおり 第2会議室です。\nよろしくお願いいたします。","sub":"会議は いつに 変わりましたか。","cs":["木曜 15時から","火曜 15時から","木曜 13時から","水曜 15時から"],"a":0,"ex":"「木曜 15時からに 変更」とあります。場所は第2会議室のままです。"},{"passage":"【社内のお願い】\n\n今月は 電気の 使用量を 減らす 取り組みを 行います。\nお昼休みは 使わない 部屋の 電気を 消してください。\nまた、退社時には パソコンの 電源も お切りください。\nご協力を お願いします。　　総務部","sub":"社員は お昼休みに 何を しますか。","cs":["使わない部屋の電気を消す","パソコンを買いかえる","会議室を予約する","窓を開ける"],"a":0,"ex":"「お昼休みは 使わない 部屋の 電気を 消してください」とあります。"},{"passage":"件名：お見積りの件\n\n株式会社ミドリ 田中さま\n\nお世話になっております。\nお問い合わせの 商品について、お見積りを 添付いたします。\nなお、ご注文から 納品までは 約2週間 いただいております。\nご検討のほど よろしくお願いいたします。","sub":"注文してから 届くまで、どのくらい かかりますか。","cs":["約2週間","約2日","当日","約2か月"],"a":0,"ex":"「ご注文から 納品までは 約2週間」とあります。"},{"passage":"件名：説明会 会場のご案内\n\nこの度は お申し込み ありがとうございます。\n説明会は 4月10日 14時より、本社ビル 5階の\n大会議室にて 行います。1階 受付で お名前を\nお伝えのうえ、5階まで お越しください。","sub":"参加者は はじめに どこへ 行きますか。","cs":["1階の受付","5階の大会議室","本社ビルの外","3階の事務所"],"a":0,"ex":"「1階 受付で お名前を お伝えのうえ、5階まで」とあります。まず受付へ。"},{"passage":"件名：資料 送付のお願い\n\n山田さま\n\nお世話になっております。\n先日の 打ち合わせで お話しした 新商品の\nパンフレットを、来週の 月曜までに\nメールで お送りいただけますでしょうか。\nお手数ですが、よろしくお願いいたします。","sub":"相手に 何を してほしいと 言っていますか。","cs":["パンフレットをメールで送る","会議に出席する","商品を購入する","電話をかけ直す"],"a":0,"ex":"「パンフレットを…メールで お送りいただけますでしょうか」と依頼しています。"},{"passage":"件名：納品遅れの お詫び\n\nこの度は、ご注文の 商品の お届けが\n遅れており、誠に 申し訳ございません。\n原因は 工場の 機械の 故障によるものです。\n現在 復旧が 進んでおり、今週中には\n発送できる 見込みです。","sub":"納品が 遅れている 原因は 何ですか。","cs":["工場の機械の故障","注文の間違い","天気が悪いこと","担当者の休み"],"a":0,"ex":"「原因は 工場の 機械の 故障による」とあります。"},{"passage":"＜出張報告（要旨）＞\n\n7月3日、大阪支社を 訪問し、新システムの\n導入について 打ち合わせを 行いました。\n先方は 前向きで、来月から 試験的に\n使い始めることで 合意しました。\n正式な 契約は 試験の 結果を 見て 判断します。","sub":"打ち合わせで 決まった ことは 何ですか。","cs":["来月から試験的に使い始める","すぐに正式契約する","導入を取りやめる","大阪支社を閉じる"],"a":0,"ex":"「来月から 試験的に 使い始めることで 合意」とあります。正式契約は結果を見て判断。"},{"passage":"件名：忘年会 出欠の ご確認\n\n今年の 忘年会を 12月20日（金）19時より\n開催します。会場は 駅前の「花亭」です。\n出欠を 12月6日までに、幹事の 鈴木まで\nメールで お知らせください。\n会費は 当日 受付で お預かりします。","sub":"参加する 人は 6日までに 何を しますか。","cs":["幹事にメールで出欠を知らせる","会費を振り込む","会場を予約する","料理を注文する"],"a":0,"ex":"「出欠を 12月6日までに…メールで お知らせください」とあります。会費は当日です。"},{"passage":"件名：出張スケジュールの件\n宛先：営業部 田中様\n来週の大阪出張ですが、先方の都合により、訪問日が15日（火）から17日（木）に変更となりました。\n新幹線と宿泊の予約は私のほうで取り直しておきます。\n変更後の日程で問題がないか、本日中にご返信ください。","sub":"田中さんは何をすればいいですか。","cs":["新幹線を自分で予約し直す","17日に大阪へ行けるか今日中に返事をする","宿泊先を変更する","15日に先方を訪問する"],"a":1,"ex":"本文に「変更後の日程で問題がないか、本日中にご返信ください」とあり、新幹線・宿泊は書き手が取り直すため、田中さんは返信するだけでよい。"},{"passage":"件名：お見積書送付のお願い\n株式会社山田製作所 佐藤様\nいつもお世話になっております。\n先日ご相談した部品A（100個）につきまして、正式にお見積もりをお願いいたします。\n納期についても併せてご記入いただけますと幸いです。\n恐れ入りますが、今週金曜日までにお送りください。","sub":"この人は佐藤さんに何を求めていますか。","cs":["部品Aを100個すぐに送ること","見積書に納期も書いて金曜までに送ること","金曜日に打ち合わせをすること","部品Aの値段を電話で伝えること"],"a":1,"ex":"「正式にお見積もりを」「納期についても併せてご記入」「今週金曜日までにお送りください」とあるため、納期入りの見積書を金曜までに送ることを求めている。"},{"passage":"社内連絡\n来月より、テレワーク制度が一部変更になります。\nこれまで週2日まででしたが、7月からは週3日まで在宅勤務が可能です。\nただし、月曜日は原則として全員出社とします。\n希望者は前週の金曜日までに上長へ申請してください。","sub":"7月以降のテレワークについて、正しいものはどれですか。","cs":["週3日まで在宅でき、月曜は出社が原則","毎日在宅勤務ができる","申請は必要ない","金曜日は必ず出社しなければならない"],"a":0,"ex":"「7月からは週3日まで在宅勤務が可能」「月曜日は原則として全員出社」とあるため、選択肢0が正しい。"},{"passage":"件名：納品遅延のお詫び\nお客様各位\nこのたびは商品の到着が遅れ、大変ご迷惑をおかけしております。\n原因は工場での機械トラブルで、現在復旧作業を進めております。\n発送は当初予定より3日遅れ、20日になる見込みです。\nお急ぎのお客様はカスタマーセンターまでご連絡ください。","sub":"商品はいつ発送される見込みですか。","cs":["17日","本日中","20日","工場が復旧してすぐ"],"a":2,"ex":"「発送は当初予定より3日遅れ、20日になる見込み」と明記されている。"},{"passage":"件名：歓迎会のご案内\n新入社員の歓迎会を下記のとおり行います。\n日時：4月18日（金）19時より\n場所：居酒屋「まる」（会社より徒歩5分）\n会費：4,000円（当日集めます）\n参加できない方は、15日までに幹事の鈴木まで連絡してください。","sub":"参加できない場合、どうすればいいですか。","cs":["18日に会場へ行って断る","会費4,000円を先に払う","15日までに鈴木さんに連絡する","何もしなくてよい"],"a":2,"ex":"「参加できない方は、15日までに幹事の鈴木まで連絡してください」とある。"},{"passage":"件名：Re: 資料請求について\nお問い合わせありがとうございます。\nご希望の製品カタログは、本日中にPDFでメール送付いたします。\n紙のカタログをご希望の場合は、郵送先のご住所をお知らせください。\nなお、価格表は会員登録後にマイページからご確認いただけます。","sub":"紙のカタログが欲しい場合、どうすればいいですか。","cs":["会員登録をする","郵送先の住所を知らせる","マイページを確認する","PDFをダウンロードする"],"a":1,"ex":"「紙のカタログをご希望の場合は、郵送先のご住所をお知らせください」とある。"},{"passage":"受付のご案内\n本日は弊社セミナーにお越しいただきありがとうございます。\n受付は2階エレベーターホール前で行っております。\nお名前をお伝えのうえ、名札をお受け取りください。\n会場は3階の大会議室です。開始10分前までにご着席ください。","sub":"来場者は最初にどこへ行けばいいですか。","cs":["3階の大会議室","2階のエレベーターホール前","1階の入口","受付後すぐ着席する席"],"a":1,"ex":"「受付は2階エレベーターホール前で行っております」とあり、まず受付で名札を受け取る流れになっている。"},{"passage":"件名：会議室の予約変更のお願い\n総務部 各位\n明日の10時から予定していた第一会議室ですが、急な来客対応のため使用できなくなりました。\n代わりに第三会議室（同じ3階）をご利用ください。\n時間の変更はありません。\nご不便をおかけしますが、よろしくお願いいたします。","sub":"明日の会議はどうなりますか。","cs":["時間が変わる","中止になる","場所が第三会議室に変わる","来客と一緒に行う"],"a":2,"ex":"「代わりに第三会議室をご利用ください」「時間の変更はありません」とあり、場所だけが変わる。"},{"passage":"件名：ご注文内容の確認\n田村様\nこのたびはご注文ありがとうございます。\nご注文商品：ノートパソコン用スタンド 2点\nお届け予定日：7月10日\n発送後に追跡番号をメールでお送りします。\n内容に相違がある場合は、3日以内にご連絡ください。","sub":"注文内容に間違いがあったとき、どうしますか。","cs":["10日まで待つ","3日以内に連絡する","追跡番号を調べる","スタンドを送り返す"],"a":1,"ex":"「内容に相違がある場合は、3日以内にご連絡ください」と書かれている。"},{"passage":"社内規定のお知らせ\n8月1日より、経費精算の締め切りが変更になります。\nこれまで毎月末でしたが、今後は毎月25日締めとなります。\n25日を過ぎた分は翌月の精算に回りますのでご注意ください。\n領収書は必ず原本を提出してください。","sub":"8月以降の経費精算の締め切りはいつですか。","cs":["毎月末","毎月25日","毎月1日","翌月末"],"a":1,"ex":"「今後は毎月25日締めとなります」とある。"},{"passage":"件名：欠勤のご連絡\n課長\nおはようございます。営業二課の井上です。\n昨夜から高熱が出てしまい、本日はお休みをいただきたくご連絡いたしました。\n本日予定していたC社との打ち合わせは、同僚の森さんに代わりに対応してもらえるよう依頼済みです。\nご迷惑をおかけしますが、よろしくお願いいたします。","sub":"C社との打ち合わせはどうなりますか。","cs":["中止になる","課長が対応する","森さんが代わりに対応する","日を改める"],"a":2,"ex":"「同僚の森さんに代わりに対応してもらえるよう依頼済み」とあり、森さんが対応する。"},{"passage":"件名：請求書の再送について\n経理部 御中\n先日お送りした6月分の請求書に金額の誤りがございました。\n正しくは税込55,000円のところ、50,000円と記載しておりました。\n訂正版を添付いたしますので、前回分は破棄してください。\nお手数をおかけし申し訳ございません。","sub":"正しい請求金額はいくらですか。","cs":["50,000円","55,000円","5,000円","60,000円"],"a":1,"ex":"「正しくは税込55,000円のところ、50,000円と記載」とあり、正しい金額は55,000円。"},{"passage":"件名：面接日程のご連絡\n山本様\nこのたびは弊社にご応募いただきありがとうございます。\n一次面接を7月22日（火）14時より、本社5階にて行います。\n当日は履歴書のコピーを1部お持ちください。\nご都合が悪い場合は、19日までに人事部までご相談ください。","sub":"面接当日に持って行くものは何ですか。","cs":["名札","履歴書のコピー1部","会費","追跡番号"],"a":1,"ex":"「当日は履歴書のコピーを1部お持ちください」とある。"},{"passage":"オフィス移転のお知らせ\nお取引先各位\nこのたび弊社は、9月1日よ   function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
  var $=function(id){return document.getElementById(id);};
  var home=$("home"), quiz=$("quiz"), result=$("result");
  var pool=[], cur=0, correct=0, answered=false, curSec="";
  var __startTime=0, __timerIv=null;
  function __fmtT(ms){ var s=Math.max(0,Math.floor(ms/1000)); var m=Math.floor(s/60); s=s%60; return m+":"+(s<10?"0":"")+s; }
  function __startTimer(){ __startTime=Date.now(); if(__timerIv) clearInterval(__timerIv); var el=document.getElementById("qTimer"); function up(){ if(el) el.textContent="⏱ "+__fmtT(Date.now()-__startTime); } up(); __timerIv=setInterval(up,1000); }
  function __stopTimer(){ if(__timerIv){ clearInterval(__timerIv); __timerIv=null; } }

  // ホーム描画
  (function(){
    var box=$("cats"), html="";
    var all=0; SECTIONS.forEach(function(s){ all+=s.items.length; });
    html+='<button class="cat mix" data-k="__all"><span class="cat-ic">★</span><span class="cat-info"><span class="cat-name">ミックス（全部から）</span><span class="cat-desc">全パートから 10問 ・ 計'+all+'問</span></span><span class="cat-arrow">›</span></button>';
    SECTIONS.forEach(function(s){
      html+='<button class="cat" data-k="'+s.key+'"><span class="cat-ic">'+s.ic+'</span><span class="cat-info"><span class="cat-name">'+s.name+'</span><span class="cat-desc">'+s.desc+' ・ '+s.items.length+'問</span></span><span class="cat-arrow">›</span></button>';
    });
    box.innerHTML=html;
    box.querySelectorAll(".cat").forEach(function(b){ b.addEventListener("click",function(){ start(b.getAttribute("data-k")); }); });
  })();

  function start(key){
    var items=[];
    if(key==="__all"){ SECTIONS.forEach(function(s){ s.items.forEach(function(it){ items.push({it:it, sec:s.name}); }); }); curSec="ミックス"; }
    else { var s=SECTIONS.filter(function(x){return x.key===key;})[0]; s.items.forEach(function(it){ items.push({it:it, sec:s.name}); }); curSec=s.name; }
    pool=shuffle(items).slice(0, PER);
    cur=0; correct=0; __startTimer();
    home.classList.add("hidden"); result.classList.add("hidden"); quiz.classList.remove("hidden");
    render();
    window.scrollTo({top:0});
  }

  function render(){
    answered=false;
    var o=pool[cur], it=o.it;
    $("secPill").textContent=curSec+"／"+o.sec;
    $("prog").textContent=(cur+1)+" / "+pool.length;
    $("progFill").style.width=Math.round((cur)/pool.length*100)+"%";
    $("qText").textContent=it.q||"つぎの 文章を 読んで、質問に こたえてください。";
    var extra="";
    if(it.passage){ extra+='<div class="passage">'+it.passage+'</div>'; }
    if(it.sub){ extra+='<div class="q-sub">'+it.sub+'</div>'; }
    $("qExtra").innerHTML=extra;
    var opts=it.cs.map(function(c,ci){ return {t:c, ok:ci===it.a}; });
    opts=shuffle(opts);
    var ch=$("choices"); ch.innerHTML="";
    opts.forEach(function(op,ci){
      var b=document.createElement("button"); b.className="choice";
      b.innerHTML='<span class="cn">'+(ci+1)+'</span><span>'+op.t+'</span>';
      b.addEventListener("click",function(){ pick(b, op.ok, ch, it.ex); });
      ch.appendChild(b);
    });
    var e=$("exp"); e.className="exp"; e.innerHTML="";
    var nb=$("nextBtn"); nb.className="btn primary hidden";
  }

  function pick(btn, ok, ch, ex){
    if(answered) return; answered=true;
    var btns=ch.querySelectorAll(".choice");
    btns.forEach(function(b){ b.disabled=true; });
    if(ok){ correct++; btn.classList.add("correct"); }
    else { btn.classList.add("wrong"); }
    markCorrect(ch);
    var mk = ok ? '<span class="mk ok">○ 正解</span>' : '<span class="mk ng">✗ 不正解</span>';
    var e=$("exp"); e.innerHTML=mk+(ex||""); e.classList.add("show");
    var nb=$("nextBtn"); nb.classList.remove("hidden");
    nb.textContent=(cur+1>=pool.length)?"結果を みる":"つぎへ";
    $("progFill").style.width=Math.round((cur+1)/pool.length*100)+"%";
  }
  function markCorrect(ch){
    var o=pool[cur], it=o.it, correctText=it.cs[it.a];
    ch.querySelectorAll(".choice").forEach(function(b){
      var t=b.querySelector("span:last-child").textContent;
      if(t===correctText) b.classList.add("correct");
    });
  }

  $("nextBtn").addEventListener("click", function(){
    if(cur+1>=pool.length){ finish(); }
    else { cur++; render(); window.scrollTo({top:0,behavior:"smooth"}); }
  });

  function finish(){
    __stopTimer(); var __elapsed=Date.now()-__startTime;
    quiz.classList.add("hidden"); result.classList.remove("hidden");
    var n=pool.length, pct=Math.round(correct/n*100);
    $("rScore").textContent=correct+" / "+n;

      var it=(pool[cur]&&(pool[cur].it||pool[cur]))||{};
      var body={ message:msg, test:EXPORT_NAME, section:curSec+((pool[cur]&&pool[cur].sec)?(' / '+pool[cur].sec):''),
        question:String(it.q||it.sub||it.passage||''), choices:(it.cs||[]).join(' / '), answer:(it.cs&&it.cs[it.a])||'' };
      fetch(FORMSPREE,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body)})
        .then(function(res){ if(res.ok){ D('rpform').style.display='none'; D('rpsent').style.display='block'; setTimeout(closeReport,1800); } else alert('送信に失敗しました。'); })
        .catch(function(){ alert('送信に失敗しました。ネット接続をご確認ください。'); });
    };

    /* --- 出題画面に報告ボタンを差し込む（解答後）--- */
    if(typeof pick==='function'){
      var _pick=pick; pick=function(){ var r=_pick.apply(this,arguments); try{ var e=D('exp'); if(e && !D('repInBtn')){ var bb=document.createElement('div'); bb.style.textAlign='right'; bb.innerHTML='<button id="repInBtn" class="rep-link" onclick="openReport()">⚠ この問題を報告</button>'; e.appendChild(bb); } }catch(err){} return r; };
    }

    /* --- 非表示問題を出題から除外 --- */
    function filterHidden(){ try{ pool=pool.filter(function(x){ return !((x.it||x).hidden); }); }catch(e){} }
    if(typeof start==='function'){ var _s=start; start=function(){ var r=_s.apply(this,arguments); filterHidden(); try{ if(pool.length){ if(cur>=pool.length) cur=0; render(); } }catch(e){} return r; }; }
    if(typeof startReview==='function'){ var _sr=startReview; startReview=function(){ var r=_sr.apply(this,arguments); filterHidden(); try{ if(pool.length){ if(cur>=pool.length) cur=0; render(); } }catch(e){} return r; }; }
  })();

})();
</script>
<script src="record_config.js"></script>
<script src="quiz_record.js"></script>
</body>
