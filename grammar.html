<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文法リスト（レベル別）・ 日本語の部屋</title>
<meta name="description" content="各言語の検定試験のレベルに沿った文法リスト。各文法に現地語の例文・読み・日本語訳・一言説明つき。">
<style>
  :root{
    --bg:#F7F5F0; --surface:#FFFFFF; --border:#E2DDD6;
    --text:#1C1C1C; --text-muted:#6B6560; --text-hint:#9E9890;
    --accent:#2F7168; --accent-bg:#DDEEE7; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;padding:0 1rem 3rem;}
  .container{max-width:560px;margin:0 auto;}

  .topbar{display:flex;align-items:center;gap:8px;padding:14px 0 2px;flex-wrap:wrap;}
  .back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--text-muted);
    text-decoration:none;padding:6px 13px 6px 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);transition:transform .12s;}
  .back-link:active{transform:scale(.97);}
  .back-arrow{font-size:16px;line-height:1;}

  .lang-header{display:flex;align-items:center;gap:14px;background:var(--surface);
    border:1px solid var(--border);border-left:5px solid var(--accent);border-radius:var(--radius);padding:16px;margin-top:1rem;}
  .lh-chip{min-width:56px;height:56px;padding:0 10px;border-radius:14px;background:var(--accent-bg);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;white-space:nowrap;}
  .lh-name{flex:1;min-width:0;}
  .lh-jp{font-size:20px;font-weight:700;}
  .lh-sub{font-size:12.5px;color:var(--text-muted);margin-top:2px;}

  .note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 15px;font-size:12.5px;color:var(--text-muted);line-height:1.75;margin-top:14px;}
  .note b{color:var(--text);}
  .note .src{display:block;color:var(--text-hint);font-size:11px;margin-top:6px;line-height:1.6;}

  .filters{position:sticky;top:0;z-index:40;display:flex;gap:7px;overflow-x:auto;
    margin:1.2rem -1rem 0;padding:10px 1rem 8px;
    background:linear-gradient(var(--bg) 80%, rgba(247,245,240,0));
    -webkit-overflow-scrolling:touch;scrollbar-width:none;cursor:grab;}
  .filters::-webkit-scrollbar{display:none;}
  .fbtn{flex:0 0 auto;font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap;
    background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 13px;cursor:pointer;transition:transform .1s;}
  .fbtn:active{transform:scale(.96);}
  .fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .fcount{font-size:11px;color:var(--text-hint);margin:8px 2px 2px;}

  .lv-head{margin:22px 2px 6px;padding-top:16px;border-top:1px solid var(--border);
    font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;}
  .lv-head:first-of-type{border-top:none;padding-top:4px;}
  .lv-bar{width:4px;height:18px;border-radius:2px;background:var(--accent);}

  .g{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);
    border-radius:12px;padding:12px 14px;margin-bottom:9px;}
  .g-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .g-p{font-size:17px;font-weight:700;color:var(--accent);}
  .g-py{font-size:11.5px;color:var(--text-hint);}
  .g-badge{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--accent);background:var(--accent-bg);border-radius:20px;padding:2px 9px;white-space:nowrap;}
  .g-ja{font-size:13px;font-weight:700;margin-top:3px;}
  .g-ex{margin-top:9px;background:var(--accent-bg);border-radius:9px;padding:9px 11px;}
  .g-ex-row{display:flex;align-items:center;gap:10px;}
  .g-ex-main{flex:1;min-width:0;}
  .g-cn{font-size:16px;font-weight:700;line-height:1.5;color:#1C1C1C;}
  .g-pin{font-size:11.5px;color:var(--text-hint);margin-top:1px;}
  .g-ej{font-size:12.5px;color:var(--text-muted);margin-top:3px;}
  .say{flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);
    color:var(--accent);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,background .1s;}
  .say:active{transform:scale(.9);} .say.playing{background:var(--accent-bg);}
  .g-note{font-size:12px;color:var(--text-muted);margin-top:8px;line-height:1.65;}

  .hint{font-size:11px;color:var(--text-hint);margin:6px 2px 0;line-height:1.6;}
  .app-footer{text-align:center;font-size:11px;color:var(--text-hint);margin-top:2rem;line-height:1.8;}
  .notfound{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;margin-top:1.5rem;color:var(--text-muted);}

  /* PC・タブレットなど広い画面では、スマホ用レイアウトのまま全体を拡大して見やすくする */
  @media (min-width: 700px)  { .container { zoom: 1.3; } }
  @media (min-width: 1100px) { .container { zoom: 1.5; } }
</style>
</head>
<body>
<div class="container">
  <div class="topbar" id="topbar"></div>
  <div id="content"></div>
  <div class="app-footer">© 2025 日本語の部屋</div>
</div>

<script src="langdata.js"></script>
<script src="grammardata.js"></script>
<script>
function getParam(n){ var m=new RegExp('[?&]'+n+'=([^&]*)').exec(location.search); return m?decodeURIComponent(m[1]):null; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
var code = getParam('code');
var L = (window.LANGS||[]).filter(function(x){return x.code===code;})[0];
var G = (window.GRAMMAR||{})[code];
var content = document.getElementById('content');
var topbar = document.getElementById('topbar');

topbar.innerHTML =
    (L?'<a href="lang.html?code='+esc(L.code)+'" class="back-link"><span class="back-arrow">‹</span>'+esc(L.jp)+'</a>':'<a href="gaikokugo.html" class="back-link"><span class="back-arrow">‹</span>一覧</a>')
  + '<a href="gaikokugo.html" class="back-link">多言語</a>'
  + '<a href="index.html" class="back-link">ホーム</a>';

if(!L || !G){
  document.title = '文法リスト ・ 日本語の部屋';
  content.innerHTML = '<div class="notfound">この言語の文法データがありません。<br><a href="gaikokugo.html" style="color:#2F7168;font-weight:700;">一覧から選んでください ›</a></div>';
} else {
  document.title = L.jp + ' の文法（'+(G.test||'レベル別')+'）・ 日本語の部屋';
  document.documentElement.style.setProperty('--accent', L.accent);
  document.documentElement.style.setProperty('--accent-bg', L.bg);

  content.innerHTML =
      '<div class="lang-header"><div class="lh-chip">'+esc(L.chip)+'</div>'
      + '<div class="lh-name"><div class="lh-jp">'+esc(L.jp)+' の文法</div>'
      + '<div class="lh-sub">'+esc(G.testFull||G.test||'レベル別文法')+'</div></div></div>'
    + '<div class="note">'+ (G.note||('検定試験のレベルに沿って、各レベルで学ぶ主な文法をまとめました。各項目に例文・読み・日本語訳・一言説明つき。'))
      + '　🔊で例文を読み上げます（端末の音声が必要）。'
      + (G.src?'<span class="src">'+G.src+'</span>':'')
    + '</div>'
    + '<div class="filters" id="filters"></div>'
    + '<div class="fcount" id="count"></div>'
    + '<div id="list"></div>'
    + '<div class="hint">「レベル」はおおよその目安です。教材・試験の版によって扱う級が前後することがあります。</div>';

  var levels = G.levels || [];
  var current = 'all';

  function speak(text, btn){
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text); u.lang=L.tts||'en-US'; u.rate=0.9;
      if(btn){ btn.classList.add('playing'); u.onend=function(){btn.classList.remove('playing');}; u.onerror=function(){btn.classList.remove('playing');}; }
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  function card(it, lv){
    var py = it.py ? '<span class="g-py">'+esc(it.py)+'</span>' : '';
    var say = '<button type="button" class="say" aria-label="読み上げ" data-say="'+esc(it.ex)+'">🔊</button>';
    return '<div class="g">'
      + '<div class="g-top"><span class="g-p">'+esc(it.p)+'</span>'+py+'<span class="g-badge">'+esc(lv)+'</span></div>'
      + '<div class="g-ja">'+esc(it.ja)+'</div>'
      + '<div class="g-ex"><div class="g-ex-row"><div class="g-ex-main">'
        + '<div class="g-cn">'+esc(it.ex)+'</div>'
        + (it.epy?'<div class="g-pin">'+esc(it.epy)+'</div>':'')
        + '<div class="g-ej">'+esc(it.ej)+'</div>'
      + '</div>'+say+'</div></div>'
      + (it.note?'<div class="g-note">'+esc(it.note)+'</div>':'')
    + '</div>';
  }
  function render(){
    var html='', total=0;
    levels.forEach(function(g){
      if(current!=='all' && current!==g.lv) return;
      html += '<div class="lv-head"><span class="lv-bar"></span>'+esc(g.label)+'</div>';
      html += g.items.map(function(it){ return card(it, g.badge||g.lv); }).join('');
      total += g.items.length;
    });
    document.getElementById('list').innerHTML=html;
    document.getElementById('count').textContent = total + ' 項目'+(current!=='all'?'（'+current+'）':'（全レベル）');
    var btns=document.querySelectorAll('.fbtn');
    for(var i=0;i<btns.length;i++){ btns[i].className='fbtn'+(btns[i].getAttribute('data-k')===current?' active':''); }
  }
  (function initFilters(){
    var wrap=document.getElementById('filters');
    var items=[{k:'all',l:'すべて'}].concat(levels.map(function(g){ return {k:g.lv,l:g.tab||g.lv}; }));
    wrap.innerHTML=items.map(function(f){ return '<button type="button" class="fbtn" data-k="'+esc(f.k)+'">'+esc(f.l)+'</button>'; }).join('');
    wrap.addEventListener('click', function(e){ var b=e.target.closest('.fbtn'); if(!b)return; current=b.getAttribute('data-k'); render(); window.scrollTo({top:0,behavior:'smooth'}); });
    render();
  })();
  document.getElementById('list').addEventListener('click', function(e){
    var b=e.target.closest('.say'); if(!b)return; speak(b.getAttribute('data-say'), b);
  });
}
</script>
</body>
</html>
