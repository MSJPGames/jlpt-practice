const readingQuestions = {"内容理解（短文）": [{"question": "技術の進歩は、しばしば「時間の節約」という言葉で正当化される。家電の自動化にせよ通信の高速化にせよ、私たちは浮いた時間でより豊かな暮らしを送れるはずだった。ところが現実には、節約されたはずの時間はいつの間にか別の作業に吸収され、忙しさが減る気配はない。効率化が進めば進むほど、単位時間あたりに詰め込む活動の密度が上がるからだ。つまり道具が私たちを楽にしたのではなく、私たちが道具に合わせて生き方の速度を上げてしまったのである。\n\n〔問〕筆者が最も言いたいことは何か。", "choices": ["技術の進歩は人々の暮らしを確実に豊かにしてきた", "効率化は時間を生むどころか活動の密度を高め、人を楽にしていない", "家電や通信の自動化は今後さらに加速していくだろう", "時間を節約するには道具の使用を減らすべきである"], "answer": "効率化は時間を生むどころか活動の密度を高め、人を楽にしていない", "group": "S0", "explanation": "末尾の「道具が私たちを楽にしたのではなく」が主旨。豊かにした・加速する・使用を減らせは論点とずれるか矛盾する。"}, {"question": "拝啓 時下ますますご清栄のこととお慶び申し上げます。さて、弊社では来る九月一日より、受注業務の窓口を全面的にオンラインシステムへ移行する運びとなりました。これに伴い、従来お電話にて承っておりましたご注文につきましては、原則として専用サイトからのお手続きをお願い申し上げます。なお、システムに不慣れなお客様のために、当面の間は電話窓口も併設いたしますが、混雑緩和のため、可能な限りオンラインをご利用くださいますようお願い申し上げます。\n\n〔問〕この文書の内容と合っているものはどれか。", "choices": ["九月一日以降、電話での注文は一切受け付けられなくなる", "九月一日以降も電話窓口は当面残るが、オンライン利用が推奨される", "オンラインシステムはシステムに不慣れな客のみが対象である", "電話窓口は混雑緩和のため九月一日に廃止される"], "answer": "九月一日以降も電話窓口は当面残るが、オンライン利用が推奨される", "group": "S1", "explanation": "「当面の間は電話窓口も併設」「可能な限りオンラインを」と一致。一切受け付けない・廃止は矛盾、不慣れな客のみ対象も誤り。"}, {"question": "外国語を学ぶ際、多くの人は単語や文法の量が上達を決めると考える。しかし実際に会話でつまずく原因の大半は、知識の不足ではなく、間違いを恐れて口を開けないことにある。頭の中で完璧な文を組み立ててから話そうとすれば、その間に会話は先へ進んでしまう。むしろ多少不正確でも発話を続けた人のほうが、結果として相手からの反応を手がかりに表現を修正し、着実に伸びていく。学習において怖いのは誤りそのものではなく、誤りを避けようとして沈黙することなのだ。\n\n〔問〕筆者の考えに最も近いものはどれか。", "choices": ["会話の上達には単語と文法の量を増やすことが最も重要だ", "完璧な文を組み立ててから話す習慣が上達を早める", "誤りを恐れて沈黙するより、不正確でも話し続けるほうが伸びる", "会話でつまずくのは主に知識が不足しているためである"], "answer": "誤りを恐れて沈黙するより、不正確でも話し続けるほうが伸びる", "group": "S2", "explanation": "「怖いのは…誤りを避けようとして沈黙すること」が主旨。量が最重要・完璧に組み立てる・知識不足が主因は矛盾する。"}, {"question": "都市には無数の「名もなき空間」がある。ビルとビルの隙間、階段の踊り場、高架下のわずかな余白。設計上は何の用途も与えられていないこれらの場所は、しかし人々によって思いがけない使われ方をされる。喫煙者が身を寄せ、待ち合わせの目印となり、時には露店が並ぶ。都市が生き生きとして見えるのは、整然と計画された広場よりも、むしろこうした計画の網の目からこぼれ落ちた余白が住民に自由に読み替えられていくからではないか。\n\n〔問〕筆者が「名もなき空間」について述べていることはどれか。", "choices": ["用途が定められていないため、都市の中で無駄となっている", "計画された広場よりも人々に自由に使われ、都市に活気を与える", "本来の設計意図どおりに人々に利用されている", "都市計画の際に真っ先に排除すべき場所である"], "answer": "計画された広場よりも人々に自由に使われ、都市に活気を与える", "group": "S3", "explanation": "「余白が住民に自由に読み替えられていく」から都市が生き生きすると述べる。無駄・設計意図どおり・排除すべきは矛盾する。"}, {"question": "「客観的な報道」という理想はしばしば誤解される。それは記者が一切の判断を排し、事実をそのまま並べることだと考えられがちだ。だが世の中には無数の出来事があり、そのどれを取り上げどれを捨てるか、どの順序で伝えるかを選ぶ時点で、すでに何らかの価値判断が働いている。完全に中立な選択などありえない。重要なのは判断をなくすことではなく、自らの選択の基準を自覚し、それを読者に対して開いておくことだ。透明性こそが、達成不可能な無色透明の代わりに求められるものである。\n\n〔問〕下線部にあたる筆者の主張として最も適切なものはどれか。", "choices": ["記者は一切の価値判断を排して事実だけを並べるべきだ", "完全な中立は不可能なので、報道に客観性を求める意味はない", "判断をなくすのではなく、選択の基準を自覚し読者に開くべきだ", "出来事はできるだけ多く取り上げることが望ましい"], "answer": "判断をなくすのではなく、選択の基準を自覚し読者に開くべきだ", "group": "S4", "explanation": "「判断をなくすことではなく…選択の基準を自覚し…開いておくこと」が主旨。判断を排せ・客観性は無意味・多く取り上げよは誤り。"}, {"question": "睡眠時間を削って働くことを美徳とする風潮が、いまだに根強く残っている。だが近年の研究は、睡眠不足が判断力や記憶の定着を著しく損なうことを繰り返し示している。徹夜で仕上げた仕事は一見成果に見えても、そこには本人が気づかぬ質の低下が潜んでいることが多い。つまり睡眠を犠牲にして得た時間は、実は失われた効率という形で後から代償を払わされているのだ。よく眠ることは怠惰の反対語ではなく、質の高い労働を支える土台なのである。\n\n〔問〕筆者の主張と合っているものはどれか。", "choices": ["睡眠時間を削ってでも働くことは今なお美徳とすべきだ", "徹夜で仕上げた仕事は質が高く、効率的である", "睡眠は労働の質を支える土台であり、削るのは効率を損なう", "記憶の定着には睡眠よりも作業時間の長さが重要だ"], "answer": "睡眠は労働の質を支える土台であり、削るのは効率を損なう", "group": "S5", "explanation": "「よく眠ることは…質の高い労働を支える土台」が主旨。削るのを美徳・徹夜は質が高い・作業時間が重要は矛盾する。"}, {"question": "贈り物の価値は、その値段では測れない。高価な品を受け取っても心が動かないことがある一方、ささやかな品に深く感謝することもある。両者を分けるのは、贈る側がこちらのことをどれだけ想像したかという痕跡である。相手の好みや近況を思い浮かべ、あれこれ迷った末に選んだ、その思考の過程こそが品物に宿り、受け手に伝わる。だからこそ、選ぶのに費やした時間や心遣いが感じられない贈り物は、たとえ高額でも、どこか素通りしていくように受け取られるのだ。\n\n〔問〕筆者によれば、贈り物の価値を左右するものは何か。", "choices": ["贈られた品物の値段の高さ", "贈る側が受け手をどれだけ想像し心を配ったか", "贈り物を選ぶのにかけた金額の大きさ", "受け手が贈り物を実際に使うかどうか"], "answer": "贈る側が受け手をどれだけ想像し心を配ったか", "group": "S6", "explanation": "「こちらのことをどれだけ想像したかという痕跡」が価値を分けるとある。値段・金額の大小・使うかどうかは否定または言及なし。"}, {"question": "会議で反対意見が一つも出ないとき、それを全員が納得した証と受け取るのは危うい。むしろ、異論を口にしにくい空気こそが沈黙を生んでいる場合が少なくない。誰かが早々に結論めいた方向を示し、上位者がうなずけば、それに逆らう発言は場を乱すものと見なされてしまう。健全な合意とは、反対がないことではなく、反対を安心して述べられる場を経たうえで到達したものを指す。静かな会議室が、必ずしも意見の一致を意味するわけではないのである。\n\n〔問〕筆者が最も言いたいことは何か。", "choices": ["反対意見が出ない会議こそ、全員が納得した理想的な会議である", "異論が出ないのは合意の証ではなく、述べにくい空気の表れかもしれない", "会議では上位者が早く結論を示すことが議論の効率を高める", "健全な合意には反対意見を完全に排除することが必要だ"], "answer": "異論が出ないのは合意の証ではなく、述べにくい空気の表れかもしれない", "group": "S7", "explanation": "「反対を安心して述べられる場を経た」合意こそ健全とある。反対ゼロが理想・上位者が結論を示せ・反対を排除は矛盾する。"}], "内容理解（中文）": [{"question": "植物には脳も神経もない。だから植物は「考えない」と長らく信じられてきた。しかし近年の研究は、この前提そのものを揺るがしつつある。植物は光や重力、土中の水分の分布を精緻に感知し、根の伸びる方向を刻々と調整する。傷つけられれば化学物質を放出し、周囲の仲間に危険を知らせる種すらある。\nこうした振る舞いを前にして、私たちはつい「植物も知能を持つのか」と問いたくなる。だが、その問い方には落とし穴がある。私たちは無意識のうちに、動物、とりわけ人間の脳を知能の唯一のモデルとみなしているのだ。中枢を持たない植物の情報処理は、身体全体に分散して行われる。それは人間の知能とは似ても似つかぬ、まったく別の様式なのである。\n重要なのは、植物を人間に近づけて評価することではない。むしろ、私たちが「知能」という言葉に押し込めてきた枠組みの狭さに気づくことだ。生命が世界に応答する仕方は、一つではない。植物を理解しようとする試みは、結局のところ、私たち自身がいかに偏った物差ししか持たずに生き物を眺めてきたかを映し出す鏡なのである。\n\n〔問〕「その問い方には落とし穴がある」とあるが、どういうことか。", "choices": ["植物が本当に情報を感知しているかは、まだ証明されていないということ", "人間の脳を知能の唯一の基準として、植物を測ろうとしてしまうこと", "植物には脳がないので、そもそも知能を論じることができないということ", "植物の知能は動物の知能よりも優れている可能性があるということ"], "answer": "人間の脳を知能の唯一の基準として、植物を測ろうとしてしまうこと", "group": "M0", "explanation": "直後で「人間の脳を知能の唯一のモデルとみなしている」ことが落とし穴だと説明されている。"}, {"question": "植物には脳も神経もない。だから植物は「考えない」と長らく信じられてきた。しかし近年の研究は、この前提そのものを揺るがしつつある。植物は光や重力、土中の水分の分布を精緻に感知し、根の伸びる方向を刻々と調整する。傷つけられれば化学物質を放出し、周囲の仲間に危険を知らせる種すらある。\nこうした振る舞いを前にして、私たちはつい「植物も知能を持つのか」と問いたくなる。だが、その問い方には落とし穴がある。私たちは無意識のうちに、動物、とりわけ人間の脳を知能の唯一のモデルとみなしているのだ。中枢を持たない植物の情報処理は、身体全体に分散して行われる。それは人間の知能とは似ても似つかぬ、まったく別の様式なのである。\n重要なのは、植物を人間に近づけて評価することではない。むしろ、私たちが「知能」という言葉に押し込めてきた枠組みの狭さに気づくことだ。生命が世界に応答する仕方は、一つではない。植物を理解しようとする試みは、結局のところ、私たち自身がいかに偏った物差ししか持たずに生き物を眺めてきたかを映し出す鏡なのである。\n\n〔問〕本文の内容と合うものはどれか。", "choices": ["植物の研究は、人間の知能の仕組みを解明する手がかりになる", "植物の情報処理は中枢に集中しており、人間の脳とよく似ている", "植物の研究は、人間が持つ「知能」の枠組みの狭さを気づかせる", "植物にも神経があることが、近年の研究で明らかになった"], "answer": "植物の研究は、人間が持つ「知能」の枠組みの狭さを気づかせる", "group": "M0", "explanation": "終盤で「知能という言葉に押し込めてきた枠組みの狭さに気づくこと」が重要だと述べている。植物は中枢を持たず神経もない。"}, {"question": "写真が発明されたとき、絵画は死ぬと予言した者がいた。対象をありのままに写し取る点で、写真は絵筆をはるかに凌駕していたからだ。ところが実際に起こったのは、絵画の死ではなく、絵画の解放だった。もはや現実をそっくり再現する義務から自由になった画家たちは、色彩そのものの響きや、内面の感情、光の一瞬の印象へと関心を移していった。写真という新技術は、皮肉にも絵画を写実の呪縛から救い出したのである。\nこの出来事は、技術と芸術の関係について示唆に富む。新しい技術は、しばしば古い表現を脅かすものとして現れる。だが脅かされた側は、その技術には決して代えられない自らの固有の役割を、あらためて発見することがある。技術は敵ではなく、時に問いを突きつける存在なのだ。\n今日、人工知能が絵や文章を生み出す時代を迎え、私たちは再び同じ岐路に立っている。歴史が教えるのは、悲観でも楽観でもない。奪われるかに見えたその瞬間にこそ、人間にしか担えぬ表現とは何かという問いが、最も鋭く立ち上がるということである。\n\n〔問〕写真の発明がもたらした結果を、筆者はどう述べているか。", "choices": ["写真の登場によって、絵画は予言どおり衰退していった", "写真が写実の役割を担ったことで、絵画は別の表現へと向かった", "写真と絵画は競い合い、どちらもより写実的になっていった", "写真の技術が未熟だったため、絵画の地位は変わらなかった"], "answer": "写真が写実の役割を担ったことで、絵画は別の表現へと向かった", "group": "M1", "explanation": "写真によって画家は「写実の呪縛から救い出され」、色彩や感情、印象へ関心を移したと述べている。"}, {"question": "写真が発明されたとき、絵画は死ぬと予言した者がいた。対象をありのままに写し取る点で、写真は絵筆をはるかに凌駕していたからだ。ところが実際に起こったのは、絵画の死ではなく、絵画の解放だった。もはや現実をそっくり再現する義務から自由になった画家たちは、色彩そのものの響きや、内面の感情、光の一瞬の印象へと関心を移していった。写真という新技術は、皮肉にも絵画を写実の呪縛から救い出したのである。\nこの出来事は、技術と芸術の関係について示唆に富む。新しい技術は、しばしば古い表現を脅かすものとして現れる。だが脅かされた側は、その技術には決して代えられない自らの固有の役割を、あらためて発見することがある。技術は敵ではなく、時に問いを突きつける存在なのだ。\n今日、人工知能が絵や文章を生み出す時代を迎え、私たちは再び同じ岐路に立っている。歴史が教えるのは、悲観でも楽観でもない。奪われるかに見えたその瞬間にこそ、人間にしか担えぬ表現とは何かという問いが、最も鋭く立ち上がるということである。\n\n〔問〕筆者が人工知能の時代について言いたいことは何か。", "choices": ["人工知能によって人間の表現はいずれ完全に置き換えられる", "人工知能の登場を、過度に楽観して歓迎すべきである", "新技術に脅かされる局面でこそ、人間固有の表現とは何かが問われる", "歴史は繰り返さないので、過去の例は参考にならない"], "answer": "新技術に脅かされる局面でこそ、人間固有の表現とは何かが問われる", "group": "M1", "explanation": "「悲観でも楽観でもない」とし、奪われるかに見える瞬間にこそ人間にしか担えぬ表現への問いが鋭く立ち上がると結んでいる。"}], "内容理解（長文）": [{"question": "私たちは「便利さ」という言葉を、疑いようのない善として受け入れがちである。何かが便利になったと聞けば、それだけで生活が豊かになったかのように感じ、その裏で失われたものについて立ち止まって考えることは少ない。しかし、便利さとは本来、ある目的を達成するために費やす手間や時間を減らすことにすぎない。減った手間の分だけ、私たちが何を得て、何を手放したのかは、決して自明ではないのである。\n たとえば、目的地までの道順を瞬時に示してくれる地図の技術を考えてみよう。かつて私たちは、見知らぬ街を歩くとき、地図を広げ、周囲の建物や交差点の形を手がかりに、自分がどこにいるのかを絶えず確かめながら進んだ。道に迷うこともあったが、その過程で街全体の構造が、いつのまにか身体に刻まれていった。ところが今、私たちは示された矢印にただ従うだけで目的地に着く。迷うことはなくなったが、その街がどのような形をしているのかを、以前ほど深く知ることはなくなった。\n ここで注意したいのは、これを単なる技術批判として片づけてはならない、ということである。問題は技術そのものにあるのではなく、便利さを手にした私たちが、それによって省かれた過程の意味に無自覚であることにある。手間とは、しばしば単なる負担ではなく、対象と自分とを結びつける経験の厚みそのものであった。その厚みが失われても、私たちは失ったという感覚さえ持たない。なぜなら、失われたものは、はじめから目に見えにくい性質のものだからである。\n もちろん、あらゆる手間を惜しむなと言いたいのではない。省くべき手間は確かに存在する。私が言いたいのは、便利さを受け入れるとき、それが何を私たちから引き受けているのかを、せめて意識の片隅に留めておくべきだ、ということである。便利さを一様に善とみなす態度こそが、私たちから選ぶ力を奪う。便利になったその先で、どのような自分でありたいのか——その問いを手放さないかぎり、技術は私たちの主人ではなく、道具でありつづけるはずである。\n\n〔問〕筆者は「便利さ」について、まずどのように述べているか。", "choices": ["手間や時間を減らすことであり、それによる得失は自明ではない", "生活を豊かにする、疑いようのない善である", "目的の達成を妨げる、避けるべきものである", "失われるものが必ず得られるものを上回るものである"], "answer": "手間や時間を減らすことであり、それによる得失は自明ではない", "group": "L0", "explanation": "第一段落で便利さは手間や時間を減らすことにすぎず、得たものと手放したものは自明でないと述べている。"}, {"question": "私たちは「便利さ」という言葉を、疑いようのない善として受け入れがちである。何かが便利になったと聞けば、それだけで生活が豊かになったかのように感じ、その裏で失われたものについて立ち止まって考えることは少ない。しかし、便利さとは本来、ある目的を達成するために費やす手間や時間を減らすことにすぎない。減った手間の分だけ、私たちが何を得て、何を手放したのかは、決して自明ではないのである。\n たとえば、目的地までの道順を瞬時に示してくれる地図の技術を考えてみよう。かつて私たちは、見知らぬ街を歩くとき、地図を広げ、周囲の建物や交差点の形を手がかりに、自分がどこにいるのかを絶えず確かめながら進んだ。道に迷うこともあったが、その過程で街全体の構造が、いつのまにか身体に刻まれていった。ところが今、私たちは示された矢印にただ従うだけで目的地に着く。迷うことはなくなったが、その街がどのような形をしているのかを、以前ほど深く知ることはなくなった。\n ここで注意したいのは、これを単なる技術批判として片づけてはならない、ということである。問題は技術そのものにあるのではなく、便利さを手にした私たちが、それによって省かれた過程の意味に無自覚であることにある。手間とは、しばしば単なる負担ではなく、対象と自分とを結びつける経験の厚みそのものであった。その厚みが失われても、私たちは失ったという感覚さえ持たない。なぜなら、失われたものは、はじめから目に見えにくい性質のものだからである。\n もちろん、あらゆる手間を惜しむなと言いたいのではない。省くべき手間は確かに存在する。私が言いたいのは、便利さを受け入れるとき、それが何を私たちから引き受けているのかを、せめて意識の片隅に留めておくべきだ、ということである。便利さを一様に善とみなす態度こそが、私たちから選ぶ力を奪う。便利になったその先で、どのような自分でありたいのか——その問いを手放さないかぎり、技術は私たちの主人ではなく、道具でありつづけるはずである。\n\n〔問〕地図の技術の例を通して、筆者が指摘しているのはどのようなことか。", "choices": ["道に迷わなくなった代わりに、街の構造を深く知る経験が失われたこと", "地図の技術によって街全体の構造がより深く理解できるようになったこと", "道に迷うことは常に避けるべき無駄な経験であるということ", "見知らぬ街を歩くこと自体が不要になったということ"], "answer": "道に迷わなくなった代わりに、街の構造を深く知る経験が失われたこと", "group": "L0", "explanation": "第二段落で、迷わなくなったが街の形を以前ほど深く知ることはなくなったと述べている。"}, {"question": "私たちは「便利さ」という言葉を、疑いようのない善として受け入れがちである。何かが便利になったと聞けば、それだけで生活が豊かになったかのように感じ、その裏で失われたものについて立ち止まって考えることは少ない。しかし、便利さとは本来、ある目的を達成するために費やす手間や時間を減らすことにすぎない。減った手間の分だけ、私たちが何を得て、何を手放したのかは、決して自明ではないのである。\n たとえば、目的地までの道順を瞬時に示してくれる地図の技術を考えてみよう。かつて私たちは、見知らぬ街を歩くとき、地図を広げ、周囲の建物や交差点の形を手がかりに、自分がどこにいるのかを絶えず確かめながら進んだ。道に迷うこともあったが、その過程で街全体の構造が、いつのまにか身体に刻まれていった。ところが今、私たちは示された矢印 function spreadGroups(arr) {
  if (arr.length < 3) return arr;
  const items = arr.slice();
  const out = [];
  let lastG = null;
  while (items.length) {
    const counts = {};
    items.forEach(q => { const g = q.group || ''; counts[g] = (counts[g] || 0) + 1; });
    let best = -1, bestC = -1;
    for (let i = 0; i < items.length; i++) {
      const g = items[i].group || '';
      if (g === lastG) continue;
      if (counts[g] > bestC) { bestC = counts[g]; best = i; }
    }
    if (best === -1) best = 0;
    out.push(items[best]); lastG = items[best].group || ''; items.splice(best, 1);
  }
  return out;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function updateStatsBar() {
  if (stats.total === 0) return;
  document.getElementById('stats-bar').classList.remove('hidden');
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-correct').textContent = stats.correct;
  document.getElementById('stat-rate').textContent = Math.round(stats.correct / stats.total * 100) + '%';
}


function toggleReading() {
  const el = document.getElementById('reading-sub');
  const btn = document.getElementById('cat-reading');
  const vEl = document.getElementById('vocab-sub');
  const gEl = document.getElementById('grammar-sub');
  const vBtn = document.getElementById('cat-vocab');
  const gBtn = document.getElementById('cat-grammar');
  const isOpen = el && el.classList.contains('show');
  if (el) el.classList.toggle('show', !isOpen);
  if (btn) btn.classList.toggle('active', !isOpen);
  if (vEl) vEl.classList.remove('show');
  if (gEl) gEl.classList.remove('show');
  if (vBtn) vBtn.classList.remove('active');
  if (gBtn) gBtn.classList.remove('active');
}

    sub.classList.add('show');
    btn.classList.add('active');
  } else {
    sub.classList.remove('show');
    btn.classList.remove('active');
  }
}

function startQuiz(sec, sub) {
  section = sec;
  subtype = sub;
  vocabExpanded = false;
  document.getElementById('vocab-sub').classList.remove('show');
  document.getElementById('cat-vocab').classList.remove('active');
  const _gSub = document.getElementById('grammar-sub'); if (_gSub) _gSub.classList.remove('show');
  const _gBtn = document.getElementById('cat-grammar'); if (_gBtn) _gBtn.classList.remove('active');
  const readingSub = document.getElementById('reading-sub');
  if (readingSub) readingSub.classList.remove('show');
  const catReading = document.getElementById('cat-reading');
  if (catReading) catReading.classList.remove('active');
  const listeningSub = document.getElementById('listening-sub');
  if (listeningSub) listeningSub.classList.remove('show');
  const catListening = document.getElementById('cat-listening');
  if (catListening) catListening.classList.remove('active');

  let sourcePool;
  if (sec === '文字・語彙' && sub) {
    sourcePool = vocabQuestions[sub] || [];
  } else if (sec === '文法' && sub) {
    sourcePool = grammarQuestions[sub] || [];
  } else if (sec === '読解' && sub) {
    sourcePool = readingQuestions[sub] || [];
  } else if (sec === '読解') {
    sourcePool = Object.values(readingQuestions).flat();
  } else if (sec === '聴解') {
    if (sub) {
      const mn = parseInt((sub.match(/(\d+)/) || [])[1], 10);
      sourcePool = (typeof listeningQuestions !== 'undefined' ? listeningQuestions : []).filter(q => q.mondai === mn);
    } else {
      sourcePool = (typeof listeningQuestions !== 'undefined' ? listeningQuestions : []).slice();
    }
  } else {
    sourcePool = otherQuestions[sec] || [];
  }

  sourcePool = sourcePool.filter(q => !q.hidden);
  if (sourcePool.length === 0) { alert('この種類は ひょうじ できる もんだいが ありません（すべて 非表示です）。'); goHome(); return; }

  // 文章の文法は5問ずつのセット（文章単位）でシャッフルし、セット内は順序固定
  if (sub === '文章の文法') {
    const PASSAGE_SIZE = 5;
    const passages = [];
    for (let i = 0; i < sourcePool.length; i += PASSAGE_SIZE) {
      passages.push(sourcePool.slice(i, i + PASSAGE_SIZE));
    }
    const shuffledPassages = shuffle(passages);
    // 必要な文章数だけ取り（10問なら2文章分）
    const needed = Math.ceil(TOTAL_Q / PASSAGE_SIZE);
    pool = shuffledPassages.slice(0, needed).flat().slice(0, TOTAL_Q);
  } else {
    pool = shuffle(sourcePool).slice(0, TOTAL_Q);
    pool = spreadGroups(pool);
  }
  // 実際のpool数に合わせてTOTAL_Qを調整
  actualTotal = pool.length;
  current = 0;
  correct = 0;
  answered = false;
  if(window.NNHRecord){ window.__nnhSec = sec + (sub? "／"+sub : ""); NNHRecord.init({tool:"日本語クイズ N1", level: sec + (sub? "／"+sub : "")}); }

  elapsedSeconds = 0;

  hide('home-screen');
  hide('result-screen');
  show('quiz-screen');

  const pillLabel = sub ? sub : sec;
  document.getElementById('section-pill').textContent = sec;
  document.getElementById('subtype-label').textContent = sub ? '問題種別：' + sub : '';

  startTimer();
  renderQuestion();
}

function startTimer() {
  clearInterval(timerInterval);
  elapsedSeconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimerDisplay() {
  const m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
  const s = String(elapsedSeconds % 60).padStart(2, '0');
  document.getElementById('timer-box').textContent = m + ':' + s;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if (m === 0) return s + '秒';
  return m + '分' + s + '秒';
}

function renderQuestionText(text) {
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // __X__ → 下線付きテキスト
  let result = escaped.replace(/__(.+?)__/g, '<u style="text-decoration-thickness:2px;text-underline-offset:3px;font-weight:700;">$1</u>');
  // ★ → 強調ボックス
  result = result.replace(/★/g, '<span style="display:inline-block;background:#2D5A8E;color:#fff;font-weight:700;padding:1px 8px;border-radius:4px;font-size:15px;">★</span>');
  // ①②③④⑤ → 空欄マーカー
  result = result.replace(/([①②③④⑤])/g, '<span style="display:inline-block;background:#E8F0F8;border:2px solid #2D5A8E;border-radius:4px;padding:1px 10px;font-weight:700;color:#1A3A5C;min-width:40px;text-align:center;">$1</span>');
  return result.replace(/\n/g, '<br>');
}

function renderQuestion() {
  answered = false;
  const q = pool[current];
  if (!q) { showResult(); return; }
  const num = current + 1;
  document.getElementById('q-counter').textContent = '問題 ' + num + ' / ' + actualTotal;
  document.getElementById('progress-fill').style.width = Math.round(num / actualTotal * 100) + '%';
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('next-btn').className = 'next-btn';

  if (section === '文法' && subtype === '文の文法2') {
    renderPuzzle(q);
  } else {
    renderChoices(q);
  }
}

function renderChoices(q) {
  // visual HTML（情報検索問題のお知らせ表示）
  let visualDiv = '';
  try {
    const visualKey = q.visual || null;
    if (visualKey && typeof visualHTML !== 'undefined' && visualHTML[visualKey]) {
      visualDiv = '<div style="margin-bottom:12px;overflow-x:auto">' + visualHTML[visualKey] + '</div>';
    }
  } catch(e) { visualDiv = ''; }

  // 聴解問題の音声プレイヤー
  let audioDiv = '';
  if (q.audio) {
    const esc = function(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
    const situationText = q.situation ? '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;line-height:1.7">' + esc(q.situation) + '</div>' : '';
    const preQText = q.preQuestion ? '<div style="font-size:12px;color:var(--text);margin-bottom:8px;font-weight:600">' + esc(q.preQuestion) + '</div>' : '';
    let scriptHtml = '';
    if (q.script && q.script.length > 0) {
      const lines = q.script.map(function(s){
        const isM = (s.speaker === 'M' || s.speaker === 'M2' || s.speaker === '男');
        const badge = isM
          ? '<span style="display:inline-block;background:#E8F0F8;color:#2D5A8E;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0;margin-top:2px">男</span>'
          : '<span style="display:inline-block;background:#FCE4EC;color:#c62828;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0;margin-top:2px">女</span>';
        return '<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">' + badge
          + '<span style="font-size:12px;line-height:1.7;color:var(--text);flex:1">' + esc(s.text) + '</span></div>';
      }).join('');
      scriptHtml = '<div id="script-box" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">' + lines + '</div>'
        + '<button onclick="toggleScript()" style="margin-top:8px;background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--text-muted);cursor:pointer">'
        + '<span id="script-btn-icon">📄</span> <span id="script-btn-label">スクリプトを見る</span></button>';
    }
    audioDiv = '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">'
      + situationText + preQText
      + '<audio id="listening-audio" controls style="width:100%;margin-top:4px" src="' + q.audio + '">お使いのブラウザは音声再生に対応していません。</audio>'
      + '<div style="font-size:11px;color:var(--text-hint);margin-top:6px">※ 音声を聞いてから回答してください</div>'
      + scriptHtml + '</div>';
  }

  // 問題カードと選択肢を必ずリセット
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  document.getElementById('question-card').innerHTML = audioDiv + visualDiv + renderQuestionText(q.question);

  const labels = ['１', '２', '３', '４'];
  shuffle(q.choices).forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.value = c;
    btn.innerHTML = '<span class="choice-label">' + labels[i] + '</span><span class="choice-text">' + c + '</span>';
    btn.addEventListener('click', () => selectAnswer(c, q, btn, choicesEl));
    choicesEl.appendChild(btn);
  });
}

function renderPuzzle(q) {
  const STAR_POS = 2;
  const allLines = q.question.split('\n');
  const instructionLine = allLines[0] || '';

  // 下線部行のインデックスを特定
  const underlineLineIdx = allLines.findIndex(l => l.includes('__１__'));

  // 前件：instruction行の次から下線部行の直前まで（空行除く）
  const preLines = allLines.slice(1, underlineLineIdx).filter(l => l.trim() !== '');

  // 後件：下線部行の次から末尾まで（空行除く、下線を含む行は除く）
  const tailLines = allLines.slice(underlineLineIdx + 1).filter(l => l.trim() !== '');

  const slotContents = [null, null, null, null];
  const tiles = shuffle([...q.choices]);

  // ── question-card ──
  const card = document.getElementById('question-card');
  card.innerHTML = '';

  const instr = document.createElement('div');
  instr.style.cssText = 'font-size:13px;color:var(--text-hint);margin-bottom:10px;';
  instr.textContent = instructionLine;
  card.appendChild(instr);

  const sentDiv = document.createElement('div');
  sentDiv.className = 'puzzle-sentence';
  sentDiv.style.lineHeight = '2.2';

  // 前件を追加（複数行対応）
  preLines.forEach((line, idx) => {
    sentDiv.appendChild(document.createTextNode(line.trim()));
    sentDiv.appendChild(document.createElement('br'));
  });

  // スロット行
  const slotRow = document.createElement('div');
  slotRow.className = 'puzzle-slot-row';
  const slotEls = [];

  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('span');
    slot.className = 'puzzle-slot' + (i === STAR_POS ? ' star-slot' : '');
    slot.dataset.idx = i;
    slot.addEventListener('click', () => {
      if (!slot.classList.contains('filled') || answered) return;
      const word = slotContents[i];
      slotContents[i] = null;
      slot.textContent = '';
      slot.classList.remove('filled');
      const tileEl = document.querySelector(`.puzzle-tile[data-word="${word}"]`);
      if (tileEl) { tileEl.classList.remove('used'); tileEl.disabled = false; }
      updateCheckBtn();
    });
    slotEls.push(slot);
    slotRow.appendChild(slot);
    if (i < 3) {
      const sep = document.createElement('span');
      sep.style.cssText = 'color:var(--text-hint);font-size:18px;line-height:1;margin:0 1px;';
      sep.textContent = '―';
      slotRow.appendChild(sep);
    }
  }
  sentDiv.appendChild(slotRow);

  // 後件を追加（複数行対応）
  tailLines.forEach((line, idx) => {
    if (idx > 0) sentDiv.appendChild(document.createElement('br'));
    sentDiv.appendChild(document.createTextNode(line.trim()));
  });

  card.appendChild(sentDiv);

  // ── choices area: tiles + check button ──
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  const tilesDiv = document.createElement('div');
  tilesDiv.className = 'puzzle-tiles';
  tiles.forEach(word => {
    const tile = document.createElement('button');
    tile.className = 'puzzle-tile';
    tile.textContent = word;
    tile.dataset.word = word;
    tile.addEventListener('click', () => {
      if (answered || tile.classList.contains('used')) return;
      const emptyIdx = slotContents.findIndex(s => s === null);
      if (emptyIdx === -1) return;
      slotContents[emptyIdx] = word;
      slotEls[emptyIdx].textContent = word;
      slotEls[emptyIdx].classList.add('filled');
      tile.classList.add('used');
      tile.disabled = true;
      updateCheckBtn();
    });
    tilesDiv.appendChild(tile);
  });
  choicesEl.appendChild(tilesDiv);

  const checkBtn = document.createElement('button');
  checkBtn.className = 'puzzle-check-btn';
  checkBtn.textContent = '確認する';
  checkBtn.disabled = true;
  choicesEl.appendChild(checkBtn);

  function updateCheckBtn() {
    checkBtn.disabled = slotContents.some(s => s === null);
  }

  checkBtn.addEventListener('click', () => {
    if (answered) return;
    answered = true;
    const starWord = slotContents[STAR_POS];
    const isCorrect = starWord === q.answer;
    if (isCorrect) correct++;
  if(window.NNHRecord){ NNHRecord.add({sec:(window.__nnhSec||''), q:String(q.question||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,120), chosen:starWord, correct:q.answer, ok:isCorrect}); }

    stats.total++; if (isCorrect) stats.correct++;
    localStorage.setItem('jlpt_n1_stats', JSON.stringify(stats));

    slotEls[STAR_POS].classList.add(isCorrect ? 'correct-slot' : 'wrong-slot');
    document.querySelectorAll('.puzzle-tile').forEach(t => { t.disabled = true; });
    checkBtn.disabled = true;

    const fb = document.getElementById('feedback-box');
    fb.innerHTML = '<div class="feedback-label">' + (isCorrect ? '✓ 正解！' : '✗ 不正解') + '</div>' +
      (!isCorrect ? '<div style="margin-bottom:6px">★の正解：<strong>' + q.answer + '</strong></div>' : '') +
      '<div>' + q.explanation + '</div>';
    fb.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'wrong');
  const reportBtn = document.createElement('button');
  reportBtn.className = 'report-btn';
  reportBtn.textContent = '🚩 この問題を報告する';
  reportBtn.onclick = openReport;
  fb.appendChild(reportBtn);
    document.getElementById('next-btn').className = 'next-btn show';
  });
}


function selectAnswer(selected, q, btn, choicesEl) {
  if (answered) return;
  answered = true;
  const isCorrect = selected === q.answer;
  if (isCorrect) correct++;
  if(window.NNHRecord){ NNHRecord.add({sec:(window.__nnhSec||''), q:String(q.question||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,120), chosen:selected, correct:q.answer, ok:isCorrect}); }

  stats.total++;
  if (isCorrect) stats.correct++;
  localStorage.setItem('jlpt_n1_stats', JSON.stringify(stats));

  Array.from(choicesEl.children).forEach(b => {
    b.disabled = true;
    const val = b.dataset.value || b.querySelector('.choice-text').textContent;
    if (val === q.answer) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback-box');
  fb.innerHTML = '<div class="feedback-label">' + (isCorrect ? '✓ 正解！' : '✗ 不正解') + '</div>' +
    (!isCorrect ? '<div style="margin-bottom:4px">正解：' + q.answer + '</div>' : '') +
    '<div>' + q.explanation + '</div>';
  fb.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'wrong');
  const reportBtn = document.createElement('button');
  reportBtn.className = 'report-btn';
  reportBtn.textContent = '🚩 この問題を報告する';
  reportBtn.onclick = openReport;
  fb.appendChild(reportBtn);
  document.getElementById('next-btn').className = 'next-btn show';
}

function nextQuestion() {
  current++;
  if (current >= actualTotal) showResult();
  else renderQuestion();
}

function nnhMountRecord(){
  if(!window.NNHRecord) return;
  var host=document.getElementById('nnhHost');
  if(!host){ host=document.createElement('div'); host.id='nnhHost';
    var acts=document.querySelector('#result-screen .result-actions');
    if(acts&&acts.parentNode){ acts.parentNode.insertBefore(host, acts); } }
  if(host){ host.innerHTML=''; NNHRecord.mount(host,{score:correct,total:actualTotal}); }
}

function showResult() {
  stopTimer();
  hide('quiz-screen');
  show('result-screen');
  const pct = Math.round(correct / actualTotal * 100);
  document.getElementById('r-score').textContent = correct + '問';
  document.getElementById('r-of').textContent = actualTotal + '問中';
  document.getElementById('r-time').textContent = '⏱ ' + formatTime(elapsedSeconds) + 'で完了';
  document.getElementById('r-pct').textContent = '正答率 ' + pct + '%';
  const msg = pct >= 90 ? 'すばらしい！この種類の問題はほぼ完璧です。他の種類にも挑戦してみましょう！'
    : pct >= 70 ? 'よくできました！間違えた問題の解説をもう一度確認してみましょう。'
    : pct >= 50 ? 'もう少しです！苦手な部分を集中して練習するとさらに伸びます。'
    : '焦らず少しずつ進めましょう。毎日練習することが合格への近道です！';
  document.getElementById('r-comment').textContent = msg;
  nnhMountRecord();
  updateStatsBar();
}

// ── エディタ機能 ──────────────────────────────
let editingCat = null;
let editingKey = null;
let editingIdx = null;

// 確認済みフラグをlocalStorageで管理
// キー形式: "reviewed:{catStr}:{idx}"
function getReviewedKey(catStr, idx) { return `reviewed:${catStr}:${idx}`; }
function isReviewed(catStr, idx) { return localStorage.getItem(getReviewedKey(catStr, idx)) === '1'; }
function setReviewed(catStr, idx, val) {
  if (val) localStorage.setItem(getReviewedKey(catStr, idx), '1');
  else localStorage.removeItem(getReviewedKey(catStr, idx));
}

function openEditor() {
  const input = prompt('パスワードを入力してください：');
  if (!input) return;
  const HASH = '89c8c24ac1d962dc9b9514510fe68937ce5f7465216d51b0aecc74a6ac09de39';
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(input)).then(buf => {
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex === HASH) {
      hide('home-screen');
      show('editor-screen');
      loadEditorList();
    } else {
      alert('パスワードが違います。');
    }
  });
}

function closeEditor() {
  hide('editor-screen');
  show('home-screen');
}

function getEditorPool(catStr) {
  const [cat, key] = catStr.split('/');
  if (cat === '文法') return { pool: grammarQuestions[key] || [], key };
  if (cat === '文字・語彙') return { pool: vocabQuestions[key] || [], key };
  if (cat === '読解') return { pool: readingQuestions[key] || [], key };
  return { pool: [], key };
}

function loadEditorList() {
  const catStr = document.getElementById('editor-cat').value;
  const { pool, key } = getEditorPool(catStr);
  const isG2 = (key === '文の文法2');
  const listEl = document.getElementById('editor-list');
  listEl.innerHTML = '';

  const hiddenCount = pool.filter(q => q.hidden).length;
  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px';
  bar.innerHTML = `<div style="font-size:12px;color:var(--text-hint)">この種類：全 ${pool.length} 問 ／ <span style="color:#2D5A8E;font-weight:700">非表示 ${hiddenCount} 問</span></div>`
    + `<button onclick="exportHTML()" style="padding:8px 14px;border-radius:8px;background:#2D5A8E;color:#fff;border:none;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">\u{1F4BE} 修正版HTMLをダウンロード</button>`;
  listEl.appendChild(bar);

  // 未確認を先に、確認済みを後に並べる
  const indexed = pool.map((q, i) => ({ q, i, reviewed: isReviewed(catStr, i) }));
  indexed.sort((a, b) => a.reviewed - b.reviewed);

  // セパレーター用フラグ
  let shownUnreviewed = false;
  let shownReviewed = false;

  indexed.forEach(({ q, i, reviewed }) => {
    // セクションヘッダー
    if (!reviewed && !shownUnreviewed) {
      shownUnreviewed = true;
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--danger);padding:4px 0 2px;';
      hdr.textContent = '── 未確認';
      listEl.appendChild(hdr);
    }
    if (reviewed && !shownReviewed) {
      shownReviewed = true;
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:12px;font-weight:700;color:#27ae60;padding:10px 0 2px;';
      hdr.textContent = '── 確認済み ✓';
      listEl.appendChild(hdr);
    }

    const card = document.createElement('div');
    card.style.cssText = `background:var(--card-bg);border:1px ${q.hidden ? 'dashed #999' : 'solid ' + (reviewed ? '#27ae60' : 'var(--danger)')};border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;opacity:${q.hidden ? '0.45' : (reviewed ? '0.65' : '1')}`;

    const lines = q.question.split('\n').filter(l => l.trim() && !l.includes('えらびなさい'));
    const preview = lines.join(' ').replace(/__[１２★４]__/g,'＿').replace(/　/g,' ').substring(0,65) + '…';
    const choicesHtml = q.choices.map((c,ci) =>
      `<span style="font-size:12px;padding:2px 7px;border-radius:4px;background:${ci===2?'#2D5A8E':'var(--bg)'};color:${ci===2?'#fff':'var(--text-hint)'};border:1px solid var(--border)">${c}</span>`
    ).join('');
    const badge = reviewed
      ? `<span style="font-size:11px;color:#27ae60;font-weight:700">✓ 確認済み</span>`
      : `<span style="font-size:11px;color:var(--danger);font-weight:700">● 未確認</span>`;

    card.innerHTML = `
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:var(--text-hint);margin-bottom:3px;display:flex;gap:8px;align-items:center">
          <span style="font-weight:700">${key} #${i+1}</span>${badge}${q.hidden ? ' <span style="font-size:10px;color:#fff;background:#777;border-radius:4px;padding:1px 6px;font-weight:700">\u{1F6AB} 非表示</span>' : ''}
        </div>
        <div style="font-size:14px;line-height:1.5;word-break:break-all;margin-bottom:5px">${preview}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${choicesHtml}</div>
        ${!isG2 ? `<div style="font-size:12px;color:#27ae60;margin-top:4px">✓ 正解：${q.answer}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <button onclick="openEditModal('${catStr}',${i})" style="padding:7px 14px;border-radius:7px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">編集</button>
        <button onclick="toggleReviewed('${catStr}',${i})" style="padding:5px 10px;border-radius:7px;background:${reviewed?'#eee':'#27ae60'};color:${reviewed?'var(--text-hint)':'#fff'};border:none;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer">${reviewed?'未確認に戻す':'✓ 確認済みに'}</button>
        <button onclick="toggleHidden('${catStr}',${i})" style="padding:5px 10px;border-radius:7px;background:${q.hidden?'#2D5A8E':'#eee'};color:${q.hidden?'#fff':'var(--text-hint)'};border:none;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer">${q.hidden?'表示に戻す':'\u{1F6AB} 非表示にする'}</button>
      </div>`;
    listEl.appendChild(card);
  });

  if (pool.length === 0) {
    listEl.innerHTML = '<div style="color:var(--text-hint);text-align:center;padding:20px">問題がありません</div>';
  }
}

function toggleReviewed(catStr, idx) {
  setReviewed(catStr, idx, !isReviewed(catStr, idx));
  loadEditorList();
}

function openEditModal(catStr, idx) {
  const { pool, key } = getEditorPool(catStr);
  const q = pool[idx];
  if (!q) return;
  editingCat = catStr;
  editingKey = key;
  editingIdx = idx;
  const isG2 = (key === '文の文法2');

  const bodyLines = q.question.split('\n').slice(1);
  document.getElementById('edit-question').value = bodyLines.join('\n');
  document.getElementById('edit-c1').value = q.choices[0] || '';
  document.getElementById('edit-c2').value = q.choices[1] || '';
  document.getElementById('edit-c3').value = q.choices[2] || '';
  document.getElementById('edit-c4').value = q.choices[3] || '';
  document.getElementById('edit-explanation').value = q.explanation || '';

  const note = document.getElementById('edit-answer-note');
  if (isG2) {
    note.textContent = '⚠ 並べ替え問題：③が★（正解）になります。文中の正しい語順通りに①②③④を入力してください。';
    note.style.color = '#2D5A8E';
  } else {
    note.textContent = '※ 正解は③の選択肢に自動設定されます。正解にしたい語を③に入力してください。';
    note.style.color = 'var(--text-hint)';
  }

  document.getElementById('edit-modal-title').textContent = `問${idx+1} を編集`;
  document.getElementById('edit-overlay').style.display = 'block';
}

function closeEditModal() {
  document.getElementById('edit-overlay').style.display = 'none';
}

function saveEdit() {
  const { pool } = getEditorPool(editingCat);
  const q = pool[editingIdx];
  if (!q) return;

  const firstLine = q.question.split('\n')[0];
  q.question    = firstLine + '\n' + document.getElementById('edit-question').value;
  const c1 = document.getElementById('edit-c1').value.trim();
  const c2 = document.getElementById('edit-c2').value.trim();
  const c3 = document.getElementById('edit-c3').value.trim();
  const c4 = document.getElementById('edit-c4').value.trim();
  q.choices     = [c1, c2, c3, c4];
  q.answer      = c3;
  q.explanation = document.getElementById('edit-explanation').value.trim();

  // 編集したら自動的に未確認に戻す
  setReviewed(editingCat, editingIdx, false);

  closeEditModal();
  loadEditorList();
}

function toggleHidden(catStr, idx) {
  const { pool } = getEditorPool(catStr);
  const q = pool[idx];
  if (!q) return;
  if (q.hidden) delete q.hidden; else q.hidden = true;
  loadEditorList();
}

async function exportHTML() {
  let src;
  try {
    const res = await fetch(location.href, { cache: 'no-store' });
    src = await res.text();
  } catch (e) {
    src = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  }
  const ser =
    'const vocabQuestions = ' + JSON.stringify(vocabQuestions) + ';\n' +
    'const grammarQuestions = ' + JSON.stringify(grammarQuestions) + ';\n' +
    'const readingQuestions = ' + JSON.stringify(readingQuestions) + ';\n' +
    'const otherQuestions = ' + JSON.stringify(otherQuestions) + ';';
  const re = /\/\/ <DATA>[\s\S]*?\/\/ <\/DATA>/;
  if (!re.test(src)) { alert('データ範囲の マーカーが 見つかりません。GitHub Pages（サーバー）から ひらいて、もう一度 おためし ください。'); return; }
  src = src.replace(re, '// <DATA>\n' + ser + '\n// </DATA>');
  const blob = new Blob([src], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'n1_quiz.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1500);
}

let reportingQ = null;

function openReport() {
  const q = pool[current];
  reportingQ = q;
  document.getElementById('report-q-info').textContent = '問題：' + q.question.slice(0, 40) + '…';
  document.getElementById('report-textarea').value = '';
  document.getElementById('report-form-area').classList.remove('hidden');
  document.getElementById('report-sent-area').classList.add('hidden');
  document.getElementById('report-overlay').classList.remove('hidden');
}

function closeReport() {
  document.getElementById('report-overlay').classList.add('hidden');
}

async function sendReport() {
  const msg = document.getElementById('report-textarea').value.trim();
  if (!msg) { alert('コメントを入力してください。'); return; }
  const q = reportingQ;
  const body = {
    message: msg,
    question: q ? q.question : '',
    answer: q ? q.answer : '',
    section: section + (subtype ? ' / ' + subtype : ''),
  };
  try {
    const res = await fetch('https://formspree.io/f/xlgygdzd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      document.getElementById('report-form-area').classList.add('hidden');
      document.getElementById('report-sent-area').classList.remove('hidden');
      setTimeout(closeReport, 2000);
    } else {
      alert('送信に失敗しました。もう一度お試しください。');
    }
  } catch(e) {
    alert('送信に失敗しました。ネットワークを確認してください。');
  }
}

// 収録問題数をデータから自動集計して表示（ハードコード値のズレ防止）
(function updateAllCounts(){
  function setText(id, txt){ var el = document.getElementById(id); if (el) el.textContent = txt; }
  function countOf(obj, key){
    try { return (obj && obj[key] ? obj[key].length : 0); } catch(e){ return 0; }
  }
  try {
    // 文字・語彙
    if (typeof vocabQuestions !== 'undefined') {
      var vmap = {'漢字読み':'count-kanji','文脈規定':'count-bunmyaku','言い換え類義':'count-iikae','用法':'count-youhou'};
      var vtotal = 0;
      Object.keys(vocabQuestions).forEach(function(k){
        var n = (vocabQuestions[k] || []).length; vtotal += n;
        setText(vmap[k], n + '問');
      });
      setText('vocab-total-count', '計' + vtotal + '問収録');
    }
    // 文法
    if (typeof grammarQuestions !== 'undefined') {
      setText('cnt-g1', countOf(grammarQuestions, '文の文法1') + '問');
      setText('cnt-g2', countOf(grammarQuestions, '文の文法2') + '問');
      setText('cnt-g3', countOf(grammarQuestions, '文章の文法') + '問');
      var gtot = countOf(grammarQuestions,'文の文法1')+countOf(grammarQuestions,'文の文法2')+countOf(grammarQuestions,'文章の文法');
      setText('grammar-total-count', '計'+gtot+'問収録');
    }
    // 読解
    if (typeof readingQuestions !== 'undefined') {
      setText('cnt-r1', countOf(readingQuestions, '内容理解（短文）') + '問');
      setText('cnt-r2', countOf(readingQuestions, '内容理解（中文）') + '問');
      setText('cnt-r3', countOf(readingQuestions, '内容理解（長文）') + '問');
      setText('cnt-r4', countOf(readingQuestions, '情報検索') + '問');
      var rtot = countOf(readingQuestions,'内容理解（短文）')+countOf(readingQuestions,'内容理解（中文）')+countOf(readingQuestions,'内容理解（長文）')+countOf(readingQuestions,'情報検索');
      setText('reading-total-count', '計'+rtot+'問収録');
    }
  } catch (e) { /* no-op */ }
})();
