<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道案内ゲーム ・ Direction Game ・ 日本語の部屋</title>
<style>
  :root{
    --bg:#F7F5F0; --surface:#FFFFFF; --border:#E2DDD6;
    --text:#1C1C1C; --text-muted:#6B6560; --text-hint:#9E9890;
    --radius:14px; --radius-sm:10px; --accent:#2F6F4F; --accent-bg:#E2F0E8;
    --ok:#3B6D11; --ok-bg:#EAF3DE; --ng:#9A3D1C; --ng-bg:#FAECE7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:0 1rem 2.5rem;line-height:1.7;-webkit-text-size-adjust:100%}
  .container{max-width:480px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:5px;margin-top:1.2rem;font-size:13px;font-weight:600;color:var(--text-muted);text-decoration:none;background:none;border:0;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
  .back:hover{color:var(--text)}
  .app-header{text-align:center;padding:1rem 0 .5rem}
  .app-logo{font-size:12px;font-weight:700;letter-spacing:.15em;color:var(--text-hint);margin-bottom:8px}
  .app-title{font-size:23px;font-weight:700}
  .app-sub{font-size:12.5px;color:var(--text-muted);margin-top:6px}
  .hidden{display:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 15px;margin-bottom:14px}
  .card-h{font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--text-hint);margin-bottom:10px}

  .seg{display:flex;gap:6px;background:#EFEBE3;padding:4px;border-radius:12px;margin-bottom:12px}
  .seg button{flex:1;border:0;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(--text-muted);padding:11px 6px;border-radius:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .seg button .s-en{display:block;font-size:10px;color:var(--text-hint);font-weight:600;margin-top:2px}
  .seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .seg button.on .s-en{color:var(--text-muted)}

  .btn{width:100%;padding:14px;font-size:15px;font-weight:800;border:0;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:transform .1s,filter .12s}
  .btn:active{transform:scale(.99)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-ghost{background:#FAF8F4;color:var(--text);border:1px solid var(--border)}

  .keyrow{font-size:12px;color:var(--text-muted);line-height:1.6}
  .k{width:100%;padding:11px 12px;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius-sm);background:#FAF8F4;margin:8px 0 6px}
  .keystate{font-size:11.5px;font-weight:700;margin-top:2px}
  .keystate.ok{color:var(--ok)} .keystate.no{color:var(--text-hint)}
  details.opt{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
  details.opt summary{cursor:pointer;padding:12px 15px;font-size:13px;font-weight:700;color:var(--text-muted);-webkit-tap-highlight-color:transparent}
  details.opt .body{padding:0 15px 14px}

  /* マップ */
  .mapwrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:12px}
  .zoomctrl{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:3}
  .zbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.92);font-size:20px;font-weight:700;color:var(--text);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.14);line-height:1;display:flex;align-items:center;justify-content:center;padding:0;-webkit-tap-highlight-color:transparent}
  .zbtn:active{background:#EAE6DE}
  .zbtn:disabled{opacity:.4;cursor:default}
  svg{width:100%;height:auto;display:block;border-radius:8px}

  .status{background:var(--accent-bg);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;font-weight:700;color:#20422F;min-height:48px;line-height:1.5;text-align:center;margin-bottom:10px}
  .status.ok{background:var(--ok-bg);color:var(--ok)} .status.ng{background:var(--ng-bg);color:var(--ng)}
  .sub-status{font-size:12px;color:var(--text-muted);text-align:center;min-height:16px;margin-bottom:10px}

  .pad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
  .pad .btn{padding:16px 6px;font-size:15px}
  .pad .wide{grid-column:1 / -1}
  .ctrl-mic{background:#FAF8F4;color:var(--text);border:1px solid var(--border)}
  .ctrl-mic.listening{background:var(--ng-bg);border-color:var(--ng);color:var(--ng);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(154,61,28,0)}50%{box-shadow:0 0 0 5px var(--ng-bg)}}
  .log{font-size:12.5px;color:var(--text-muted);background:#FAF8F4;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;margin-top:8px;max-height:96px;overflow:auto;line-height:1.9}
  .row2{display:flex;gap:8px;margin-top:8px}
  .row2 .btn{margin:0}
  .win-emoji{font-size:52px;text-align:center;margin:6px 0}
  .aicomment{font-size:13px;color:#20422F;background:var(--accent-bg);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;line-height:1.6;text-align:center}
  .note{background:#FAF6EE;border:1px solid #EBDFC7;border-radius:var(--radius);padding:11px 14px;font-size:12.5px;color:#6b5d40;line-height:1.65;margin:.2rem 0 1rem}
  @media (prefers-reduced-motion:reduce){.ctrl-mic.listening{animation:none}}

  /* PC・タブレットなど広い画面では、スマホ用レイアウトのまま全体を拡大して見やすくする */
  @media (min-width: 700px)  { .container { zoom: 1.3; } }
  @media (min-width: 1100px) { .container { zoom: 1.5; } }
</style>
</head>
<body>
<div class="container">
  <button class="back" id="backBtn">‹ もどる</button>
  <div class="app-header">
    <div class="app-logo">NIHONGO NO HEYA</div>
    <div class="app-title">道案内ゲーム</div>
    <div class="app-sub">道を あんないする・される 練習 ・ Direction Game</div>
  </div>

  <!-- ===== ホーム ===== -->
  <div id="home">
    <div class="card">
      <div class="card-h">やくわりを えらぶ ・ CHOOSE YOUR ROLE</div>
      <div class="seg" id="modeSeg">
        <button data-mode="driver" class="on">運転手<span class="s-en">Driver ・ 聞いて動く</span></button>
        <button data-mode="passenger">客<span class="s-en">Passenger ・ 話して案内</span></button>
      </div>
      <div class="note" id="modeNote"></div>
      <div class="card-h" style="margin-top:2px">レベル ・ LEVEL</div>
      <div class="seg" id="levelSeg">
        <button data-level="easy" class="on">やさしい<span class="s-en">Easy</span></button>
        <button data-level="advanced">上級<span class="s-en">Advanced</span></button>
        <button data-level="super">超上級<span class="s-en">Real-time</span></button>
      </div>
      <div class="note" id="levelNote"></div>
      <button class="btn btn-primary" id="startBtn">▶ はじめる</button>
    </div>

    <details class="opt">
      <summary>🤖 AIコメント（Gemini・任意）</summary>
      <div class="body">
        <div class="keyrow">クリアしたとき、AIが自然な日本語で一言コメントします。無くても遊べます。</div>
        <input type="password" class="k" id="key" placeholder="Gemini キーを貼り付け（例: AIza…）" autocomplete="off">
        <div class="keyrow">キーは<b>この端末だけ</b>に保存。取り方：<a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> →「Create API key」。会話練習ページと同じキーが使えます。</div>
        <div class="keystate no" id="keyState"></div>
      </div>
    </details>
  </div>

  <!-- ===== プレイ ===== -->
  <div id="play" class="hidden">
    <div class="mapwrap"><div id="mapBox"></div>
      <div class="zoomctrl">
        <button id="zoomIn" class="zbtn" type="button" aria-label="拡大">＋</button>
        <button id="zoomOut" class="zbtn" type="button" aria-label="縮小">－</button>
      </div>
    </div>
    <div class="status" id="status"></div>
    <div class="sub-status" id="subStatus"></div>

    <!-- 運転手コントロール -->
    <div id="driverCtrl" class="hidden">
      <div class="pad">
        <button class="btn btn-ghost" data-act="left">⬅️ 左に曲がる</button>
        <button class="btn btn-primary" data-act="straight">⬆️ まっすぐ</button>
        <button class="btn btn-ghost" data-act="right">➡️ 右に曲がる</button>
        <button class="btn btn-ghost wide" data-act="stop">✋ 止まる</button>
      </div>
      <button class="btn btn-ghost" id="repeatBtn">🔊 もう一度 聞く</button>
    </div>

    <!-- 客コントロール -->
    <div id="passCtrl" class="hidden">
      <button class="btn ctrl-mic" id="micBtn">🎤 指示を話す</button>
      <div class="log" id="log"></div>
    </div>

    <div class="row2">
      <button class="btn btn-ghost" id="newBtn">🔄 別の道</button>
      <button class="btn btn-ghost" id="homeBtn">やくわり変更</button>
    </div>
  </div>

  <!-- ===== クリア ===== -->
  <div id="win" class="hidden">
    <div class="card">
      <div class="win-emoji">🎉</div>
      <div class="status ok" id="winMsg">目的地に つきました！</div>
      <div class="aicomment hidden" id="aiComment"></div>
      <div class="row2">
        <button class="btn btn-primary" id="againBtn">もう一回</button>
        <button class="btn btn-ghost" id="win2home">やくわり変更</button>
      </div>
    </div>
  </div>
</div>

<script>
var $=function(id){return document.getElementById(id);};
var mem={}, store={ get:function(k){try{return localStorage.getItem(k);}catch(e){return (k in mem)?mem[k]:null;}},
  set:function(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}} };
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ===== 正規化・音声認識・TTS ===== */
var norm=function(s){return (s||'').replace(/[ァ-ヶ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0x60);}).replace(/[\s　。、！？!?,.]/g,'');};
var TTS_OK=('speechSynthesis' in window), jaVoice=null;
function pickVoice(){ if(!TTS_OK)return; var vs=speechSynthesis.getVoices().filter(function(v){return /ja(-|_)?JP|Japanese|日本/i.test((v.lang||'')+' '+(v.name||''));});
  if(!vs.length)return; var pref=[/Google.*日本語/i,/Google.*Japanese/i,/Kyoko/i,/O-?ren/i,/Nanami/i,/Ayumi/i,/Natural/i,/Neural/i];
  for(var i=0;i<pref.length;i++){ var m=vs.find(function(v){return pref[i].test(v.name||'');}); if(m){jaVoice=m;return;} } jaVoice=vs[0]; }
if(TTS_OK){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function sayTTS(text){ if(!TTS_OK||!text)return; try{ var u=new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=0.95; if(jaVoice)u.voice=jaVoice; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
/* 音声ID（テキスト→ファイル名）。事前生成した audio/mi_<id>.mp3（edge-tts等の自然音声）を優先し、無ければ端末TTSにフォールバック */
function djb2(s){ var h=5381; for(var i=0;i<s.length;i++){ h=(((h<<5)+h) ^ s.charCodeAt(i))>>>0; } return h.toString(36); }
var curAudio=null;
function say(text){ if(!text)return;
  try{ if(curAudio){ curAudio.pause(); curAudio=null; } }catch(e){}
  try{ if(TTS_OK) speechSynthesis.cancel(); }catch(e){}
  var id=djb2(norm(text));
  var a=new Audio('audio/mi_'+id+'.mp3'); curAudio=a;
  var fell=false, fb=function(){ if(fell)return; fell=true; sayTTS(text); };
  a.addEventListener('error', fb);
  var pr=a.play(); if(pr&&pr['catch']) pr['catch'](fb);
}
var SR=window.SpeechRecognition||window.webkitSpeechRecognition, VOICE_OK=!!SR, sharedRec=null, activeRec=null;
var micGranted=false, micAsking=false;
/* マイク許可を最初の一度だけ取る（getUserMediaで恒久的に許可 → 以後SpeechRecognitionは再確認しない） */
function ensureMic(cb){
  if(micGranted || micAsking){ cb&&cb(); return; }
  if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){ cb&&cb(); return; }
  micAsking=true;
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
    micGranted=true; micAsking=false;
    try{ s.getTracks().forEach(function(t){ t.stop(); }); }catch(e){}   // 許可だけ取ってマイクは解放（許可は残る）
    cb&&cb();
  }).catch(function(){ micAsking=false; cb&&cb(); });
}

/* ===== 地図・方向 ===== */
var N=9; // 交差点（大きめの街。画面に収まらず、タクシーを追ってスクロールする）
var DIRS={N:[-1,0],E:[0,1],S:[1,0],W:[0,-1]};
var RIGHT={N:'E',E:'S',S:'W',W:'N'};
var LEFT={N:'W',W:'S',S:'E',E:'N'};
var DIRNAME={N:'北',E:'東',S:'南',W:'西'};
var ANGLE={N:0,E:90,S:180,W:270};
var FACILITIES=[{e:'🏥',n:'病院'},{e:'🏫',n:'学校'},{e:'🏦',n:'銀行'},{e:'🏪',n:'コンビニ'},{e:'🚉',n:'駅'},{e:'🏬',n:'デパート'},{e:'🏤',n:'郵便局'},{e:'🌳',n:'公園'},{e:'🍴',n:'レストラン'},{e:'⛽',n:'ガソリンスタンド'},{e:'🥐',n:'パン屋'},{e:'📚',n:'本屋'},{e:'📖',n:'図書館'},{e:'💐',n:'花屋'},{e:'💊',n:'薬局'},{e:'☕',n:'カフェ'},{e:'🛒',n:'スーパー'},{e:'🍜',n:'ラーメン屋'},{e:'🍰',n:'ケーキ屋'},{e:'🏨',n:'ホテル'},{e:'🎬',n:'映画館'},{e:'🐟',n:'魚屋'}];
var DESTS=FACILITIES;
/* 装飾用の建物・景観（名前は出さない。FACILITIES と絵文字が重ならないよう選定） */
var DECO=['🏠','🏡','🏢','🏩','🏭','🏯','🏰','⛪','🕌','🏛️','⛩️','🏟️','🌲','⛲','🎡','🅿️','🏙️','🏚️','🌸','🗼','🎭','🏝️','🎠','🎢','🏬','🏢','🌷','🌻'];

var G={}; // ゲーム状態

function keyOf(r,c){return r+','+c;}
function inGrid(r,c){return r>=0&&r<N&&c>=0&&c<N;}

function bfs(start,dest){
  var q=[start], prev={}; prev[keyOf(start[0],start[1])]='';
  while(q.length){
    var cur=q.shift();
    if(cur[0]===dest[0]&&cur[1]===dest[1]) break;
    ['N','E','S','W'].forEach(function(d){
      var nr=cur[0]+DIRS[d][0], nc=cur[1]+DIRS[d][1];
      if(inGrid(nr,nc)&&!(keyOf(nr,nc) in prev)){ prev[keyOf(nr,nc)]=keyOf(cur[0],cur[1]); q.push([nr,nc]); }
    });
  }
  if(!(keyOf(dest[0],dest[1]) in prev)) return null;
  var path=[], k=keyOf(dest[0],dest[1]);
  while(k){ var p=k.split(',').map(Number); path.unshift(p); k=prev[k]; }
  return path;
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function buildActions(p){
  var firstDir=absDir(p[0],p[1]); var heading=firstDir, acts=[], cells=[], turns=0;
  for(var i=0;i<p.length-1;i++){
    var ad=absDir(p[i],p[i+1]);
    var act=(ad===heading)?'straight':(ad===RIGHT[heading])?'right':(ad===LEFT[heading])?'left':'straight';
    if(act!=='straight') turns++;
    acts.push(act); cells.push(p[i]); heading=ad;
  }
  acts.push('stop'); cells.push(p[p.length-1]);
  return {actions:acts, turnCells:cells, firstDir:firstDir, turns:turns};
}
/* ===== 汎用ヘルパー ===== */
function rnd(n){ return Math.floor(Math.random()*n); }
function shuffleArr(a){ for(var i=a.length-1;i>0;i--){ var j=rnd(i+1); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function neighbors(cell){ var out=[]; ['N','E','S','W'].forEach(function(d){ var nr=cell[0]+DIRS[d][0], nc=cell[1]+DIRS[d][1]; if(inGrid(nr,nc)) out.push([nr,nc]); }); return out; }
function segKey(a,b){ return (a[0]<b[0]||(a[0]===b[0]&&a[1]<b[1])) ? (a[0]+','+a[1]+'|'+b[0]+','+b[1]) : (b[0]+','+b[1]+'|'+a[0]+','+a[1]); }
// 道沿い配置：区間 a-b の t 地点を、道路から垂直に少しずらして置く（道の上には置かない）
function roadside(a,b,t,d){ d=d||0.30;
  if(a[0]===b[0]){ var c=a[1]+t*(b[1]-a[1]); var o=[]; if(a[0]-1>=0)o.push(-1); if(a[0]<=N-2)o.push(1); return {gr:a[0]+pick(o)*d, gc:c}; }
  var r=a[0]+t*(b[0]-a[0]); var o2=[]; if(a[1]-1>=0)o2.push(-1); if(a[1]<=N-2)o2.push(1); return {gr:r, gc:a[1]+pick(o2)*d}; }
function allSegments(){ var s=[]; for(var r=0;r<N;r++){ for(var c=0;c<N;c++){ if(c<N-1) s.push([[r,c],[r,c+1]]); if(r<N-1) s.push([[r,c],[r+1,c]]); } } return s; }
function chooseHeading(start,dest){ var best=null, bd=1e9; ['N','E','S','W'].forEach(function(d){ var nr=start[0]+DIRS[d][0], nc=start[1]+DIRS[d][1]; if(!inGrid(nr,nc)) return; var dist=Math.abs(nr-dest[0])+Math.abs(nc-dest[1]) + Math.random()*0.3; if(dist<bd){ bd=dist; best=d; } }); return best||'E'; }
function isBridgeSeg(r1,c1,r2,c2){ if(!G.bridge) return false; var a=G.bridge.a,b=G.bridge.b; return (a[0]===r1&&a[1]===c1&&b[0]===r2&&b[1]===c2)||(a[0]===r2&&a[1]===c2&&b[0]===r1&&b[1]===c1); }

/* 現在の (マス・向き) から目的地までの経路を、直進/右折/左折（Uターン禁止）で探索。
   返り値：'straight'/'left'/'right' の配列（＝いまいる場所からの行き方）。目的地にいれば []。 */
function routeFromState(r,c,dir){
  var startK=r+','+c+','+dir, prev={}; prev[startK]=null; var q=[[r,c,dir]], goal=null;
  while(q.length){ var s=q.shift();
    if(s[0]===G.dest[0]&&s[1]===G.dest[1]){ goal=s; break; }
    ['straight','left','right'].forEach(function(act){
      var nd=(act==='left')?LEFT[s[2]]:(act==='right')?RIGHT[s[2]]:s[2];
      var nr=s[0]+DIRS[nd][0], nc=s[1]+DIRS[nd][1]; if(!inGrid(nr,nc)) return;
      var k=nr+','+nc+','+nd; if(!(k in prev)){ prev[k]=[s[0]+','+s[1]+','+s[2],act]; q.push([nr,nc,nd]); }
    });
  }
  if(!goal) return null;
  var acts=[], k=goal[0]+','+goal[1]+','+goal[2];
  while(prev[k]){ acts.unshift(prev[k][1]); k=prev[k][0]; }
  return acts;
}
/* 任意の目標マスへの経路（Uターン禁止）。ドラッグ運転で使う */
function routeTo(r,c,dir, tr,tc){
  if(r===tr&&c===tc) return [];
  var prev={}; prev[r+','+c+','+dir]=null; var q=[[r,c,dir]], goal=null;
  while(q.length){ var s=q.shift();
    if(s[0]===tr&&s[1]===tc){ goal=s; break; }
    ['straight','left','right'].forEach(function(act){
      var nd=(act==='left')?LEFT[s[2]]:(act==='right')?RIGHT[s[2]]:s[2];
      var nr=s[0]+DIRS[nd][0], nc=s[1]+DIRS[nd][1]; if(!inGrid(nr,nc)) return;
      var k=nr+','+nc+','+nd; if(!(k in prev)){ prev[k]=[s[0]+','+s[1]+','+s[2],act]; q.push([nr,nc,nd]); }
    });
  }
  if(!goal) return null;
  var acts=[], k=goal[0]+','+goal[1]+','+goal[2];
  while(prev[k]){ acts.unshift(prev[k][1]); k=prev[k][0]; }
  return acts;
}

function genScenario(level){
  cancelAnim();
  setupGrid();  // 区画の大きさ・道の湾曲を毎回ランダムに作り直す

function guideInfo(){ if(atDest()) return {act:'stop'}; var acts=routeFromState(G.car.r,G.car.c,G.car.dir); if(!acts) return {act:'stop'}; if(!acts.length) return {act:'stop'}; return {act:acts[0]}; }

/* 信号を数えて言う：「この信号」「次の信号」「二つ目の信号」… n=曲がるまでに通る信号の数 */
function numJa(n){ var k=['〇','一','二','三','四','五','六','七','八','九','十']; return (n>=0&&n<k.length)?k[n]:(''+n); }
function sigLabel(n){ if(n<=0) return 'この 信号を '; if(n===1) return '次の 信号を '; return numJa(n)+'つ目の 信号を '; }
/* いまいる場所から目的地までの経路を「曲がる（信号数つき）／止まる」のまとまりに変換 */
function routeManeuvers(){
  var acts=routeFromState(G.car.r,G.car.c,G.car.dir); if(!acts) return [];
  var mans=[], sc=0;
  for(var i=0;i<acts.length;i++){ if(acts[i]==='straight'){ sc++; } else { mans.push({type:'turn', dir:acts[i], n:sc}); sc=0; } }
  mans.push({type:'stop', straight:sc});
  return mans;
}
/* やさしい：いまの場所からの「次の一手」を1つ（信号を数えて言う） */
function guideText(){
  if(atDest()) return G.destType.n+'の 前で 止まってください。';
  var mans=routeManeuvers(); if(!mans.length) return G.destType.n+'の 前で 止まってください。';
  var m=mans[0];
  if(m.type==='turn') return sigLabel(m.n)+(m.dir==='right'?'右に':'左に')+' 曲がってください。';
  return (m.straight>0?'まっすぐ 進んで、':'')+G.destType.n+'の 前で 止まってください。';
}
/* 上級・超上級：目的地までの道順を複文でまとめて（「二つ目の信号を右に曲がって、まっすぐ進んで、○○の前で止まってください」） */
function fullGuideText(){
  var mans=routeManeuvers(); if(!mans.length) return G.destType.n+'の 前で 止まってください。';
  var cl=[];
  mans.forEach(function(m){
    if(m.type==='turn') cl.push(sigLabel(m.n)+(m.dir==='right'?'右に':'左に')+' 曲がって');
    else { if(m.straight>0) cl.push('まっすぐ 進んで'); cl.push(G.destType.n+'の 前で 止まって'); }
  });
  return cl.join('、')+'ください。';
}

function stopCruise(){}  /* 旧・自動走行は廃止（互換のため空関数） */

/* ===== ドラッグ運転：指の先（G.dragTargetCell）へ向かって連続走行。指を動かすたび経路を更新 ===== */
function driveDrag(){
  if(G.done) return;
  var tc=G.dragTargetCell; if(!tc) return;
  if(G.car.r===tc[0] && G.car.c===tc[1]){          // すでに目標マス
    if(carPath.length===0 && !G.dragging) onRest();
    return;
  }
  var acts=routeTo(G.car.r,G.car.c,G.car.dir, tc[0],tc[1]);
  if(!acts || !acts.length) return;
  var p=actsToPath(G.car.r,G.car.c,G.car.dir, acts);  // 経路を差し替え（走行は継続）
  if(carRAF==null) p.unshift({r:G.car.r,c:G.car.c,dir:G.car.dir});  // 止まった状態から動き出すときは、交差点まで来てから曲がる
  carPath=p; carFinish=null; driving=true; startCarLoop();
}
/* タクシーが止まったとき。※目的地に着いても自動ではゴールしない（運転手モードは「✋止まる」を押す） */

/* ドラッグ運転：ポインタの位置（＝目標マス）へタクシーが交差点で止まらず走る */
function pointerToCell(ev){
  var box=$('mapBox'), svg=box&&box.querySelector('svg'); if(!svg) return null;
  var rect=svg.getBoundingClientRect(); if(!rect.width) return null;
  var cx=(ev.clientX!=null)?ev.clientX:(ev.touches&&ev.touches[0]?ev.touches[0].clientX:(ev.changedTouches&&ev.changedTouches[0]?ev.changedTouches[0].clientX:0));
  var cy=(ev.clientY!=null)?ev.clientY:(ev.touches&&ev.touches[0]?ev.touches[0].clientY:(ev.changedTouches&&ev.changedTouches[0]?ev.changedTouches[0].clientY:0));
  var vb=(svg.getAttribute('viewBox')||('0 0 '+mapW()+' '+mapH())).split(' ').map(Number);
  var x=vb[0]+(cx-rect.left)/rect.width*vb[2], y=vb[1]+(cy-rect.top)/rect.height*vb[3];
  // 歪んだ格子なので、いちばん近いノード（交差点）を探して返す
  var best=null, bd=1e18;
  for(var r=0;r<N;r++) for(var c=0;c<N;c++){ var p=PXY(r,c); var d=(p.x-x)*(p.x-x)+(p.y-y)*(p.y-y); if(d<bd){ bd=d; best=[r,c]; } }
  return best;
}
/* 二本指ピンチでのズーム（ポインタ／タッチ両対応） */
var ptrs={}, pinching=false, pinchDist0=0, pinchView0=0;
function ptDist(a,b){ var dx=a.x-b.x, dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
function activeTwo(ev){
  if(ev && ev.touches && ev.touches.length>=2){ return [{x:ev.touches[0].clientX,y:ev.touches[0].clientY},{x:ev.touches[1].clientX,y:ev.touches[1].clientY}]; }
  var ks=Object.keys(ptrs); if(ks.length>=2){ return [ptrs[ks[0]], ptrs[ks[1]]]; }
  return null;
}
function startPinch(two){ pinching=true; G.dragging=false; clearHints(); pinchDist0=ptDist(two[0],two[1]); pinchView0=viewSize; }  /* ズーム中も走行は継続 */
function onPointerDown(ev){
  if(ev.pointerId!=null) ptrs[ev.pointerId]={x:ev.clientX,y:ev.clientY};
  var two=activeTwo(ev);
  if(two){ startPinch(two); if(ev.cancelable) ev.preventDefault(); return; }   // 二本指＝ズーム
  if(G.mode!=='driver'||G.done) return;
  var cell=pointerToCell(ev); if(!cell) return;
  G.dragging=true; G.dragTargetCell=cell; clearHints(); driveDrag();
  if(ev.cancelable) ev.preventDefault();
}
function onPointerMove(ev){
  if(ev.pointerId!=null && ptrs[ev.pointerId]) ptrs[ev.pointerId]={x:ev.clientX,y:ev.clientY};
  if(pinching){ var two=activeTwo(ev); if(two && pinchDist0>0){ var d=ptDist(two[0],two[1]); if(d>0) setViewSize(pinchView0*(pinchDist0/d)); } if(ev.cancelable) ev.preventDefault(); return; }
  if(!G.dragging) return;
  var cell=pointerToCell(ev); if(cell){ G.dragTargetCell=cell; driveDrag(); }
  if(ev.cancelable) ev.preventDefault();
}
function onPointerUp(ev){
  if(ev.pointerId!=null) delete ptrs[ev.pointerId];
  if(pinching){ if(!activeTwo(ev)){ pinching=false; } if(ev&&ev.cancelable) ev.preventDefault(); return; }
  if(!G.dragging) return; G.dragging=false; driveDrag();
  if(ev&&ev.cancelable) ev.preventDefault(); }

function parseInstruction(text){
  var t=norm(text);

  if(/とまっ|とま[るり]|ていし|すとっ|とめ|止/.test(t)) return 'stop';
  if(/みぎ|右/.test(t)) return 'right';
  if(/ひだり|左/.test(t)) return 'left';
  if(/まっすぐ|ちょくしん|直進|すすん|進ん|すすめ|まえ|前/.test(t)) return 'straight';
  if(/まがっ|曲がっ|まがる|曲がる/.test(t)) return 'turn?';
  return null;
}
/* 複文の指示を、動きの並びに変換する（「二つ目の信号を右に曲がって、まっすぐ進んで、○○の前で止まって」等） */
function kanjiNum(s){ var mp={'〇':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'ひとつ':1,'ふたつ':2,'みっつ':3,'よっつ':4};
  if(mp[s]!=null) return mp[s];
  var z=s.replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);}); var v=parseInt(z,10); return isNaN(v)?null:v; }
function extractCount(seg){
  if(/この/.test(seg)) return 0;
  if(/つぎ|次/.test(seg)) return 1;
  var m=seg.match(/([0-9０-９一二三四五六七八九十]+)\s*(?:つ|個|こ|番)?\s*目/); if(m) return kanjiNum(m[1]);
  var m2=seg.match(/(ひとつ|ふたつ|みっつ|よっつ)/); if(m2) return kanjiNum(m2[1]);
  var m3=seg.match(/([0-9０-９一二三四五六七八九十]+)\s*(?:つ|個)/); if(m3) return kanjiNum(m3[1]);
  return null;
}
function parseCommands(raw){

  while((m=re.exec(s))) ev.push({pos:m.index,end:re.lastIndex,type:'turn',dir:/みぎ|右/.test(m[1])?'right':'left'});
  re=/(?:とまっ|止まっ|とまる|止まる|とめて|止めて|ていし|停止|すとっぷ|ストップ)/g;
  while((m=re.exec(s))) ev.push({pos:m.index,end:re.lastIndex,type:'stop'});
  re=/(?:まっすぐ|真っ直ぐ|直進|ちょくしん)/g;
  while((m=re.exec(s))) ev.push({pos:m.index,end:re.lastIndex,type:'straight'});
  ev.sort(function(a,b){return a.pos-b.pos;});
  var moves=[], prev=0, sawStraight=false;
  for(var i=0;i<ev.length;i++){ var e=ev[i], seg=s.substring(prev, e.pos);
    if(e.type==='turn'){ var cnt=extractCount(seg);
      if(cnt==null) cnt = /しんごう|信号|こうさてん|交差点|かど|角/.test(seg)?1:0;
      for(var k=0;k<cnt;k++) moves.push('straight'); moves.push(e.dir); sawStraight=false;
    } else if(e.type==='straight'){
      // 「三つ目の交差点まで まっすぐ」「二つ先の信号まで まっすぐ」など、距離の指定があればその数だけ進む
      var scnt=extractCount(seg);
      if(scnt!=null && scnt>=1){ for(var s2=0;s2<scnt;s2++) moves.push('straight'); sawStraight=false; }
      else { sawStraight=true; }
    }
    else { var toDest = sawStraight || /まで|前で|前に/.test(seg) || (G.destType && seg.indexOf(G.destType.n)>=0);
      moves.push(toDest?'stopDest':'stopHere'); sawStraight=false; }
    prev=e.end;
  }
  if(sawStraight) moves.push('straight');
  return moves;
}
function stopSeq(){ cancelAnim(); }
/* 複文の指示を、交差点で止まらず一気に連続実行する */
function runMoves(moves){
  cancelAnim();
  var acts=[], terminal=null;
  for(var i=0;i<moves.length;i++){ var m=moves[i];
    if(m==='straight'||m==='left'||m==='right') acts.push(m);
    else { terminal=m; break; }   // stopHere / stopDest
  }
  if(terminal==='stopDest'){   // 「○○の前で止まって」＝目的地まで直進を足す
    var s=simEnd(acts), guard=0;
    while(!(s.r===G.dest[0]&&s.c===G.dest[1]) && guard<N+2){
      var nr=s.r+DIRS[s.dir][0], nc=s.c+DIRS[s.dir][1];
      if(!inGrid(nr,nc)) break;
      acts.push('straight'); s={r:nr,c:nc,dir:s.dir}; guard++;
    }
  }
  if(acts.length){ var chk=actsToPath(G.car.r,G.car.c,G.car.dir, acts);
    if(!chk.length){ setStatus('その方向には 行けません。','べつの 言い方で どうぞ。','ng'); say('そちらには 行けません。'); return; } }
  setStatus('🚕 指示の とおりに 動きます…','');
  drivePath(acts, function(){
    // 「止めて／止まって」の指示があったときだけゴール判定する
    if(terminal){
      if(atDest()){ winRound(); return; }
      setStatus('ここは 目的地では ありません。','案内を つづけてください。','ng'); say('ここは まだ ちがいます。'); return;
    }
    // 止まる指示がなければ、目的地に着いても勝手にゴールしない
    if(atDest()){ setStatus('🚩 '+G.destType.n+'に 着きました。','「止めてください」と 言いましょう。'); say(G.destType.n+'に つきました。'); return; }
    setStatus('つづけて 指示を どうぞ。','今 '+DIRNAME[G.car.dir]+'むき。');
  });
}
function logLine(s){ var l=$('log'); l.innerHTML += '<div>'+esc(s)+'</div>'; l.scrollTop=l.scrollHeight; }
function passengerHeard(raw){
  logLine('🗣️ '+raw);
  // どのレベルも複文に対応（「二つ目の信号を右に曲がって、まっすぐ進んで、○○の前で止まって」）
  var moves=parseCommands(raw);
  if(!moves.length){ setStatus('うまく 聞き取れませんでした。', '「二つ目の信号を 右に 曲がって」の ように 言ってください。','ng'); say('もう一度 お願いします。'); return; }
  setStatus('🚕 指示の とおりに 動きます…', '');
  runMoves(moves);
}
function startVoice(){
  if(!VOICE_OK){ setStatus('この端末は 音声入力に 対応していません。', '','ng'); return; }
  var mic=$('micBtn');
  if(activeRec){ try{activeRec.stop();}catch(e){} return; }
  ensureMic(function(){   // 許可は最初の1回だけ。2回目以降は確認が出ない
    var rec=sharedRec; if(!rec){ try{rec=new SR();}catch(e){return;} rec.lang='ja-JP'; rec.interimResults=false; rec.maxAlternatives=1; sharedRec=rec; }
    rec.onresult=function(e){ var raw=(e.results[0][0].transcript||'').trim(); passengerHeard(raw); };
    rec.onerror=function(e){ if(e.error==='no-speech') $('subStatus').textContent='声が 聞き取れませんでした。もう一度どうぞ。'; };
    rec.onend=function(){ activeRec=null; mic.classList.remove('listening'); mic.textContent='🎤 指示を話す'; };
    activeRec=rec; mic.classList.add('listening'); mic.textContent='● きいています…';
    try{ rec.start(); }catch(e){ activeRec=null; mic.classList.remove('listening'); mic.textContent='🎤 指示を話す'; }
  });
}

/* ===== 共通 ===== */
function setStatus(main, sub, cls){ var s=$('status'); s.textContent=main; s.className='status'+(cls?' '+cls:''); $('subStatus').textContent=sub||''; }
function winRound(){
  G.done=true; stopCruise(); cancelAnim(); stopSeq();
  try{ if(activeRec) activeRec.stop(); }catch(e){}
  $('winMsg').textContent='🎉 '+G.destType.n+'に つきました！';
  $('aiComment').classList.add('hidden');
  show('win');
  say('おめでとうございます。'+G.destType.n+'に つきました。');
  geminiComment();
}

/* ===== Gemini（任意コメント） ===== */
var MODEL="gemini-3.5-flash";
var ENDPOINT="https://generativelanguage.googleapis.com/v1beta/models/"+MODEL+":generateContent";
function geminiComment(){
  var key=($('key').value||'').trim();
  if(!key) return;
  var role = (G.mode==='driver')?'運転手':'客（道案内する人）';
  var sys="あなたは日本語学習ゲームの明るいコーチです。学習者が道案内ゲームをクリアしました。日本語で1文、20〜35字くらいで、やさしくほめてください。絵文字は1つまで。ローマ字や英語は使わない。";
  var user="役割は「"+role+"」。目的地は「"+G.destType.n+"」でした。短くほめて。";
  var body={ systemInstruction:{parts:[{text:sys}]}, contents:[{role:'user',parts:[{text:user}]}], generationConfig:{temperature:0.9,maxOutputTokens:80} };
  fetch(ENDPOINT+"?key="+encodeURIComponent(key),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
   .then(function(res){return res.json();})
   .then(function(d){ var t=""; try{t=d.candidates[0].content.parts[0].text.trim();}catch(e){} if(t){ var c=$('aiComment'); c.textContent='🤖 '+t; c.classList.remove('hidden'); } })
   .catch(function(){});
}

/* ===== 起動・イベント ===== */
var MODE_NOTE={
  driver:'客（AI）の 指示を 聞いて、タクシーを 指で ドラッグして 目的地まで 走らせます。聞き取りの 練習。',
  passenger:'あなたが 運転手（AI）に 音声で 指示を 出して、目的地まで 案内します。話す 練習。'
};
var LEVEL_NOTE={
  easy:'やさしい：止まるたびに、いまの場所からの 行き方を 1つずつ 案内。',
  advanced:'上級：道順を まとめて 聞いて 覚えて 運転。🔊で いまの場所から 聞き直せる。',
  super:'超上級：道順を 一度だけ 聞いて 覚えて 運転。道のりが 長め。'
};
var LV_SEL='easy';
G.mode='driver';
function setMode(m){ G.mode=m; $('modeSeg').querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.dataset.mode===m); }); $('modeNote').textContent=MODE_NOTE[m]; store.set('michi_mode',m); }
function setLevel(l){ LV_SEL=l; $('levelSeg').querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.dataset.level===l); }); $('levelNote').textContent=LEVEL_NOTE[l]; store.set('michi_level',l); }
$('modeSeg').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ setMode(b.dataset.mode); }; });
$('levelSeg').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ setLevel(b.dataset.level); }; });

function startGame(){ if(G.mode==='driver') startDriver(); else startPassenger(); }
function leavePlay(){ stopCruise(); cancelAnim(); stopSeq(); try{if(activeRec)activeRec.stop();}catch(e){} try{speechSynthesis.cancel();}catch(e){} }
$('startBtn').onclick=startGame;
$('driverCtrl').querySelectorAll('button[data-act]').forEach(function(b){ b.onclick=function(){ driverAction(b.dataset.act); }; });
$('repeatBtn').onclick=function(){
  // いまの場所からの案内をもう一度（上級・超上級は複文、やさしいは次の一手）
  if(G.level!=='easy') say(G.destType.n+'まで。'+fullGuideText());
  else say(guideText());
};
/* タクシーを 指／カーソルで ドラッグして 運転（交差点で止まらず、はなした所まで走る） */
(function(){ var mb=$('mapBox'); mb.style.touchAction='none';
  if(window.PointerEvent){
    mb.addEventListener('pointerdown', onPointerDown);
    mb.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);
  } else {
    mb.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    mb.addEventListener('touchstart', onPointerDown, {passive:false});
    mb.addEventListener('touchmove', onPointerMove, {passive:false});
    window.addEventListener('touchend', onPointerUp);
  }
})();
(function(){ var zi=$('zoomIn'), zo=$('zoomOut');
  if(zi) zi.onclick=function(){ zoomBy(0.8); };   // 拡大（見える範囲を狭く）
  if(zo) zo.onclick=function(){ zoomBy(1.25); };  // 縮小（見える範囲を広く＝全体が見える）
})();
$('micBtn').onclick=startVoice;
$('newBtn').onclick=function(){ leavePlay(); startGame(); };
$('homeBtn').onclick=function(){ leavePlay(); show('home'); };
$('againBtn').onclick=function(){ leavePlay(); startGame(); };
$('win2home').onclick=function(){ leavePlay(); show('home'); };
$('backBtn').onclick=function(){ if(!$('play').classList.contains('hidden')||!$('win').classList.contains('hidden')){ leavePlay(); show('home'); } else { location.href='games.html'; } };

var sk=store.get('gemini_key'); if(sk) $('key').value=sk;
function refreshKey(){ var has=($('key').value||'').trim().length>0; var el=$('keyState'); el.textContent=has?'✓ キーを保存しました（この端末のみ）':'任意です。無くても遊べます。'; el.className='keystate '+(has?'ok':'no'); }
$('key').addEventListener('input',function(){ store.set('gemini_key',($('key').value||'').trim()); refreshKey(); });
refreshKey();

var savedMode=store.get('michi_mode'); setMode(savedMode==='passenger'?'passenger':'driver');
var savedLevel=store.get('michi_level'); setLevel((savedLevel==='advanced'||savedLevel==='super')?savedLevel:'easy');
</script>
