  {t:"プロミネンス／イントネーション",d:"卓立（強調）と文全体の音調。疑問は上昇調など。"}
 ]}
];

var chips=document.getElementById('chips');
var groups=DATA.map(function(d){return d.g;});
var cur='all', qf='';
chips.innerHTML=[{k:'all',l:'すべて'}].concat(groups.map(function(g){return {k:g,l:g};}))
  .map(function(c){return '<button class="chip'+(c.k==='all'?' on':'')+'" data-k="'+c.k+'">'+c.l+'</button>';}).join('');
chips.addEventListener('click',function(e){var b=e.target.closest('.chip');if(!b)return;cur=b.getAttribute('data-k');
  Array.prototype.forEach.call(chips.children,function(x){x.classList.toggle('on',x===b);});render();});
document.getElementById('q').addEventListener('input',function(e){qf=e.target.value.trim().toLowerCase();render();});
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
  var total=0, html='';
  DATA.forEach(function(d){
    if(cur!=='all'&&cur!==d.g) return;
    var ts=d.terms.filter(function(x){ if(!qf) return true; return (x.t+' '+x.d).toLowerCase().indexOf(qf)>=0; });
    if(!ts.length) return;
    total+=ts.length;
    html+='<div class="ghead"><span class="gbar"></span>'+esc(d.g)+'</div>';
    html+=ts.map(function(x){var m=x.s?'<a class="more" href="kyoin_yogo_'+x.s+'.html">くわしく ›</a>':'';return '<div class="term"><div class="tt">'+esc(x.t)+'</div><div class="td">'+esc(x.d)+'</div>'+m+'</div>';}).join('');
  });
  document.getElementById('cnt').textContent=total+' 語';
  document.getElementById('list').innerHTML=html||'<div class="empty">該当する用語がありません。</div>';
}
render();
</script>
</body></html>
