const readingQuestions = {"内容理解（短文）": [{"question": "在宅勤務が広がって、私が何より助かったのは通勤時間がなくなったことだ。往復で二時間近くを電車の中で過ごしていたのだが、その時間を睡眠や家事、家族との会話に回せるようになった。もちろん、仕事とプライベートの切り替えが難しいという声もよく耳にする。しかし私にとっては、これまで移動だけで消えていた時間が自分のものになったこと、その一点だけでも在宅勤務を続ける価値は十分にあると感じている。\n\n〔問〕筆者が在宅勤務を評価しているのはなぜか。", "choices": ["仕事と私生活の切り替えがうまくできるようになったから", "移動に使っていた時間を他のことに使えるようになったから", "家族と一緒に仕事ができるようになったから", "睡眠時間を削って働けるようになったから"], "answer": "移動に使っていた時間を他のことに使えるようになったから", "group": "在宅勤務と通勤時間", "explanation": "筆者は通勤の二時間を睡眠や家事などに回せた点を最大の利点としている。切り替えの難しさは他人の声として挙げているだけで筆者の評価理由ではなく、家族と一緒に仕事をするとは述べていない。睡眠は削るのではなく増やせた側なので不適。"}, {"question": "社員各位\n\n総務部より連絡いたします。来月一日より、会議室の予約方法を電話・口頭から社内システムでの予約に一本化します。これまで予約の重複や連絡漏れが度々発生していたためです。予約はシステム上で最長二週間先まで可能で、当日の直前予約も空きがあれば行えます。なお、旧来の紙の予約簿は先月末で使用を終了しております。ご不明な点は総務部までお問い合わせください。\n\n〔問〕この文書で最も伝えたいことは何か。", "choices": ["会議室の数を増やすこと", "会議室の予約をシステムに統一すること", "紙の予約簿の使い方を説明すること", "会議室の利用時間を制限すること"], "answer": "会議室の予約をシステムに統一すること", "group": "社内文書・会議室予約変更", "explanation": "文書の中心は予約方法を社内システムに一本化する連絡である。会議室の数や利用時間には触れておらず、紙の予約簿はすでに使用終了と述べているだけで使い方の説明ではない。"}, {"question": "夜遅くまで勉強しても、翌朝には覚えたはずのことが頭から抜けている。そんな経験を持つ人は多いだろう。近年の研究では、記憶は眠っている間に整理され、定着すると考えられている。つまり、覚えた直後に十分な睡眠をとらなければ、せっかくの学習も十分に身につかないというわけだ。試験前だからと睡眠を削って机に向かうより、ほどよく学んでしっかり眠るほうが、結果的には効率がよいのかもしれない。\n\n〔問〕筆者の考えに合うものはどれか。", "choices": ["試験前は睡眠を削ってでも長く勉強するべきだ", "眠っている間は学習した内容が失われていく", "学習の後に十分眠ることで記憶が定着しやすい", "記憶力は生まれつき決まっていて変えられない"], "answer": "学習の後に十分眠ることで記憶が定着しやすい", "group": "睡眠と記憶", "explanation": "本文は睡眠中に記憶が整理・定着するという研究を紹介し、しっかり眠るほうが効率的だと述べている。睡眠を削るのは逆の主張で、眠っている間に失われるのではなく定着する。記憶力が生まれつきという話は本文にない。"}, {"question": "私の住む町の図書館は、数年前から館内にカフェを併設するようになった。当初は「静かであるべき図書館に飲食店とは」と反対する声もあったという。ところが実際に始めてみると、本を選んだ後に一息つける場所ができ、以前は足を運ばなかった人までが訪れるようになった。図書館は本を借りるためだけの場所ではなく、人が集い、時間を過ごす場へと変わりつつある。私はこの変化を、静かに歓迎している。\n\n〔問〕筆者はカフェの併設についてどう考えているか。", "choices": ["図書館は静かであるべきなので反対だ", "利用者が増えたが本来の役割は失われたと残念に思う", "図書館が人の集まる場に変わったことを好ましく思う", "カフェのせいで本を借りる人が減ったと心配している"], "answer": "図書館が人の集まる場に変わったことを好ましく思う", "group": "地域の図書館とカフェ", "explanation": "最後に「この変化を静かに歓迎している」と述べており、人が集う場への変化を肯定している。反対の声は当初の他人の意見。役割が失われたとも、本を借りる人が減ったとも本文は述べていない。"}, {"question": "仕事で失敗をしたとき、それを隠したくなるのは自然な気持ちだ。しかし、小さなミスを一人で抱え込んだ結果、後になって大きな問題へと発展してしまうことは少なくない。むしろ早い段階で正直に報告できる職場のほうが、問題を早く解決でき、同じ失敗の繰り返しも防げる。大切なのは、失敗した人を責めることではなく、なぜ起きたのかを皆で考える雰囲気をつくることだと、私は長年の経験から感じている。\n\n〔問〕筆者が大切だと考えていることは何か。", "choices": ["失敗した人にきちんと責任を取らせること", "失敗を隠して問題を大きくしないよう一人で対処すること", "失敗の原因を皆で考えられる雰囲気をつくること", "失敗をしないよう一人ひとりが十分に注意すること"], "answer": "失敗の原因を皆で考えられる雰囲気をつくること", "group": "失敗を隠さない職場", "explanation": "最終文で人を責めるのではなく原因を皆で考える雰囲気づくりが大切だと明言している。責任を取らせることや一人で対処することは筆者の主張と逆で、注意して失敗を防ぐことは本文の焦点ではない。"}, {"question": "食材には「旬」がある。旬とは、その食べ物が最もよくとれ、味も栄養も豊かになる時期のことだ。今では技術の進歩で、一年中さまざまな野菜や魚が手に入るようになった。便利である反面、いつ何がおいしいのかを意識する機会は減ってしまった。旬のものは値段も手ごろで、味も濃い。季節を感じながら食卓を整えることは、単なる食事を、暮らしの中の小さな楽しみに変えてくれるのではないだろうか。\n\n〔問〕「旬」について、本文の内容に合うものはどれか。", "choices": ["技術の進歩で旬という考え方はなくなった", "旬の食材は味や栄養が優れ、値段も手ごろである", "旬の食材は一年中いつでも同じ味が楽しめる", "旬を意識する人が近年増え続けている"], "answer": "旬の食材は味や栄養が優れ、値段も手ごろである", "group": "旬の食材", "explanation": "本文は旬を味も栄養も豊かで値段も手ごろと説明している。旬の考えがなくなったとは言っておらず、一年中同じ味なのは旬とは別。旬を意識する機会はむしろ減ったと述べており、増えているは誤り。"}, {"question": "山田商事 佐藤様\n\nいつもお世話になっております。先日ご注文いただいた部品の件でご連絡いたします。材料の入荷が遅れており、当初お約束した今月二十日の納品が難しい状況です。誠に恐縮ですが、二十五日まで納期を延ばしていただけないでしょうか。ご迷惑をおかけし、お詫び申し上げます。なお、数量や品質に変更はございません。ご都合をお聞かせいただければ幸いです。よろしくお願いいたします。\n\n〔問〕このメールの主な目的は何か。", "choices": ["注文の数量を変更してもらうこと", "商品の品質について説明すること", "納品が遅れることをわび、日程の変更を頼むこと", "新しい部品の注文を受け付けること"], "answer": "納品が遅れることをわび、日程の変更を頼むこと", "group": "取引先へのメール・納期変更", "explanation": "メールは材料の入荷遅れで納期を二十五日へ延ばしてほしいという依頼とお詫びが中心。数量や品質は変更なしと明記されており、新規注文の受付でもない。"}, {"question": "外国語を話すとき、間違えるのが恥ずかしくて口を開けないという人は多い。私も以前はそうだった。しかし、ある先生に「間違いは上達の途中に必ず通る道だ」と言われてから、考えが変わった。正しく話すことより、まず伝えようとすることが大切なのだ。間違えれば相手が直してくれることもあり、それ自体が学びになる。完璧を目指して黙っているより、下手でも話す人のほうが、結局は早く上達していくものだと思う。\n\n〔問〕筆者が最も言いたいことは何か。", "choices": ["外国語は正しく話せるようになってから使うべきだ", "間違いを恐れず話すことが上達につながる", "外国語の学習には優れた先生が欠かせない", "恥ずかしさを感じるうちは上達できない"], "answer": "間違いを恐れず話すことが上達につながる", "group": "外国語学習と間違い", "explanation": "本文は間違いを恐れて黙るより、下手でも話す人のほうが早く上達すると述べている。正しく話せてから使うべきは逆の主張。先生の言葉はきっかけであり主張の中心ではなく、恥ずかしさそのものが上達を妨げるとは述べていない。"}], "内容理解（中文）": [{"question": "初めて訪れる街を歩くとき、私たちは地図を頼りにする。かつては紙の地図を広げ、自分の位置を周囲の建物や道の形と照らし合わせながら進んだ。だが今では、多くの人が携帯電話の画面に表示される矢印の通りに歩くだけになった。目的地に着くのは以前よりずっと速く、迷うことも少ない。\n便利になったことは間違いない。しかし、「その代わりに失われたもの」もあるように思う。以前は目的地にたどり着くまでに、途中で見かけた変わった看板や、角の小さな店を自然と覚えていた。道順そのものを頭の中に描こうとしていたからだ。ところが画面の指示に従うだけだと、歩き終わっても、どんな道を通ったのかほとんど記憶に残らない。\n道を覚えるという行為は、単に情報を蓄えることではない。周囲を観察し、街と自分との関係を築く作業でもある。目的地へ最短で着くことばかりを求めていると、街はただ通り過ぎるだけの背景になってしまう。速さと引き換えに、私たちは街を味わう機会を手放しているのかもしれない。\n\n〔問〕筆者によると、携帯電話の地図を使うようになって、街歩きはどう変わったか。", "choices": ["目的地に速く着けるようになり、道に迷うことも減った", "紙の地図よりも周囲の建物を注意深く見るようになった", "変わった看板や小さな店をよく覚えるようになった", "自分の位置を道の形と照らし合わせる必要が増えた"], "answer": "目的地に速く着けるようになり、道に迷うことも減った", "group": "道具としての地図と記憶", "explanation": "本文に「目的地に着くのは以前よりずっと速く、迷うことも少ない」とある。"}, {"question": "初めて訪れる街を歩くとき、私たちは地図を頼りにする。かつては紙の地図を広げ、自分の位置を周囲の建物や道の形と照らし合わせながら進んだ。だが今では、多くの人が携帯電話の画面に表示される矢印の通りに歩くだけになった。目的地に着くのは以前よりずっと速く、迷うことも少ない。\n便利になったことは間違いない。しかし、「その代わりに失われたもの」もあるように思う。以前は目的地にたどり着くまでに、途中で見かけた変わった看板や、角の小さな店を自然と覚えていた。道順そのものを頭の中に描こうとしていたからだ。ところが画面の指示に従うだけだと、歩き終わっても、どんな道を通ったのかほとんど記憶に残らない。\n道を覚えるという行為は、単に情報を蓄えることではない。周囲を観察し、街と自分との関係を築く作業でもある。目的地へ最短で着くことばかりを求めていると、街はただ通り過ぎるだけの背景になってしまう。速さと引き換えに、私たちは街を味わう機会を手放しているのかもしれない。\n\n〔問〕「その代わりに失われたもの」とは、具体的に何を指すか。", "choices": ["通った道や途中で見かけたものを覚えていること", "紙の地図を広げて位置を確認する習慣", "目的地に速くたどり着こうとする気持ち", "携帯電話の画面に表示される矢印の正確さ"], "answer": "通った道や途中で見かけたものを覚えていること", "group": "道具としての地図と記憶", "explanation": "画面の指示に従うだけだと「どんな道を通ったのかほとんど記憶に残らない」と述べられており、失われたのは道や道中のものへの記憶である。"}, {"question": "初めて訪れる街を歩くとき、私たちは地図を頼りにする。かつては紙の地図を広げ、自分の位置を周囲の建物や道の形と照らし合わせながら進んだ。だが今では、多くの人が携帯電話の画面に表示される矢印の通りに歩くだけになった。目的地に着くのは以前よりずっと速く、迷うことも少ない。\n便利になったことは間違いない。しかし、「その代わりに失われたもの」もあるように思う。以前は目的地にたどり着くまでに、途中で見かけた変わった看板や、角の小さな店を自然と覚えていた。道順そのものを頭の中に描こうとしていたからだ。ところが画面の指示に従うだけだと、歩き終わっても、どんな道を通ったのかほとんど記憶に残らない。\n道を覚えるという行為は、単に情報を蓄えることではない。周囲を観察し、街と自分との関係を築く作業でもある。目的地へ最短で着くことばかりを求めていると、街はただ通り過ぎるだけの背景になってしまう。速さと引き換えに、私たちは街を味わう機会を手放しているのかもしれない。\n\n〔問〕この文章で筆者が最も言いたいことは何か。", "choices": ["速さを求めるあまり、街を味わう機会を失っているのではないか", "紙の地図に戻し、携帯電話の地図は使うべきではない", "道を覚えるのは情報を蓄えるための効率的な方法である", "初めての街では必ず迷わないようにする工夫が必要だ"], "answer": "速さを求めるあまり、街を味わう機会を失っているのではないか", "group": "道具としての地図と記憶", "explanation": "最後に「速さと引き換えに、私たちは街を味わう機会を手放しているのかもしれない」とまとめている。"}, {"question": "どんな仕事にも失敗はつきものだ。問題は失敗が起きるかどうかではなく、それが起きたときにどう扱われるかである。多くの職場では、失敗した人が責められ、本人もそれを隠そうとする。だが、隠された失敗は誰の学びにもならず、同じ間違いが別の人によって繰り返されることになる。\nある会社では、月に一度、社員が自分の失敗を報告し合う集まりを開いているという。責任を問うためではなく、そこから何を学べるかを話し合うためだ。最初は誰も口を開こうとしなかったが、上司が率先して自分の失敗を語り始めると、少しずつ雰囲気が変わっていった。「その空気」ができると、部下たちも安心して自分の経験を話すようになったのである。\n失敗を安心して打ち明けられる職場は、一見すると規律がゆるいように見えるかもしれない。しかし実際には、その逆である。失敗が共有されることで、組織全体が同じ間違いを避けられるようになり、結果としてより強くなる。大切なのは、失敗を消すことではなく、失敗を財産に変える仕組みを持つことなのだ。\n\n〔問〕多くの職場では、失敗はどのように扱われると筆者は述べているか。", "choices": ["失敗した人が責められ、本人もそれを隠そうとする", "失敗はつきものだとして、誰も気に留めない", "失敗から学べることを全員で話し合う", "失敗を報告した人がかえって高く評価される"], "answer": "失敗した人が責められ、本人もそれを隠そうとする", "group": "失敗を語れる職場", "explanation": "本文に「多くの職場では、失敗した人が責められ、本人もそれを隠そうとする」とある。"}, {"question": "どんな仕事にも失敗はつきものだ。問題は失敗が起きるかどうかではなく、それが起きたときにどう扱われるかである。多くの職場では、失敗した人が責められ、本人もそれを隠そうとする。だが、隠された失敗は誰の学びにもならず、同じ間違いが別の人によって繰り返されることになる。\nある会社では、月に一度、社員が自分の失敗を報告し合う集まりを開いているという。責任を問うためではなく、そこから何を学べるかを話し合うためだ。最初は誰も口を開こうとしなかったが、上司が率先して自分の失敗を語り始めると、少しずつ雰囲気が変わっていった。「その空気」ができると、部下たちも安心して自分の経験を話すようになったのである。\n失敗を安心して打ち明けられる職場は、一見すると規律がゆるいように見えるかもしれない。しかし実際には、その逆である。失敗が共有されることで、組織全体が同じ間違いを避けられるようになり、結果としてより強くなる。大切なのは、失敗を消すことではなく、失敗を財産に変える仕組みを持つことなのだ。\n\n〔問〕「その空気」ができたのは、何がきっかけだったか。", "choices": ["上司が自分から進んで失敗を語り始めたこと", "月に一度の集まりが義務として定められたこと", "失敗を隠した社員が厳しく罰せられたこと", "部下たちが先に自分の経験を話し始めたこと"], "answer": "上司が自分から進んで失敗を語り始めたこと", "group": "失敗を語れる職場", "explanation": "「上司が率先して自分の失敗を語り始めると、少しずつ雰囲気が変わっていった」とあり、その結果部下も話すようになった。"}, {"question": "どんな仕事にも失敗はつきものだ。問題は失敗が起きるかどうかではなく、それが起きたときにどう扱われるかである。多くの職場では、失敗した人が責められ、本人もそれを隠そうとする。だが、隠された失敗は誰の学びにもならず、同じ間違いが別の人によって繰り返されることになる。\nある会社では、月に一度、社員が自分の失敗を報告し合う集まりを開いているという。責任を問うためではなく、そこから何を学べるかを話し合うためだ。最初は誰も口を開こうとしなかったが、上司が率先して自分の失敗を語り始めると、少しずつ雰囲気が変わっていった。「その空気」ができると、部下たちも安心して自分の経験を話すようになったのである。\n失敗を安心して打ち明けられる職場は、一見すると規律がゆるいように見えるかもしれない。しかし実際には、その逆である。失敗が共有されることで、組織全体が同じ間違いを避けられるようになり、結果としてより強くなる。大切なのは、失敗を消すことではなく、失敗を財産に変える仕組みを持つことなのだ。\n\n〔問〕失敗を安心して打ち明けられる職場について、筆者はどう考えているか。", "choices": ["失敗が共有されることで、組織はかえって強くなる", "規律がゆるいため、同じ間違いが繰り返されやすい", "失敗を完全になくすことを目標にすべきだ", "上司の負担が大きくなり、長続きしにくい"], "answer": "失敗が共有されることで、組織はかえって強くなる", "group": "失敗を語れる職場", "explanation": "「失敗が共有されることで、組織全体が同じ間違いを避けられるようになり、結果としてより強くなる」と述べている。"}, {"question": "私たちはつい、予定表の空欄を埋めたくなる。何も書かれていない時間を見ると、まるで無駄にしているような気がして、落ち着かないのだ。しかし、本当に価値のある考えは、忙しく動き回っているときよりも、何もしていない「余白の時間」に生まれることが多い。\n散歩の途中や、電車をぼんやり待っているとき、頭の中では、それまでばらばらだった知識や経験が、静かに結びついていく。予定を詰め込みすぎると、こうした結びつきの働く場所がなくなってしまう。\nもちろん、努力や集中が要らないと言うのではない。ただ、集中して得た材料を、自分のものとして深めるには、あえて何もしない時間が必要なのだ。畑に種をまいた後、しばらく土を休ませるのと同じである。\n効率を求めるあまり、私たちはこの休ませる時間まで削ろうとする。だが、余白を失った心には、新しい発想の芽が育つ余地がない。忙しさの中で、意識して立ち止まることこそ、今の私たちに求められている。\n\n〔問〕「余白の時間」とは、ここではどんな時間か。", "choices": ["予定を立てて計画的に過ごす時間", "何もせず、ぼんやりと過ごす時間", "知識を集中して覚え込むための時間", "効率よく作業を片づけるための時間"], "answer": "何もせず、ぼんやりと過ごす時間", "group": "余白の時間の価値（時間の使い方）", "explanation": "本文で「何もしていない『余白の時間』」「あえて何もしない時間」と述べられており、散歩中や電車を待つ間などのぼんやり過ごす時間を指す。"}, {"question": "私たちはつい、予定表の空欄を埋めたくなる。何も書かれていない時間を見ると、まるで無駄にしているような気がして、落ち着かないのだ。しかし、本当に価値のある考えは、忙しく動き回っているときよりも、何もしていない「余白の時間」に生まれることが多い。\n散歩の途中や、電車をぼんやり待っているとき、頭の中では、それまでばらばらだった知識や経験が、静かに結びついていく。予定を詰め込みすぎると、こうした結びつきの働く場所がなくなってしまう。\nもちろん、努力や集中が要らないと言うのではない。ただ、集中して得た材料を、自分のものとして深めるには、あえて何もしない時間が必要なのだ。畑に種をまいた後、しばらく土を休ませるのと同じである。\n効率を求めるあまり、私たちはこの休ませる時間まで削ろうとする。だが、余白を失った心には、新しい発想の芽が育つ余地がない。忙しさの中で、意識して立ち止まることこそ、今の私たちに求められている。\n\n〔問〕筆者は、なぜ予定を詰め込みすぎるのはよくないと考えているか。", "choices": ["努力や集中をする力が失われてしまうから", "体を休める時間がまったくなくなってしまうから", "ばらばらの知識や経験が結びつく機会が失われるから", "散歩や電車での移動ができなくなってしまうから"], "answer": "ばらばらの知識や経験が結びつく機会が失われるから", "group": "余白の時間の価値（時間の使い方）", "explanation": "「予定を詰め込みすぎると、こうした結びつきの働く場所がなくなってしまう」とあり、結びつきとは知識や経験が静かに結びつくことを指す。"}, {"question": "私たちはつい、予定表の空欄を埋めたくなる。何も書かれていない時間を見ると、まるで無駄にしているような気がして、落ち着かないのだ。しかし、本当に価値のある考えは、忙しく動き回っているときよりも、何もしていない「余白の時間」に生まれることが多い。\n散歩の途中や、電車をぼんやり待っているとき、頭の中では、それまでばらばらだった知識や経験が、静かに結びついていく。予定を詰め込みすぎると、こうした結びつきの働く場所がなくなってしまう。\nもちろん、努力や集中が要らないと言うのではない。ただ、集中して得た材料を、自分のものとして深めるには、あえて何もしない時間が必要なのだ。畑に種をまいた後、しばらく土を休ませるのと同じである。\n効率を求めるあまり、私たちはこの休ませる時間まで削ろうとする。だが、余白を失った心には、新しい発想の芽が育つ余地がない。忙しさの中で、意識して立ち止まることこそ、今の私たちに求められている。\n\n〔問〕この文章で筆者が最も言いたいことは何か。", "choices": ["何よりもまず効率を追い求めることが大切だ", "集中して努力することはもう必要ない", "忙しさの中でも、意識して立ち止まる時間が必要だ", "予定表の空欄はできるだけ埋めたほうがよい"], "answer": "忙しさの中でも、意識して立ち止まる時間が必要だ", "group": "余白の時間の価値（時間の使い方）", "explanation": "最終段落の「忙しさの中で、意識して立ち止まることこそ、今の私たちに求められている」が主張。努力を否定してはいない。"}, {"question": "同じ本を二度、三度と読み返す人がいる。一度読んで内容が分かったのに、なぜまた読むのかと不思議に思う人もいるだろう。しかし、読み返すことの意味は、書かれている内容を覚え直すことにはない。\n本の中身は、前に読んだときと変わらない。変わるのは、読む側の私たちのほうである。時間がたてば、経験も増え、ものの見方も少しずつ変化する。だから、以前は気にも留めなかった一行が、あるとき急に心に響く。同じ文章が、まるで初めて読むかのように新しく感じられるのだ。\nつまり、読み返すという行為は、本を通して、「変化した自分自身を確かめる作業」だと言える。線を引いた場所が昔と違っていることに気づいて、驚くこともあるだろう。\n新しい本を次々に読むことも、もちろん大切だ。だが、一冊の本とじっくり付き合い、何度も戻ってくることでしか得られないものがある。それは、過ぎた時間の中で、自分がどう歩んできたかという静かな記録なのである。\n\n〔問〕以前は気にも留めなかった一行が、あるとき急に心に響くのはなぜか。", "choices": ["本の内容が少しずつ書き変えられているから", "前に読んだときの記憶を忘れてしまっているから", "読む側の経験やものの見方が変化しているから", "一度目より集中して読むようになるから"], "answer": "読む側の経験やものの見方が変化しているから", "group": "本を読み返すこと（読書と学び）", "explanation": "「変わるのは、読む側の私たちのほうである。時間がたてば、経験も増え、ものの見方も少しずつ変化する」とあり、変わるのは本ではなく読み手だと説明されている。"}, {"question": "同じ本を二度、三度と読み返す人がいる。一度読んで内容が分かったのに、なぜまた読むのかと不思議に思う人もいるだろう。しかし、読み返すことの意味は、書かれている内容を覚え直すことにはない。\n本の中身は、前に読んだときと変わらない。変わるのは、読む側の私たちのほうである。時間がたてば、経験も増え、ものの見方も少しずつ変化する。だから、以前は気にも留めなかった一行が、あるとき急に心に響く。同じ文章が、まるで初めて読むかのように新しく感じられるのだ。\nつまり、読み返すという行為は、本を通して、「変化した自分自身を確かめる作業」だと言える。線を引いた場所が昔と違っていることに気づいて、驚くこともあるだろう。\n新しい本を次々に読むことも、もちろん大切だ。だが、一冊の本とじっくり付き合い、何度も戻ってくることでしか得られないものがある。それは、過ぎた時間の中で、自分がどう歩んできたかという静かな記録なのである。\n\n〔問〕「変化した自分自身を確かめる作業」とは、どういうことか。", "choices": ["本の内容を、前より正確に覚え直すこと", "同じ本を読むことで、自分の見方の変化に気づくこと", "昔引いた線を消して、新しく引き直すこと", "新しい本を次々に読んで、知識を増やすこと"], "answer": "同じ本を読むことで、自分の見方の変化に気づくこと", "group": "本を読み返すこと（読書と学 ces": ["便利さの陰で手放しているものに目を向け、道具との付き合い方を自分で選び取るべきだ", "便利な道具に頼るのをやめ、できるだけ昔の暮らしに戻すべきだ", "道具は作業を代わりにやってくれるものであり、感情とは関わりがない", "不便な道具ほど価値が高く、便利な道具は避けたほうがよい"], "answer": "便利さの陰で手放しているものに目を向け、道具との付き合い方を自分で選び取るべきだ", "group": "道具と不便さ（文明論・随筆）", "explanation": "筆者は昔に戻せとも不便ほど良いとも言わず、便利さと引き換えに手放すものに目を向け、道具との付き合い方を自分で選ぶことを主張している。"}, {"question": "「わからないことがあれば、いつでも質問してください」――職場でも学校でも、よく聞く言葉である。しかし、いざその場になると、なかなか手が挙がらない。私も長い間、質問のできない人間だった。\n\nなぜ質問できないのか。若いころの私は、質問すること自体を「自分の理解が足りない証拠」だと感じていた。こんな初歩的なことを聞いたら、能力を疑われるのではないか。そう思うと、口をつぐんでしまう。わからないまま曖昧にうなずき、あとでこっそり調べる。その場をやり過ごすことばかりがうまくなっていった。\n\n考えを改めるきっかけになったのは、ある先輩の姿だった。その人は、会議でも研修でも、実に堂々と質問をする。しかも、私が内心「それは聞きにくいな」と思うようなことほど、はっきりと尋ねるのだ。あるとき私は思い切って、恥ずかしくないのかと聞いてみた。すると先輩は笑って、「わからないのは私だけじゃない。私が聞けば、同じところでつまずいている人も助かるだろう」と答えた。\n\nこの言葉は、私の思い込みをひっくり返した。私はそれまで、質問を「自分のためだけの行為」だと考えていた。だから、恥ずかしさが先に立った。ところが、質問は「その場にいる全員のための行為」でもありうる。一人の勇気が、口に出せずにいる何人もの疑問を、代わりに引き受けることになるのだ。\n\nそう気づいてから、私は少しずつ質問ができるようになった。すると、思いがけない変化が起きた。質問をすると、答える側もまた、自分の説明の足りなかった点に気づく。つまり質問は、聞く人と答える人のあいだに、理解を深め合う新しいやりとりを生み出すのである。\n\nわからないことを口に出すのは、たしかに勇気がいる。けれども、その勇気は決して自分ひとりのためのものではない。質問できるということは、弱さのしるしではなく、むしろその場全体を前へ進める力なのだ。だからこそ私は、これからも進んで手を挙げていきたいと思う。\n\n〔問〕若いころの筆者が質問できなかったのは、なぜか。", "choices": ["質問することが、自分の理解の足りなさを示すものだと感じていたから", "質問しても、周りの人が正しく答えてくれないと思っていたから", "わからないことは自分で調べるべきだと教えられていたから", "質問すると、会議や研修の時間が長くなると心配していたから"], "answer": "質問することが、自分の理解の足りなさを示すものだと感じていたから", "group": "質問できる人（学び・コミュニケーション論）", "explanation": "本文に「質問すること自体を『自分の理解が足りない証拠』だと感じていた」とある。"}, {"question": "「わからないことがあれば、いつでも質問してください」――職場でも学校でも、よく聞く言葉である。しかし、いざその場になると、なかなか手が挙がらない。私も長い間、質問のできない人間だった。\n\nなぜ質問できないのか。若いころの私は、質問すること自体を「自分の理解が足りない証拠」だと感じていた。こんな初歩的なことを聞いたら、能力を疑われるのではないか。そう思うと、口をつぐんでしまう。わからないまま曖昧にうなずき、あとでこっそり調べる。その場をやり過ごすことばかりがうまくなっていった。\n\n考えを改めるきっかけになったのは、ある先輩の姿だった。その人は、会議でも研修でも、実に堂々と質問をする。しかも、私が内心「それは聞きにくいな」と思うようなことほど、はっきりと尋ねるのだ。あるとき私は思い切って、恥ずかしくないのかと聞いてみた。すると先輩は笑って、「わからないのは私だけじゃない。私が聞けば、同じところでつまずいている人も助かるだろう」と答えた。\n\nこの言葉は、私の思い込みをひっくり返した。私はそれまで、質問を「自分のためだけの行為」だと考えていた。だから、恥ずかしさが先に立った。ところが、質問は「その場にいる function spreadGroups(arr) {
  if (arr.length < 3) return arr;
  const items = arr.slice();
  const out = [];
  let lastG = null;
  while (items.length) {
    const counts = {};
    items.forEach(q => { const g = q.group || ''; counts[g] = (counts[g] || 0) + 1; });
    let best = -1, bestC = -1;
    for (let i = 0; i < items.length; i++) {
      const g = items[i].group || '';
      if (g === lastG) continue;
      if (counts[g] > bestC) { bestC = counts[g]; best = i; }
    }
    if (best === -1) best = 0;
    out.push(items[best]); lastG = items[best].group || ''; items.splice(best, 1);
  }
  return out;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(sec, sub) {
  section = sec;
  subtype = sub;
  vocabExpanded = false;
  document.getElementById('vocab-sub').classList.remove('show');
  document.getElementById('cat-vocab').classList.remove('active');
  const _gSub = document.getElementById('grammar-sub'); if (_gSub) _gSub.classList.remove('show');
  const _gBtn = document.getElementById('cat-grammar'); if (_gBtn) _gBtn.classList.remove('active');
  const readingSub = document.getElementById('reading-sub');
  if (readingSub) readingSub.classList.remove('show');
  const catReading = document.getElementById('cat-reading');
  if (catReading) catReading.classList.remove('active');
  const listeningSub = document.getElementById('listening-sub');
  if (listeningSub) listeningSub.classList.remove('show');
  const catListening = document.getElementById('cat-listening');
  if (catListening) catListening.classList.remove('active');

  let sourcePool;
  if (sec === '文字・語彙' && sub) {
    sourcePool = vocabQuestions[sub] || [];
  } else if (sec === '文法' && sub) {
    sourcePool = grammarQuestions[sub] || [];
  } else if (sec === '読解' && sub) {
    sourcePool = readingQuestions[sub] || [];
  } else if (sec === '読解') {
    sourcePool = Object.values(readingQuestions).flat();
  } else if (sec === '聴解') {
    if (sub) {
      const mn = parseInt((sub.match(/(\d+)/) || [])[1], 10);
      sourcePool = (typeof listeningQuestions !== 'undefined' ? listeningQuestions : []).filter(q => q.mondai === mn);
    } else {
      sourcePool = (typeof listeningQuestions !== 'undefined' ? listeningQuestions : []).slice();
    }
  } else {
    sourcePool = otherQuestions[sec] || [];
  }

  sourcePool = sourcePool.filter(q => !q.hidden);
  if (sourcePool.length === 0) { alert('この種類は ひょうじ できる もんだいが ありません（すべて 非表示です）。'); goHome(); return; }

  // 文章の文法は5問ずつのセット（文章単位）でシャッフルし、セット内は順序固定
  if (sub === '文章の文法') {
    const PASSAGE_SIZE = 5;
    const passages = [];
    for (let i = 0; i < sourcePool.length; i += PASSAGE_SIZE) {
      passages.push(sourcePool.slice(i, i + PASSAGE_SIZE));
    }
    const shuffledPassages = shuffle(passages);
    // 必要な文章数だけ取り（10問なら2文章分）
    const needed = Math.ceil(TOTAL_Q / PASSAGE_SIZE);
    pool = shuffledPassages.slice(0, needed).flat().slice(0, TOTAL_Q);
  } else {
    pool = shuffle(sourcePool).slice(0, TOTAL_Q);
    pool = spreadGroups(pool);
  }
  // 実際のpool数に合わせてTOTAL_Qを調整
  actualTotal = pool.length;
  current = 0;
  correct = 0;
  answered = false;
  if(window.NNHRecord){ window.__nnhSec = sec + (sub? "／"+sub : ""); NNHRecord.init({tool:"日本語クイズ N2", level: sec + (sub? "／"+sub : "")}); }

  elapsedSeconds = 0;

  hide('home-screen');
  hide('result-screen');
  show('quiz-screen');

  const pillLabel = sub ? sub : sec;
  document.getElementById('section-pill').textContent = sec;
  document.getElementById('subtype-label').textContent = sub ? '問題種別：' + sub : '';

  startTimer();
  renderQuestion();
}

function startTimer() {
  clearInterval(timerInterval);
  elapsedSeconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimerDisplay() {
  const m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
  const s = String(elapsedSeconds % 60).padStart(2, '0');
  document.getElementById('timer-box').textContent = m + ':' + s;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if (m === 0) return s + '秒';
  return m + '分' + s + '秒';
}

function renderQuestionText(text) {
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // __X__ → 下線付きテキスト
  let result = escaped.replace(/__(.+?)__/g, '<u style="text-decoration-thickness:2px;text-underline-offset:3px;font-weight:700;">$1</u>');
  // ★ → 強調ボックス
  result = result.replace(/★/g, '<span style="display:inline-block;background:#2D5A8E;color:#fff;font-weight:700;padding:1px 8px;border-radius:4px;font-size:15px;">★</span>');
  // ①②③④⑤ → 空欄マーカー
  result = result.replace(/([①②③④⑤])/g, '<span style="display:inline-block;background:#E8F0F8;border:2px solid #2D5A8E;border-radius:4px;padding:1px 10px;font-weight:700;color:#1A3A5C;min-width:40px;text-align:center;">$1</span>');
  return result.replace(/\n/g, '<br>');
}

function renderQuestion() {
  answered = false;
  const q = pool[current];
  if (!q) { showResult(); return; }
  const num = current + 1;
  document.getElementById('q-counter').textContent = '問題 ' + num + ' / ' + actualTotal;
  document.getElementById('progress-fill').style.width = Math.round(num / actualTotal * 100) + '%';
  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('next-btn').className = 'next-btn';

  if (section === '文法' && subtype === '文の文法2') {
    renderPuzzle(q);
  } else {
    renderChoices(q);
  }
}

function renderChoices(q) {
  // visual HTML（情報検索問題のお知らせ表示）
  let visualDiv = '';
  try {
    const visualKey = q.visual || null;
    if (visualKey && typeof visualHTML !== 'undefined' && visualHTML[visualKey]) {
      visualDiv = '<div style="margin-bottom:12px;overflow-x:auto">' + visualHTML[visualKey] + '</div>';
    }
  } catch(e) { visualDiv = ''; }

  // 聴解問題の音声プレイヤー
  let audioDiv = '';
  if (q.audio) {
    const esc = function(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
    const situationText = q.situation ? '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;line-height:1.7">' + esc(q.situation) + '</div>' : '';
    const preQText = q.preQuestion ? '<div style="font-size:12px;color:var(--text);margin-bottom:8px;font-weight:600">' + esc(q.preQuestion) + '</div>' : '';
    let scriptHtml = '';
    if (q.script && q.script.length > 0) {
      const lines = q.script.map(function(s){
        const isM = (s.speaker === 'M' || s.speaker === 'M2' || s.speaker === '男');
        const badge = isM
          ? '<span style="display:inline-block;background:#E8F0F8;color:#2D5A8E;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0;margin-top:2px">男</span>'
          : '<span style="display:inline-block;background:#FCE4EC;color:#c62828;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0;margin-top:2px">女</span>';
        return '<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">' + badge
          + '<span style="font-size:12px;line-height:1.7;color:var(--text);flex:1">' + esc(s.text) + '</span></div>';
      }).join('');
      scriptHtml = '<div id="script-box" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">' + lines + '</div>'
        + '<button onclick="toggleScript()" style="margin-top:8px;background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--text-muted);cursor:pointer">'
        + '<span id="script-btn-icon">📄</span> <span id="script-btn-label">スクリプトを見る</span></button>';
    }
    audioDiv = '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">'
      + situationText + preQText
      + '<audio id="listening-audio" controls style="width:100%;margin-top:4px" src="' + q.audio + '">お使いのブラウザは音声再生に対応していません。</audio>'
      + '<div style="font-size:11px;color:var(--text-hint);margin-top:6px">※ 音声を聞いてから回答してください</div>'
      + scriptHtml + '</div>';
  }

  // 問題カードと選択肢を必ずリセット
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  document.getElementById('question-card').innerHTML = audioDiv + visualDiv + renderQuestionText(q.question);

  const labels = ['１', '２', '３', '４'];
  shuffle(q.choices).forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.value = c;
    btn.innerHTML = '<span class="choice-label">' + labels[i] + '</span><span class="choice-text">' + c + '</span>';
    btn.addEventListener('click', () => selectAnswer(c, q, btn, choicesEl));
    choicesEl.appendChild(btn);
  });
}

function renderPuzzle(q) {
  const STAR_POS = 2;
  const allLines = q.question.split('\n');
  const instructionLine = allLines[0] || '';

  // 下線部行のインデックスを特定
  const underlineLineIdx = allLines.findIndex(l => l.includes('__１__'));

  // 前件：instruction行の次から下線部行の直前まで（空行除く）
  const preLines = allLines.slice(1, underlineLineIdx).filter(l => l.trim() !== '');

  // 後件：下線部行の次から末尾まで（空行除く、下線を含む行は除く）
  const tailLines = allLines.slice(underlineLineIdx + 1).filter(l => l.trim() !== '');

  const slotContents = [null, null, null, null];
  const tiles = shuffle([...q.choices]);

  // ── question-card ──
  const card = document.getElementById('question-card');
  card.innerHTML = '';

  const instr = document.createElement('div');
  instr.style.cssText = 'font-size:13px;color:var(--text-hint);margin-bottom:10px;';
  instr.textContent = instructionLine;
  card.appendChild(instr);

  const sentDiv = document.createElement('div');
  sentDiv.className = 'puzzle-sentence';
  sentDiv.style.lineHeight = '2.2';

  // 前件を追加（複数行対応）
  preLines.forEach((line, idx) => {
    sentDiv.appendChild(document.createTextNode(line.trim()));
    sentDiv.appendChild(document.createElement('br'));
  });

  // スロット行
  const slotRow = document.createElement('div');
  slotRow.className = 'puzzle-slot-row';
  const slotEls = [];

  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('span');
    slot.className = 'puzzle-slot' + (i === STAR_POS ? ' star-slot' : '');
    slot.dataset.idx = i;
    slot.addEventListener('click', () => {
      if (!slot.classList.contains('filled') || answered) return;
      const word = slotContents[i];
      slotContents[i] = null;
      slot.textContent = '';
      slot.classList.remove('filled');
      const tileEl = document.querySelector(`.puzzle-tile[data-word="${word}"]`);
      if (tileEl) { tileEl.classList.remove('used'); tileEl.disabled = false; }
      updateCheckBtn();
    });
    slotEls.push(slot);
    slotRow.appendChild(slot);
    if (i < 3) {
      const sep = document.createElement('span');
      sep.style.cssText = 'color:var(--text-hint);font-size:18px;line-height:1;margin:0 1px;';
      sep.textContent = '―';
      slotRow.appendChild(sep);
    }
  }
  sentDiv.appendChild(slotRow);

  // 後件を追加（複数行対応）
  tailLines.forEach((line, idx) => {
    if (idx > 0) sentDiv.appendChild(document.createElement('br'));
    sentDiv.appendChild(document.createTextNode(line.trim()));
  });

  card.appendChild(sentDiv);

  // ── choices area: tiles + check button ──
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  const tilesDiv = document.createElement('div');
  tilesDiv.className = 'puzzle-tiles';
  tiles.forEach(word => {
    const tile = document.createElement('button');
    tile.className = 'puzzle-tile';
    tile.textContent = word;
    tile.dataset.word = word;
    tile.addEventListener('click', () => {
      if (answered || tile.classList.contains('used')) return;
      const emptyIdx = slotContents.findIndex(s => s === null);
      if (emptyIdx === -1) return;
      slotContents[emptyIdx] = word;
      slotEls[emptyIdx].textContent = word;
      slotEls[emptyIdx].classList.add('filled');
      tile.classList.add('used');
      tile.disabled = true;
      updateCheckBtn();
    });
    tilesDiv.appendChild(tile);
  });
  choicesEl.appendChild(tilesDiv);

  const checkBtn = document.createElement('button');
  checkBtn.className = 'puzzle-check-btn';
  checkBtn.textContent = '確認する';
  checkBtn.disabled = true;
  choicesEl.appendChild(checkBtn);

  function updateCheckBtn() {
    checkBtn.disabled = slotContents.some(s => s === null);
  }

  checkBtn.addEventListener('click', () => {
    if (answered) return;
    answered = true;
    const starWord = slotContents[STAR_POS];
    const isCorrect = starWord === q.answer;
    if (isCorrect) correct++;
  if(window.NNHRecord){ NNHRecord.add({sec:(window.__nnhSec||''), q:String(q.question||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,120), chosen:starWord, correct:q.answer, ok:isCorrect}); }

    stats.total++; if (isCorrect) stats.correct++;
    localStorage.setItem('jlpt_n2_stats', JSON.stringify(stats));

    slotEls[STAR_POS].classList.add(isCorrect ? 'correct-slot' : 'wrong-slot');
    document.querySelectorAll('.puzzle-tile').forEach(t => { t.disabled = true; });
    checkBtn.disabled = true;

    const fb = document.getElementById('feedback-box');
    fb.innerHTML = '<div class="feedback-label">' + (isCorrect ? '✓ 正解！' : '✗ 不正解') + '</div>' +
      (!isCorrect ? '<div style="margin-bottom:6px">★の正解：<strong>' + q.answer + '</strong></div>' : '') +
      '<div>' + q.explanation + '</div>';
    fb.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'wrong');
  const reportBtn = document.createElement('button');
  reportBtn.className = 'report-btn';
  reportBtn.textContent = '🚩 この問題を報告する';
  reportBtn.onclick = openReport;
  fb.appendChild(reportBtn);
    document.getElementById('next-btn').className = 'next-btn show';
  });
}


function selectAnswer(selected, q, btn, choicesEl) {
  if (answered) return;
  answered = true;
  const isCorrect = selected === q.answer;
  if (isCorrect) correct++;
  if(window.NNHRecord){ NNHRecord.add({sec:(window.__nnhSec||''), q:String(q.question||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,120), chosen:selected, correct:q.answer, ok:isCorrect}); }

  stats.total++;
  if (isCorrect) stats.correct++;
  localStorage.setItem('jlpt_n2_stats', JSON.stringify(stats));

  Array.from(choicesEl.children).forEach(b => {
    b.disabled = true;
    const val = b.dataset.value || b.querySelector('.choice-text').textContent;
    if (val === q.answer) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  const fb = document.getElementById('feedback-box');
  fb.innerHTML = '<div class="feedback-label">' + (isCorrect ? '✓ 正解！' : '✗ 不正解') + '</div>' +
    (!isCorrect ? '<div style="margin-bottom:4px">正解：' + q.answer + '</div>' : '') +
    '<div>' + q.explanation + '</div>';
  fb.className = 'feedback-box show ' + (isCorrect ? 'correct' : 'wrong');
  const reportBtn = document.createElement('button');
  reportBtn.className = 'report-btn';
  reportBtn.textContent = '🚩 この問題を報告する';
  reportBtn.onclick = openReport;
  fb.appendChild(reportBtn);
  document.getElementById('next-btn').className = 'next-btn show';
}

function nextQuestion() {
  current++;
  if (current >= actualTotal) showResult();
  else renderQuestion();
}

function nnhMountRecord(){
  if(!window.NNHRecord) return;
  var host=document.getElementById('nnhHost');
  if(!host){ host=document.createElement('div'); host.id='nnhHost';
    var acts=document.querySelector('#result-screen .result-actions');
    if(acts&&acts.parentNode){ acts.parentNode.insertBefore(host, acts); } }
  if(host){ host.innerHTML=''; NNHRecord.mount(host,{score:correct,total:actualTotal}); }
}

function showResult() {
  stopTimer();
  hide('quiz-screen');
  show('result-screen');
  const pct = Math.round(correct / actualTotal * 100);
  document.getElementById('r-score').textContent = correct + '問';
  document.getElementById('r-of').textContent = actualTotal + '問中';
  document.getElementById('r-time').textContent = '⏱ ' + formatTime(elapsedSeconds) + 'で完了';
  document.getElementById('r-pct').textContent = '正答率 ' + pct + '%';
  const msg = pct >= 90 ? 'すばらしい！この種類の問題はほぼ完璧です。他の種類にも挑戦してみましょう！'
    : pct >= 70 ? 'よくできました！間違えた問題の解説をもう一度確認してみましょう。'
    : pct >= 50 ? 'もう少しです！苦手な部分を集中して練習するとさらに伸びます。'
    : '焦らず少しずつ進めましょう。毎日練習することが合格への近道です！';
  document.getElementById('r-comment').textContent = msg;
  nnhMountRecord();
  updateStatsBar();
}

// ── エディタ機能 ──────────────────────────────
let editingCat = null;
let editingKey = null;
let editingIdx = null;

// 確認済みフラグをlocalStorageで管理
// キー形式: "reviewed:{catStr}:{idx}"
function getReviewedKey(catStr, idx) { return `reviewed:${catStr}:${idx}`; }
function isReviewed(catStr, idx) { return localStorage.getItem(getReviewedKey(catStr, idx)) === '1'; }
function setReviewed(catStr, idx, val) {
  if (val) localStorage.setItem(getReviewedKey(catStr, idx), '1');
  else localStorage.removeItem(getReviewedKey(catStr, idx));
}

function openEditor() {
  const input = prompt('パスワードを入力してください：');
  if (!input) return;
  const HASH = 'a057f26b62d53be076f5954d340fafa231e403bf66490966501e4d9720873286';
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(input)).then(buf => {
    const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hex === HASH) {
      hide('home-screen');
      show('editor-screen');
      loadEditorList();
    } else {
      alert('パスワードが違います。');
    }
  });
}

function closeEditor() {
  hide('editor-screen');
  show('home-screen');
}

function getEditorPool(catStr) {
  const [cat, key] = catStr.split('/');
  if (cat === '文法') return { pool: grammarQuestions[key] || [], key };
  if (cat === '文字・語彙') return { pool: vocabQuestions[key] || [], key };
  if (cat === '読解') return { pool: readingQuestions[key] || [], key };
  return { pool: [], key };
}

function loadEditorList() {
  const catStr = document.getElementById('editor-cat').value;
  const { pool, key } = getEditorPool(catStr);
  const isG2 = (key === '文の文法2');
  const listEl = document.getElementById('editor-list');
  listEl.innerHTML = '';

  const hiddenCount = pool.filter(q => q.hidden).length;
  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px';
  bar.innerHTML = `<div style="font-size:12px;color:var(--text-hint)">この種類：全 ${pool.length} 問 ／ <span style="color:#2D5A8E;font-weight:700">非表示 ${hiddenCount} 問</span></div>`
    + `<button onclick="exportHTML()" style="padding:8px 14px;border-radius:8px;background:#2D5A8E;color:#fff;border:none;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">\u{1F4BE} 修正版HTMLをダウンロード</button>`;
  listEl.appendChild(bar);

  // 未確認を先に、確認済みを後に並べる
  const indexed = pool.map((q, i) => ({ q, i, reviewed: isReviewed(catStr, i) }));
  indexed.sort((a, b) => a.reviewed - b.reviewed);

  // セパレーター用フラグ
  let shownUnreviewed = false;
  let shownReviewed = false;

  indexed.forEach(({ q, i, reviewed }) => {
    // セクションヘッダー
    if (!reviewed && !shownUnreviewed) {
      shownUnreviewed = true;
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:12px;font-weight:700;color:var(--danger);padding:4px 0 2px;';
      hdr.textContent = '── 未確認';
      listEl.appendChild(hdr);
    }
    if (reviewed && !shownReviewed) {
      shownReviewed = true;
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:12px;font-weight:700;color:#27ae60;padding:10px 0 2px;';
      hdr.textContent = '── 確認済み ✓';
      listEl.appendChild(hdr);
    }

    const card = document.createElement('div');
    card.style.cssText = `background:var(--card-bg);border:1px ${q.hidden ? 'dashed #999' : 'solid ' + (reviewed ? '#27ae60' : 'var(--danger)')};border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;opacity:${q.hidden ? '0.45' : (reviewed ? '0.65' : '1')}`;

    const lines = q.question.split('\n').filter(l => l.trim() && !l.includes('えらびなさい'));
    const preview = lines.join(' ').replace(/__[１２★４]__/g,'＿').replace(/　/g,' ').substring(0,65) + '…';
    const choicesHtml = q.choices.map((c,ci) =>
      `<span style="font-size:12px;padding:2px 7px;border-radius:4px;background:${ci===2?'#2D5A8E':'var(--bg)'};color:${ci===2?'#fff':'var(--text-hint)'};border:1px solid var(--border)">${c}</span>`
    ).join('');
    const badge = reviewed
      ? `<span style="font-size:11px;color:#27ae60;font-weight:700">✓ 確認済み</span>`
      : `<span style="font-size:11px;color:var(--danger);font-weight:700">● 未確認</span>`;

    card.innerHTML = `
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:var(--text-hint);margin-bottom:3px;display:flex;gap:8px;align-items:center">
          <span style="font-weight:700">${key} #${i+1}</span>${badge}${q.hidden ? ' <span style="font-size:10px;color:#fff;background:#777;border-radius:4px;padding:1px 6px;font-weight:700">\u{1F6AB} 非表示</span>' : ''}
        </div>
        <div style="font-size:14px;line-height:1.5;word-break:break-all;margin-bottom:5px">${preview}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${choicesHtml}</div>
        ${!isG2 ? `<div style="font-size:12px;color:#27ae60;margin-top:4px">✓ 正解：${q.answer}</div>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <button onclick="openEditModal('${catStr}',${i})" style="padding:7px 14px;border-radius:7px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">編集</button>
        <button onclick="toggleReviewed('${catStr}',${i})" style="padding:5px 10px;border-radius:7px;background:${reviewed?'#eee':'#27ae60'};color:${reviewed?'var(--text-hint)':'#fff'};border:none;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer">${reviewed?'未確認に戻す':'✓ 確認済みに'}</button>
        <button onclick="toggleHidden('${catStr}',${i})" style="padding:5px 10px;border-radius:7px;background:${q.hidden?'#2D5A8E':'#eee'};color:${q.hidden?'#fff':'var(--text-hint)'};border:none;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer">${q.hidden?'表示に戻す':'\u{1F6AB} 非表示にする'}</button>
      </div>`;
    listEl.appendChild(card);
  });

  if (pool.length === 0) {
    listEl.innerHTML = '<div style="color:var(--text-hint);text-align:center;padding:20px">問題がありません</div>';
  }
}

function toggleReviewed(catStr, idx) {
  setReviewed(catStr, idx, !isReviewed(catStr, idx));
  loadEditorList();
}

function openEditModal(catStr, idx) {
  const { pool, key } = getEditorPool(catStr);
  const q = pool[idx];
  if (!q) return;
  editingCat = catStr;
  editingKey = key;
  editingIdx = idx;
  const isG2 = (key === '文の文法2');

  const bodyLines = q.question.split('\n').slice(1);
  document.getElementById('edit-question').value = bodyLines.join('\n');
  document.getElementById('edit-c1').value = q.choices[0] || '';
  document.getElementById('edit-c2').value = q.choices[1] || '';
  document.getElementById('edit-c3').value = q.choices[2] || '';
  document.getElementById('edit-c4').value = q.choices[3] || '';
  document.getElementById('edit-explanation').value = q.explanation || '';

  const note = document.getElementById('edit-answer-note');
  if (isG2) {
    note.textContent = '⚠ 並べ替え問題：③が★（正解）になります。文中の正しい語順通りに①②③④を入力してください。';
    note.style.color = '#2D5A8E';
  } else {
    note.textContent = '※ 正解は③の選択肢に自動設定されます。正解にしたい語を③に入力してください。';
    note.style.color = 'var(--text-hint)';
  }

  document.getElementById('edit-modal-title').textContent = `問${idx+1} を編集`;
  document.getElementById('edit-overlay').style.display = 'block';
}

function closeEditModal() {
  document.getElementById('edit-overlay').style.display = 'none';
}

function saveEdit() {
  const { pool } = getEditorPool(editingCat);
  const q = pool[editingIdx];
  if (!q) return;

  const firstLine = q.question.split('\n')[0];
  q.question    = firstLine + '\n' + document.getElementById('edit-question').value;
  const c1 = document.getElementById('edit-c1').value.trim();
  const c2 = document.getElementById('edit-c2').value.trim();
  const c3 = document.getElementById('edit-c3').value.trim();
  const c4 = document.getElementById('edit-c4').value.trim();
  q.choices     = [c1, c2, c3, c4];
  q.answer      = c3;
  q.explanation = document.getElementById('edit-explanation').value.trim();

  // 編集したら自動的に未確認に戻す
  setReviewed(editingCat, editingIdx, false);

  closeEditModal();
  loadEditorList();
}

function toggleHidden(catStr, idx) {
  const { pool } = getEditorPool(catStr);
  const q = pool[idx];
  if (!q) return;
  if (q.hidden) delete q.hidden; else q.hidden = true;
  loadEditorList();
}

async function exportHTML() {
  let src;
  try {
    const res = await fetch(location.href, { cache: 'no-store' });
    src = await res.text();
  } catch (e) {
    src = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  }
  const ser =
    'const vocabQuestions = ' + JSON.stringify(vocabQuestions) + ';\n' +
    'const grammarQuestions = ' + JSON.stringify(grammarQuestions) + ';\n' +
    'const readingQuestions = ' + JSON.stringify(readingQuestions) + ';\n' +
    'const otherQuestions = ' + JSON.stringify(otherQuestions) + ';';
  const re = /\/\/ <DATA>[\s\S]*?\/\/ <\/DATA>/;
  if (!re.test(src)) { alert('データ範囲の マーカーが 見つかりません。GitHub Pages（サーバー）から ひらいて、もう一度 おためし ください。'); return; }
  src = src.replace(re, '// <DATA>\n' + ser + '\n// </DATA>');
  const blob = new Blob([src], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'n2_quiz.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1500);
}

  const q = pool[current];
  reportingQ = q;
  document.getElementById('report-q-info').textContent = '問題：' + q.question.slice(0, 40) + '…';
  document.getElementById('report-textarea').value = '';
