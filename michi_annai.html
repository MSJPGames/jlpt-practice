<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道案内ゲーム ・ Direction Game ・ 日本語の部屋</title>
<style>
  :root{
    --bg:#F7F5F0; --surface:#FFFFFF; --border:#E2DDD6;
    --text:#1C1C1C; --text-muted:#6B6560; --text-hint:#9E9890;
    --radius:14px; --radius-sm:10px; --accent:#2F6F4F; --accent-bg:#E2F0E8;
    --ok:#3B6D11; --ok-bg:#EAF3DE; --ng:#9A3D1C; --ng-bg:#FAECE7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:0 1rem 2.5rem;line-height:1.7;-webkit-text-size-adjust:100%}
  .container{max-width:480px;margin:0 auto}
  .back{display:inline-flex;align-items:center;gap:5px;margin-top:1.2rem;font-size:13px;font-weight:600;color:var(--text-muted);text-decoration:none;background:none;border:0;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
  .back:hover{color:var(--text)}
  .app-header{text-align:center;padding:1rem 0 .5rem}
  .app-logo{font-size:12px;font-weight:700;letter-spacing:.15em;color:var(--text-hint);margin-bottom:8px}
  .app-title{font-size:23px;font-weight:700}
  .app-sub{font-size:12.5px;color:var(--text-muted);margin-top:6px}
  .hidden{display:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 15px;margin-bottom:14px}
  .card-h{font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--text-hint);margin-bottom:10px}

  .seg{display:flex;gap:6px;background:#EFEBE3;padding:4px;border-radius:12px;margin-bottom:12px}
  .seg button{flex:1;border:0;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(--text-muted);padding:11px 6px;border-radius:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .seg button .s-en{display:block;font-size:10px;color:var(--text-hint);font-weight:600;margin-top:2px}
  .seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .seg button.on .s-en{color:var(--text-muted)}

  .btn{width:100%;padding:14px;font-size:15px;font-weight:800;border:0;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:transform .1s,filter .12s}
  .btn:active{transform:scale(.99)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-ghost{background:#FAF8F4;color:var(--text);border:1px solid var(--border)}

  .keyrow{font-size:12px;color:var(--text-muted);line-height:1.6}
  .k{width:100%;padding:11px 12px;font-size:14px;font-family:inherit;border:1px solid var(--border);border-radius:var(--radius-sm);background:#FAF8F4;margin:8px 0 6px}
  .keystate{font-size:11.5px;font-weight:700;margin-top:2px}
  .keystate.ok{color:var(--ok)} .keystate.no{color:var(--text-hint)}
  details.opt{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
  details.opt summary{cursor:pointer;padding:12px 15px;font-size:13px;font-weight:700;color:var(--text-muted);-webkit-tap-highlight-color:transparent}
  details.opt .body{padding:0 15px 14px}

  /* マップ */
  .mapwrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:12px}
  svg{width:100%;height:auto;display:block;border-radius:8px}

  .status{background:var(--accent-bg);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;font-weight:700;color:#20422F;min-height:48px;line-height:1.5;text-align:center;margin-bottom:10px}
  .status.ok{background:var(--ok-bg);color:var(--ok)} .status.ng{background:var(--ng-bg);color:var(--ng)}
  .sub-status{font-size:12px;color:var(--text-muted);text-align:center;min-height:16px;margin-bottom:10px}

  .pad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
  .pad .btn{padding:16px 6px;font-size:15px}
  .pad .wide{grid-column:1 / -1}
  .ctrl-mic{background:#FAF8F4;color:var(--text);border:1px solid var(--border)}
  .ctrl-mic.listening{background:var(--ng-bg);border-color:var(--ng);color:var(--ng);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(154,61,28,0)}50%{box-shadow:0 0 0 5px var(--ng-bg)}}
  .log{font-size:12.5px;color:var(--text-muted);background:#FAF8F4;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;margin-top:8px;max-height:96px;overflow:auto;line-height:1.9}
  .row2{display:flex;gap:8px;margin-top:8px}
  .row2 .btn{margin:0}
  .win-emoji{font-size:52px;text-align:center;margin:6px 0}
  .aicomment{font-size:13px;color:#20422F;background:var(--accent-bg);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;line-height:1.6;text-align:center}
  .note{background:#FAF6EE;border:1px solid #EBDFC7;border-radius:var(--radius);padding:11px 14px;font-size:12.5px;color:#6b5d40;line-height:1.65;margin:.2rem 0 1rem}
  @media (prefers-reduced-motion:reduce){.ctrl-mic.listening{animation:none}}
</style>
</head>
<body>
<div class="container">
  <button class="back" id="backBtn">‹ もどる</button>
  <div class="app-header">
    <div class="app-logo">NIHONGO NO HEYA</div>
    <div class="app-title">道案内ゲーム</div>
    <div class="app-sub">道を あんないする・される 練習 ・ Direction Game</div>
  </div>

  <!-- ===== ホーム ===== -->
  <div id="home">
    <div class="card">
      <div class="card-h">やくわりを えらぶ ・ CHOOSE YOUR ROLE</div>
      <div class="seg" id="modeSeg">
        <button data-mode="driver" class="on">運転手<span class="s-en">Driver ・ 聞いて動く</span></button>
        <button data-mode="passenger">客<span class="s-en">Passenger ・ 話して案内</span></button>
      </div>
      <div class="note" id="modeNote"></div>
      <div class="card-h" style="margin-top:2px">レベル ・ LEVEL</div>
      <div class="seg" id="levelSeg">
        <button data-level="easy" class="on">やさしい<span class="s-en">Easy</span></button>
        <button data-level="advanced">上級<span class="s-en">Advanced</span></button>
        <button data-level="super">超上級<span class="s-en">Real-time</span></button>
      </div>
      <div class="note" id="levelNote"></div>
      <button class="btn btn-primary" id="startBtn">▶ はじめる</button>
    </div>

    <details class="opt">
      <summary>🤖 AIコメント（Gemini・任意）</summary>
      <div class="body">
        <div class="keyrow">クリアしたとき、AIが自然な日本語で一言コメントします。無くても遊べます。</div>
        <input type="password" class="k" id="key" placeholder="Gemini キーを貼り付け（例: AIza…）" autocomplete="off">
        <div class="keyrow">キーは<b>この端末だけ</b>に保存。取り方：<a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> →「Create API key」。会話練習ページと同じキーが使えます。</div>
        <div class="keystate no" id="keyState"></div>
      </div>
    </details>
  </div>

  <!-- ===== プレイ ===== -->
  <div id="play" class="hidden">
    <div class="mapwrap"><div id="mapBox"></div></div>
    <div class="status" id="status"></div>
    <div class="sub-status" id="subStatus"></div>

    <!-- 運転手コントロール -->
    <div id="driverCtrl" class="hidden">
      <div class="pad">
        <button class="btn btn-ghost" data-act="left">⬅️ 左に曲がる</button>
        <button class="btn btn-primary" data-act="straight">⬆️ まっすぐ</button>
        <button class="btn btn-ghost" data-act="right">➡️ 右に曲がる</button>
        <button class="btn btn-ghost wide" data-act="stop">✋ 止まる</button>
      </div>
      <button class="btn btn-ghost" id="repeatBtn">🔊 もう一度 聞く</button>
    </div>

    <!-- 客コントロール -->
    <div id="passCtrl" class="hidden">
      <button class="btn ctrl-mic" id="micBtn">🎤 指示を話す</button>
      <div class="log" id="log"></div>
    </div>

    <div class="row2">
      <button class="btn btn-ghost" id="newBtn">🔄 別の道</button>
      <button class="btn btn-ghost" id="homeBtn">やくわり変更</button>
    </div>
  </div>

  <!-- ===== クリア ===== -->
  <div id="win" class="hidden">
    <div class="card">
      <div class="win-emoji">🎉</div>
      <div class="status ok" id="winMsg">目的地に つきました！</div>
      <div class="aicomment hidden" id="aiComment"></div>
      <div class="row2">
        <button class="btn btn-primary" id="againBtn">もう一回</button>
        <button class="btn btn-ghost" id="win2home">やくわり変更</button>
      </div>
    </div>
  </div>
</div>

<script>
var $=function(id){return document.getElementById(id);};
var mem={}, store={ get:function(k){try{return localStorage.getItem(k);}catch(e){return (k in mem)?mem[k]:null;}},
  set:function(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}} };
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ===== 正規化・音声認識・TTS ===== */
var norm=function(s){return (s||'').replace(/[ァ-ヶ]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0x60);}).replace(/[\s　。、！？!?,.]/g,'');};
var TTS_OK=('speechSynthesis' in window), jaVoice=null;
function pickVoice(){ if(!TTS_OK)return; var vs=speechSynthesis.getVoices().filter(function(v){return /ja(-|_)?JP|Japanese|日本/i.test((v.lang||'')+' '+(v.name||''));});
  if(!vs.length)return; var pref=[/Google.*日本語/i,/Google.*Japanese/i,/Kyoko/i,/O-?ren/i,/Nanami/i,/Ayumi/i,/Natural/i,/Neural/i];
  for(var i=0;i<pref.length;i++){ var m=vs.find(function(v){return pref[i].test(v.name||'');}); if(m){jaVoice=m;return;} } jaVoice=vs[0]; }
if(TTS_OK){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function sayTTS(text){ if(!TTS_OK||!text)return; try{ var u=new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=0.95; if(jaVoice)u.voice=jaVoice; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
/* 音声ID（テキスト→ファイル名）。事前生成した audio/mi_<id>.mp3（edge-tts等の自然音声）を優先し、無ければ端末TTSにフォールバック */
function djb2(s){ var h=5381; for(var i=0;i<s.length;i++){ h=(((h<<5)+h) ^ s.charCodeAt(i))>>>0; } return h.toString(36); }
var curAudio=null;
function say(text){ if(!text)return;
  try{ if(curAudio){ curAudio.pause(); curAudio=null; } }catch(e){}
  try{ if(TTS_OK) speechSynthesis.cancel(); }catch(e){}
  var id=djb2(norm(text));
  var a=new Audio('audio/mi_'+id+'.mp3'); curAudio=a;
  var fell=false, fb=function(){ if(fell)return; fell=true; sayTTS(text); };
  a.addEventListener('error', fb);
  var pr=a.play(); if(pr&&pr['catch']) pr['catch'](fb);
}
var SR=window.SpeechRecognition||window.webkitSpeechRecognition, VOICE_OK=!!SR, sharedRec=null, activeRec=null;

/* ===== 地図・方向 ===== */
var N=6; // 交差点 0..5（井の字＝格子の道路。広めのマップ）
var DIRS={N:[-1,0],E:[0,1],S:[1,0],W:[0,-1]};
var RIGHT={N:'E',E:'S',S:'W',W:'N'};
var LEFT={N:'W',W:'S',S:'E',E:'N'};
var DIRNAME={N:'北',E:'東',S:'南',W:'西'};
var ANGLE={N:0,E:90,S:180,W:270};
var FACILITIES=[{e:'🏥',n:'病院'},{e:'🏫',n:'学校'},{e:'🏦',n:'銀行'},{e:'🏪',n:'コンビニ'},{e:'🚉',n:'駅'},{e:'🏬',n:'デパート'},{e:'🏤',n:'郵便局'},{e:'🌳',n:'公園'},{e:'🍴',n:'レストラン'},{e:'⛽',n:'ガソリンスタンド'},{e:'🥐',n:'パン屋'},{e:'📚',n:'本屋'}];
var DESTS=FACILITIES;
/* 装飾用の建物・景観（名前は出さない。FACILITIES と絵文字が重ならないよう選定） */
var DECO=['🏠','🏡','🏢','🏨','🏩','🏭','🏯','🏰','⛪','🕌','🏛️','⛩️','🏟️','🌲','⛲','🎡','🅿️','🏙️','☕','🏚️','🌸','🗼','🎭','🏝️'];

var G={}; // ゲーム状態

function keyOf(r,c){return r+','+c;}
function inGrid(r,c){return r>=0&&r<N&&c>=0&&c<N;}

function bfs(start,dest){
  var q=[start], prev={}; prev[keyOf(start[0],start[1])]='';
  while(q.length){
    var cur=q.shift();
    if(cur[0]===dest[0]&&cur[1]===dest[1]) break;
    ['N','E','S','W'].forEach(function(d){
      var nr=cur[0]+DIRS[d][0], nc=cur[1]+DIRS[d][1];
      if(inGrid(nr,nc)&&!(keyOf(nr,nc) in prev)){ prev[keyOf(nr,nc)]=keyOf(cur[0],cur[1]); q.push([nr,nc]); }
    });
  }
  if(!(keyOf(dest[0],dest[1]) in prev)) return null;
  var path=[], k=keyOf(dest[0],dest[1]);
  while(k){ var p=k.split(',').map(Number); path.unshift(p); k=prev[k]; }
  return path;
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function buildActions(p){
  var firstDir=absDir(p[0],p[1]); var heading=firstDir, acts=[], cells=[], turns=0;
  for(var i=0;i<p.length-1;i++){
    var ad=absDir(p[i],p[i+1]);
    var act=(ad===heading)?'straight':(ad===RIGHT[heading])?'right':(ad===LEFT[heading])?'left':'straight';
    if(act!=='straight') turns++;
    acts.push(act); cells.push(p[i]); heading=ad;
  }
  acts.push('stop'); cells.push(p[p.length-1]);
  return {actions:acts, turnCells:cells, firstDir:firstDir, turns:turns};
}
function genScenario(level){
  cancelAnim();
  var minLen=(level==='easy')?4:6, maxLen=(level==='easy')?7:11, minTurns=(level==='easy')?1:2;
  var path=null, start, dest, ba=null, tries=0;
  while(tries++<400){
    start=[Math.floor(Math.random()*N),Math.floor(Math.random()*N)];
    dest=[Math.floor(Math.random()*N),Math.floor(Math.random()*N)];
    if(start[0]===dest[0]&&start[1]===dest[1]) continue;
    var p=bfs(start,dest);
    if(!p||p.length<minLen||p.length>maxLen) continue;
    var b=buildActions(p);
    if(b.turns<minTurns) continue;
    path=p; ba=b; break;
  }
  if(!path){ start=[4,0]; dest=[0,3]; path=bfs(start,dest); ba=buildActions(path); }
  // 信号：やさしい＝ランダム2〜3、上級/超上級＝曲がる交差点すべて（赤信号＝判断ポイント）
  var signals={};
  if(level==='easy'){ var ns=2+Math.floor(Math.random()*2); for(var s=0;s<ns;s++){ var cc=pick(path); signals[keyOf(cc[0],cc[1])]=1; } }
  else { for(var i=0;i<ba.actions.length;i++){ if(ba.actions[i]==='right'||ba.actions[i]==='left') signals[keyOf(ba.turnCells[i][0],ba.turnCells[i][1])]=1; } }
  // 目的地（音声「○○で 止まってください」で指定。地図に目印ピンは付けない＝指示を聞いて止まる）
  var destType=pick(FACILITIES);
  var usedName={}; usedName[destType.n]=1;   // 名前つき施設は重複させない（音声案内の混同を防ぐ→地図に同じ絵は1つだけ）
  var buildings=[];                          // {gr,gc,e,kind,n}  kind:'deco'|'landmark'|'dest'
  var landmarks={};                          // "r,c"(曲がる交差点) -> {e,n}  ← 指示文の目印に使う
  var usedSeg={};
  function segKey(a,b){ return (a[0]<b[0]||(a[0]===b[0]&&a[1]<b[1])) ? (a[0]+','+a[1]+'|'+b[0]+','+b[1]) : (b[0]+','+b[1]+'|'+a[0]+','+a[1]); }
  // 道沿い配置：区間 a-b の t 地点を、道路から垂直に少しずらして置く（道の上には置かない）
  function roadside(a,b,t,d){ d=d||0.30;
    if(a[0]===b[0]){ var c=a[1]+t*(b[1]-a[1]); var o=[]; if(a[0]-1>=0)o.push(-1); if(a[0]<=N-2)o.push(1); return {gr:a[0]+pick(o)*d, gc:c}; }
    var r=a[0]+t*(b[0]-a[0]); var o2=[]; if(a[1]-1>=0)o2.push(-1); if(a[1]<=N-2)o2.push(1); return {gr:r, gc:a[1]+pick(o2)*d}; }

  // 目的地の施設：最後の区間の、目的地寄りの道沿いに置く
  (function(){ var a=path[path.length-2], b=path[path.length-1]; usedSeg[segKey(a,b)]=1;
    var p=roadside(a,b,0.62); buildings.push({gr:p.gr,gc:p.gc,e:destType.e,kind:'dest',n:destType.n}); })();

  // 曲がる目印（名前つき施設）：曲がる交差点の手前の区間の道沿いに置き、指示で名前を言う
  for(var ti=1; ti<ba.actions.length; ti++){
    var a2=ba.actions[ti]; if(a2!=='right'&&a2!=='left') continue;
    if(Math.random()>=0.72) continue;
    var pool=FACILITIES.filter(function(f){return !usedName[f.n];}); if(!pool.length) continue;
    var prev=path[ti-1], cur=path[ti]; var sk=segKey(prev,cur); if(usedSeg[sk]) continue;
    var f=pick(pool); usedName[f.n]=1; usedSeg[sk]=1;
    var p=roadside(prev,cur,0.68); buildings.push({gr:p.gr,gc:p.gc,e:f.e,kind:'landmark',n:f.n});
    landmarks[keyOf(cur[0],cur[1])]={e:f.e,n:f.n};
  }

  // 装飾（名前なし・景観用）：他の区間の道沿いに散らして、通りに店が並ぶ見た目にする
  var allSegs=[]; for(var rr=0;rr<N;rr++){ for(var cc2=0;cc2<N;cc2++){
    if(cc2<N-1) allSegs.push([[rr,cc2],[rr,cc2+1]]);
    if(rr<N-1) allSegs.push([[rr,cc2],[rr+1,cc2]]); } }
  for(var i2=allSegs.length-1;i2>0;i2--){ var j2=Math.floor(Math.random()*(i2+1)); var tmp=allSegs[i2]; allSegs[i2]=allSegs[j2]; allSegs[j2]=tmp; }
  var decoMax=16+Math.floor(Math.random()*6), decoN=0;
  for(var si=0; si<allSegs.length && decoN<decoMax; si++){ var sg=allSegs[si]; var sk2=segKey(sg[0],sg[1]); if(usedSeg[sk2]) continue;
    if(Math.random()<0.55){ usedSeg[sk2]=1; var pp=roadside(sg[0],sg[1],0.35+Math.random()*0.3);
      buildings.push({gr:pp.gr,gc:pp.gc,kind:'deco',horiz:(sg[0][0]===sg[1][0]),col:Math.floor(Math.random()*BLD_COLORS.length),park:(Math.random()<0.16),sz:0.82+Math.random()*0.45}); decoN++; } }

  // 橋：ルートの直進区間のひとつに置く
  var straights=[]; for(var sti=0;sti<ba.actions.length;sti++){ if(ba.actions[sti]==='straight') straights.push(sti); }
  var bridge=null, bridgeStep=-1;
  if(straights.length && Math.random()<0.55){ bridgeStep=pick(straights); bridge={a:path[bridgeStep], b:path[bridgeStep+1]}; }

  G={ level:level, mode:G.mode, path:path, actions:ba.actions, turnCells:ba.turnCells, start:start.slice(), dest:dest,
      firstDir:ba.firstDir, signals:signals, buildings:buildings, landmarks:landmarks, bridge:bridge, bridgeStep:bridgeStep,
      destType:destType, car:{r:start[0],c:start[1],dir:ba.firstDir}, carViz:{r:start[0],c:start[1],ang:ANGLE[ba.firstDir]},
      step:0, done:false, waiting:false };
}

function absDir(a,b){ var dr=b[0]-a[0], dc=b[1]-a[1];
  if(dr===-1)return 'N'; if(dr===1)return 'S'; if(dc===1)return 'E'; if(dc===-1)return 'W'; return 'N'; }

/* ===== 描画（自然な地図＋なめらかなタクシー） ===== */
var MAP_S=340, MAP_M=30, MAP_STEP=(MAP_S-2*MAP_M)/(N-1);
function PX(c){return MAP_M+c*MAP_STEP;}
function PY(r){return MAP_M+r*MAP_STEP;}
var ROAD_W=Math.max(9, MAP_STEP*0.26);
var BLD_COLORS=['#C9BBA6','#BFC7B4','#D2C6B1','#C3C9D2','#CDBBB0','#B7C1C3','#D4C9B2','#C7BCA8'];

/* --- タクシー本体（上向き＝北）。#carG を transform で動かす --- */
function carTransform(){ var v=G.carViz||{r:0,c:0,ang:0}; return 'translate('+PX(v.c).toFixed(2)+','+PY(v.r).toFixed(2)+') rotate('+(v.ang||0).toFixed(1)+')'; }
function carSVG(){
  return '<g id="carG" transform="'+carTransform()+'">'
    +'<ellipse cx="0" cy="1.5" rx="8" ry="12" fill="#000" opacity="0.10"/>'
    +'<rect x="-7" y="-11.5" width="14" height="23" rx="4.5" fill="#F4C21B" stroke="#2A2A2A" stroke-width="1.3"/>'
    +'<rect x="-5" y="-8.4" width="10" height="5.6" rx="1.6" fill="#2A3E50"/>'
    +'<rect x="-5" y="3.2" width="10" height="4.9" rx="1.6" fill="#2A3E50"/>'
    +'<rect x="-3" y="-1.7" width="6" height="3.3" rx="1" fill="#FBF7EA" stroke="#2A2A2A" stroke-width="0.6"/>'
    +'</g>';
}
function positionCar(){ var g=document.getElementById('carG'); if(g) g.setAttribute('transform', carTransform()); }
function easeSS(k){ return k*k*(3-2*k); }
function shortAng(a,b){ return ((b-a)%360+540)%360-180; }
var animRAF=null;
function cancelAnim(){ if(animRAF){ try{cancelAnimationFrame(animRAF);}catch(e){} animRAF=null; } }
function animateMove(fr,fc,fa, tr,tc,ta){
  cancelAnim();
  var dA=shortAng(fa,ta), rotMs=(Math.abs(dA)<1)?0:170, movMs=380, T=rotMs+movMs, t0=null;
  G.carViz={r:fr,c:fc,ang:fa};
  if(typeof requestAnimationFrame==='undefined'){ G.carViz={r:tr,c:tc,ang:ta}; positionCar(); return; }
  function frame(ts){ if(t0==null)t0=ts; var e=ts-t0;
    if(e<rotMs){ G.carViz.ang=fa+dA*easeSS(e/rotMs); }
    else { var k=easeSS(Math.min(1,(e-rotMs)/movMs)); G.carViz.ang=ta; G.carViz.r=fr+(tr-fr)*k; G.carViz.c=fc+(tc-fc)*k; }
    positionCar();
    if(e<T){ animRAF=requestAnimationFrame(frame); } else { animRAF=null; G.carViz={r:tr,c:tc,ang:ta}; positionCar(); }
  }
  animRAF=requestAnimationFrame(frame);
}

function drawMap(){
  var step=MAP_STEP, px=PX, py=PY, rw=ROAD_W, el=[];
  el.push('<svg viewBox="0 0 '+MAP_S+' '+MAP_S+'" role="img" aria-label="地図">');
  el.push('<rect x="0" y="0" width="'+MAP_S+'" height="'+MAP_S+'" fill="#E7E2D5"/>');
  // 区画（ブロック）の土地
  for(var br=0;br<N-1;br++){ for(var bc=0;bc<N-1;bc++){
    el.push('<rect x="'+(px(bc)+rw/2).toFixed(1)+'" y="'+(py(br)+rw/2).toFixed(1)+'" width="'+(step-rw).toFixed(1)+'" height="'+(step-rw).toFixed(1)+'" rx="3" fill="#EDE8DB"/>'); } }
  // 川（橋のある区間の下を横切る）
  if(G.bridge){ var a=G.bridge.a,b=G.bridge.b, mx=(px(a[1])+px(b[1]))/2, my=(py(a[0])+py(b[0]))/2, hz=(a[0]===b[0]);
    if(hz) el.push('<rect x="'+(mx-rw*0.75)+'" y="'+(my-step*0.62)+'" width="'+(rw*1.5)+'" height="'+(step*1.24)+'" rx="3" fill="#AEC8DA"/>');
    else   el.push('<rect x="'+(mx-step*0.62)+'" y="'+(my-rw*0.75)+'" width="'+(step*1.24)+'" height="'+(rw*1.5)+'" rx="3" fill="#AEC8DA"/>'); }
  // 道路：濃い縁（ケーシング）→ 明るい塗り
  function road(x1,y1,x2,y2,w,col){ el.push('<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="'+w+'" stroke-linecap="round"/>'); }
  for(var r=0;r<N;r++) road(px(0),py(r),px(N-1),py(r), rw+4, '#CFC7B6');
  for(var c=0;c<N;c++) road(px(c),py(0),px(c),py(N-1), rw+4, '#CFC7B6');
  for(var r2=0;r2<N;r2++) road(px(0),py(r2),px(N-1),py(r2), rw, '#F6F2E9');
  for(var c2=0;c2<N;c2++) road(px(c2),py(0),px(c2),py(N-1), rw, '#F6F2E9');
  // 橋の欄干
  if(G.bridge){ var a2=G.bridge.a,b2=G.bridge.b, mx2=(px(a2[1])+px(b2[1]))/2, my2=(py(a2[0])+py(b2[0]))/2, hz2=(a2[0]===b2[0]), rl=step*0.5, of=rw*0.62;
    if(hz2){ el.push('<line x1="'+(mx2-rl/2)+'" y1="'+(my2-of)+'" x2="'+(mx2+rl/2)+'" y2="'+(my2-of)+'" stroke="#9A8C74" stroke-width="2"/>');
             el.push('<line x1="'+(mx2-rl/2)+'" y1="'+(my2+of)+'" x2="'+(mx2+rl/2)+'" y2="'+(my2+of)+'" stroke="#9A8C74" stroke-width="2"/>'); }
    else   { el.push('<line x1="'+(mx2-of)+'" y1="'+(my2-rl/2)+'" x2="'+(mx2-of)+'" y2="'+(my2+rl/2)+'" stroke="#9A8C74" stroke-width="2"/>');
             el.push('<line x1="'+(mx2+of)+'" y1="'+(my2-rl/2)+'" x2="'+(mx2+of)+'" y2="'+(my2+rl/2)+'" stroke="#9A8C74" stroke-width="2"/>'); } }
  // 建物
  (G.buildings||[]).forEach(function(bd){
    var x=px(bd.gc), y=py(bd.gr);
    if(bd.kind==='deco'){
      if(bd.park){ var ps=step*0.30*(bd.sz||1);
        el.push('<rect x="'+(x-ps/2)+'" y="'+(y-ps/2)+'" width="'+ps+'" height="'+ps+'" rx="4" fill="#BBD6A6"/>');
        el.push('<circle cx="'+x+'" cy="'+y+'" r="'+(ps*0.24)+'" fill="#8DB877"/>');
      } else { var lng=step*0.34*(bd.sz||1), dep=step*0.22*(bd.sz||1), w=bd.horiz?lng:dep, h=bd.horiz?dep:lng;
        el.push('<rect x="'+(x-w/2)+'" y="'+(y-h/2)+'" width="'+w+'" height="'+h+'" rx="2" fill="'+BLD_COLORS[(bd.col||0)%BLD_COLORS.length]+'" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>'); }
    } else { var s2=step*0.44;
      el.push('<rect x="'+(x-s2/2)+'" y="'+(y-s2/2)+'" width="'+s2+'" height="'+s2+'" rx="5" fill="#FBF7EE" stroke="#B7AB92" stroke-width="1.4"/>');
      el.push('<text x="'+x+'" y="'+(y+s2*0.30)+'" font-size="'+(s2*0.7).toFixed(1)+'" text-anchor="middle">'+bd.e+'</text>'); }
  });
  // 信号（交差点）
  for(var k in G.signals){ var pr=k.split(',').map(Number); el.push('<circle cx="'+px(pr[1])+'" cy="'+py(pr[0])+'" r="4.5" fill="#D64545" stroke="#fff" stroke-width="1.4"/>'); }
  // タクシー
  el.push(carSVG());
  el.push('</svg>');
  $('mapBox').innerHTML=el.join('');
}

/* ===== 指示文（運転手モード） ===== */
/* 曲がる目印：目印施設があれば施設名、なければ信号、どちらもなければ「かど」 */
function landmarkWord(cell){ var k=keyOf(cell[0],cell[1]);
  if(G.landmarks[k]) return G.landmarks[k].n+'の かど';
  if(G.signals[k]) return '信号';
  return 'かど'; }
function instructionText(i){
  var act=G.actions[i], cell=G.turnCells[i];
  if(act==='straight') return (i===G.bridgeStep) ? '橋を 渡ってください。' : 'まっすぐ 行ってください。';
  if(act==='right') return 'つぎの '+landmarkWord(cell)+'を 右に 曲がってください。';
  if(act==='left') return 'つぎの '+landmarkWord(cell)+'を 左に 曲がってください。';
  return G.destType.n+'で 止まってください。'; // 指示者が「○○で止まって」と言う場所で止まればクリア
}
/* 上級：ルート全体を1つの指示にまとめる（連続まっすぐは1つに、橋は明示） */
function fullInstruction(){
  var parts=[], pend=false;
  for(var i=0;i<G.actions.length;i++){
    var a=G.actions[i], cell=G.turnCells[i];
    if(a==='straight'){ if(i===G.bridgeStep){ if(pend){ parts.push('まっすぐ 行って'); pend=false; } parts.push('橋を 渡って'); } else { pend=true; } }
    else if(a==='right'||a==='left'){ if(pend){ parts.push('まっすぐ 行って'); pend=false; } parts.push('つぎの '+landmarkWord(cell)+'を '+(a==='right'?'右':'左')+'に 曲がって'); }
    else { if(pend){ parts.push('まっすぐ 行って'); pend=false; } parts.push(G.destType.n+'で 止まってください'); }
  }
  return parts.join('、');
}

/* 超上級：自動走行エンジン。まっすぐは自動、曲がり角（赤信号）で止まって判断 */
var cruiseTimer=null, CRUISE_MS=620;
function stopCruise(){ if(cruiseTimer){ clearTimeout(cruiseTimer); cruiseTimer=null; } }
function scheduleCruise(){ stopCruise(); G.waiting=false; cruiseTimer=setTimeout(cruiseTick, CRUISE_MS); }
function cruiseTick(){
  cruiseTimer=null;
  if(G.done) return;
  var a=G.actions[G.step];
  if(a==='straight'){
    doMove('straight'); G.step++;
    if(atDest()){ arriveAtDest(); return; }
    if(G.actions[G.step]==='straight') scheduleCruise();
    else arriveAtDecision();
  } else if(a==='stop'){ if(atDest()) arriveAtDest(); else arriveAtDecision(); }
  else { arriveAtDecision(); }
}
function arriveAtDecision(){
  G.waiting=true; stopCruise();
  var a=G.actions[G.step];
  if(G.mode==='driver'){
    var t=(a==='right')?'右に 曲がってください。':(a==='left')?'左に 曲がってください。':'まっすぐ 行ってください。';
    setStatus('🔴 赤信号。'+t, '信号で 止まりました。ボタンで 操作。','ng'); say(t);
  } else {
    setStatus('🔴 赤信号で 止まりました。', 'どちらへ 行きますか？ 話してください。','ng'); say('つぎは どちらへ 行きますか？');
  }
}
/* 超上級：目的地に着いたら、指示どおり「止まる」操作でクリア（自動では終わらせない） */
function arriveAtDest(){
  G.waiting=true; stopCruise();
  if(G.mode==='driver'){ setStatus('🔴 「'+G.destType.n+'」に 着きました。', 'ここで 「✋ 止まる」を おしてください。','ng'); say(G.destType.n+'で 止まってください。'); }
  else { setStatus('🔴 目的地に 着きました。', '「止まって」と 言ってください。','ng'); say(G.destType.n+'で 止まってください。'); }
}
function resumeAfter(){
  if(atDest()){ arriveAtDest(); return; }
  if(G.actions[G.step]==='straight'){ setStatus('🟢 まっすぐ 進みます…',''); scheduleCruise(); }
  else arriveAtDecision();
}

/* ===== 移動 ===== */
function doMove(act){
  // act: straight/left/right → 向きを変えて1マス前進。論理状態は即更新し、見た目はなめらかにアニメ
  var dir=G.car.dir;
  if(act==='right') dir=RIGHT[dir];
  else if(act==='left') dir=LEFT[dir];
  var nr=G.car.r+DIRS[dir][0], nc=G.car.c+DIRS[dir][1];
  if(!inGrid(nr,nc)) return false;
  var v=G.carViz||{r:G.car.r,c:G.car.c,ang:ANGLE[G.car.dir]};
  var fr=v.r, fc=v.c, fa=v.ang;               // いま見えている位置から
  G.car.dir=dir; G.car.r=nr; G.car.c=nc;      // 論理位置を更新
  animateMove(fr,fc,fa, nr,nc, ANGLE[dir]);   // なめらかに移動
  return true;
}
function atDest(){ return G.car.r===G.dest[0] && G.car.c===G.dest[1]; }

/* ===== 画面遷移 ===== */
function show(id){ ['home','play','win'].forEach(function(s){ $(s).classList.toggle('hidden', s!==id); }); window.scrollTo({top:0}); }

/* ===== 運転手モード ===== */
function startDriver(){
  stopCruise(); genScenario(LV_SEL);
  $('driverCtrl').classList.remove('hidden'); $('passCtrl').classList.add('hidden');
  drawMap(); show('play');
  if(LV_SEL==='easy'){
    setStatus('「'+G.destType.n+'まで お願いします。」', '');
    setTimeout(function(){ nextDriverStep(true); }, 700);
  } else if(LV_SEL==='advanced'){
    setStatus('🔊 指示を 全部 聞いて、覚えて 動かしましょう。', 'もう一度 聞くときは 🔊 を おしてください。');
    setTimeout(function(){ say(G.destType.n+'まで。'+fullInstruction()); }, 600);
  } else {
    setStatus('🚗 出発！ 車は まっすぐ 進み続けます。', '赤信号（曲がり角）で 止まったら 操作します。');
    say(G.destType.n+'まで お願いします。'); scheduleCruise();
  }
}
function nextDriverStep(first){
  var t=instructionText(G.step);
  if(G.actions[G.step]==='stop'){ setStatus(t, 'ここで 「✋ 止まる」を おしてください。'); say(t); return; }
  setStatus(t, '指示を 聞いて、ボタンを おしてください。'); say(t);
}
function driverAction(act){
  if(G.done) return;
  if(G.level==='super'){
    if(!G.waiting){ setStatus('🚗 走行中… 赤信号で 止まってから 操作してください。',''); return; }
    var need=G.actions[G.step];
    if(need==='stop'){ if(act==='stop'&&atDest()){winRound();return;} setStatus('まだ 目的地では ありません。','','ng'); return; }
    if(act==='stop'){ setStatus('赤信号です。曲がるか まっすぐか えらんでください。','','ng'); return; }
    if(act===need){ G.waiting=false; doMove(need); G.step++;
      say(need==='right'?'右に 曲がります。':need==='left'?'左に 曲がります。':'まっすぐ 行きます。'); resumeAfter(); }
    else { setStatus('ちがう みたい。もう一度 聞いてね。','','ng'); say('あれ？ ちがう みたいです。'); }
    return;
  }
  var expected=G.actions[G.step];
  if(act==='stop'){
    if(expected==='stop' && atDest()){ winRound(); return; }
    setStatus('まだ 目的地では ありません。', '案内の とおりに 進みましょう。','ng'); say('まだ 目的地では ありませんよ。'); return;
  }
  if(expected==='stop'){ setStatus('「'+G.destType.n+'」の 前です。', '「✋ 止まる」を おしてください。'); return; }
  if(act===expected){
    doMove(act); G.step++;
    var prompt=(G.level==='easy');
    if(G.actions[G.step]==='stop'){ setStatus(prompt?instructionText(G.step):('「'+G.destType.n+'」の 前です。'), 'ここで 「✋ 止まる」を おしてください。'); if(prompt) say(instructionText(G.step)); }
    else { if(prompt) nextDriverStep(false); else setStatus('🟢 つづけて どうぞ。','覚えた 指示の とおりに 操作。'); }
  } else {
    setStatus('ちがう みたい。もう一度。', G.level==='easy'?'🔊で もう一度 聞けます。':'🔊で 全部 聞き直せます。','ng'); say('あれ？ ちがう みたいです。');
  }
}

/* ===== 客モード ===== */
function startPassenger(){
  stopCruise(); genScenario(LV_SEL);
  $('passCtrl').classList.remove('hidden'); $('driverCtrl').classList.add('hidden');
  $('log').innerHTML='';
  drawMap(); show('play');
  if(LV_SEL==='super'){
    setStatus('🚗 車は 走り続けます。赤信号で 止まります。', '赤信号で 曲がる方向を 話してください（目的地：'+G.destType.n+'）。');
    say(G.destType.n+'まで、赤信号で 教えてください。'); scheduleCruise();
  } else {
    setStatus(G.destType.e+' '+G.destType.n+'まで 案内してください。', '運転手に 指示を 話しましょう（今 '+DIRNAME[G.car.dir]+'むき）。');
    say(G.destType.n+'まで、道を 教えてください。');
  }
}
function parseInstruction(text){
  var t=norm(text);
  if(!t) return null;
  if(/とまっ|とま[るり]|ていし|すとっ|とめ|止/.test(t)) return 'stop';
  if(/みぎ|右/.test(t)) return 'right';
  if(/ひだり|左/.test(t)) return 'left';
  if(/まっすぐ|ちょくしん|直進|すすん|進ん|すすめ|まえ|前/.test(t)) return 'straight';
  if(/まがっ|曲がっ|まがる|曲がる/.test(t)) return 'turn?'; // 方向不明
  return null;
}
function logLine(s){ var l=$('log'); l.innerHTML += '<div>'+esc(s)+'</div>'; l.scrollTop=l.scrollHeight; }
function passengerHeard(raw){
  logLine('🗣️ '+raw);
  var act=parseInstruction(raw);
  if(!act){ setStatus('うまく 聞き取れませんでした。', 'もう一度 話してください。','ng'); say('もう一度 お願いします。'); return; }
  if(act==='turn?'){ setStatus('右ですか、左ですか？', '「右に 曲がって」のように 言ってください。','ng'); say('右ですか、左ですか？'); return; }
  if(G.level==='super'){
    if(!G.waiting){ setStatus('🚗 走行中です。','赤信号で 止まってから 話してください。','ng'); return; }
    var need=G.actions[G.step];
    if(act==='stop'){ if(need==='stop'&&atDest()) winRound(); else { setStatus('まだ 赤信号です。','曲がる方向を 話してください。','ng'); say('まだ ちがいます。'); } return; }
    if(act===need){ G.waiting=false; doMove(need);
      say(need==='right'?'右に 曲がります。':need==='left'?'左に 曲がります。':'まっすぐ 行きます。'); G.step++; resumeAfter(); }
    else { setStatus('そちらでは 目的地に つきません。','地図を 見て、もう一度 どうぞ。','ng'); say('そちらでは ありません。'); }
    return;
  }
  if(act==='stop'){
    if(atDest()){ winRound(); }
    else { setStatus('ここは 目的地では ありません。', 'まだ 案内を つづけてください。','ng'); say('ここは まだ ちがいます。'); }
    return;
  }
  var moved=doMove(act);
  if(!moved){ setStatus('その方向には 道が ありません。', 'べつの 指示を 話してください。','ng'); say('そちらには 行けません。'); return; }
  var conf = act==='right'?'右に 曲がります。' : act==='left'?'左に 曲がります。' : 'まっすぐ 行きます。';
  if(atDest()) setStatus(conf, '「'+G.destType.n+'」に 着きました。「止まって」と 言ってください。');
  else setStatus(conf, '今 '+DIRNAME[G.car.dir]+'むき。つぎの 指示を どうぞ。');
  say(conf);
}
function startVoice(){
  if(!VOICE_OK){ setStatus('この端末は 音声入力に 対応していません。', '','ng'); return; }
  var mic=$('micBtn');
  if(activeRec){ try{activeRec.stop();}catch(e){} return; }
  var rec=sharedRec; if(!rec){ try{rec=new SR();}catch(e){return;} rec.lang='ja-JP'; rec.interimResults=false; rec.maxAlternatives=1; sharedRec=rec; }
  var got=false;
  rec.onresult=function(e){ got=true; var raw=(e.results[0][0].transcript||'').trim(); passengerHeard(raw); };
  rec.onerror=function(e){ if(e.error==='no-speech') $('subStatus').textContent='声が 聞き取れませんでした。もう一度どうぞ。'; };
  rec.onend=function(){ activeRec=null; mic.classList.remove('listening'); mic.textContent='🎤 指示を話す'; };
  activeRec=rec; mic.classList.add('listening'); mic.textContent='● きいています…';
  try{ rec.start(); }catch(e){ activeRec=null; mic.classList.remove('listening'); mic.textContent='🎤 指示を話す'; }
}

/* ===== 共通 ===== */
function setStatus(main, sub, cls){ var s=$('status'); s.textContent=main; s.className='status'+(cls?' '+cls:''); $('subStatus').textContent=sub||''; }
function winRound(){
  G.done=true; stopCruise(); cancelAnim();
  try{ if(activeRec) activeRec.stop(); }catch(e){}
  $('winMsg').textContent='🎉 '+G.destType.n+'に つきました！';
  $('aiComment').classList.add('hidden');
  show('win');
  say('おめでとうございます。'+G.destType.n+'に つきました。');
  geminiComment();
}

/* ===== Gemini（任意コメント） ===== */
var MODEL="gemini-3.5-flash";
var ENDPOINT="https://generativelanguage.googleapis.com/v1beta/models/"+MODEL+":generateContent";
function geminiComment(){
  var key=($('key').value||'').trim();
  if(!key) return;
  var role = (G.mode==='driver')?'運転手':'客（道案内する人）';
  var sys="あなたは日本語学習ゲームの明るいコーチです。学習者が道案内ゲームをクリアしました。日本語で1文、20〜35字くらいで、やさしくほめてください。絵文字は1つまで。ローマ字や英語は使わない。";
  var user="役割は「"+role+"」。目的地は「"+G.destType.n+"」でした。短くほめて。";
  var body={ systemInstruction:{parts:[{text:sys}]}, contents:[{role:'user',parts:[{text:user}]}], generationConfig:{temperature:0.9,maxOutputTokens:80} };
  fetch(ENDPOINT+"?key="+encodeURIComponent(key),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
   .then(function(res){return res.json();})
   .then(function(d){ var t=""; try{t=d.candidates[0].content.parts[0].text.trim();}catch(e){} if(t){ var c=$('aiComment'); c.textContent='🤖 '+t; c.classList.remove('hidden'); } })
   .catch(function(){});
}

/* ===== 起動・イベント ===== */
var MODE_NOTE={
  driver:'客（AI）の 指示を 聞いて、ボタンで 車を 目的地まで 動かします。聞き取りの 練習。',
  passenger:'あなたが 運転手（AI）に 音声で 指示を 出して、目的地まで 案内します。話す 練習。'
};
var LEVEL_NOTE={
  easy:'やさしい：1つずつ 指示。ゆっくり ターン制。',
  advanced:'上級：ルート全体を まとめて 聞き、覚えて 動かす。道は 長め。',
  super:'超上級：車は まっすぐ 走り続け、赤信号（曲がり角）で 止まって 判断。'
};
var LV_SEL='easy';
G.mode='driver';
function setMode(m){ G.mode=m; $('modeSeg').querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.dataset.mode===m); }); $('modeNote').textContent=MODE_NOTE[m]; store.set('michi_mode',m); }
function setLevel(l){ LV_SEL=l; $('levelSeg').querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.dataset.level===l); }); $('levelNote').textContent=LEVEL_NOTE[l]; store.set('michi_level',l); }
$('modeSeg').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ setMode(b.dataset.mode); }; });
$('levelSeg').querySelectorAll('button').forEach(function(b){ b.onclick=function(){ setLevel(b.dataset.level); }; });

function startGame(){ if(G.mode==='driver') startDriver(); else startPassenger(); }
function leavePlay(){ stopCruise(); cancelAnim(); try{if(activeRec)activeRec.stop();}catch(e){} try{speechSynthesis.cancel();}catch(e){} }
$('startBtn').onclick=startGame;
$('driverCtrl').querySelectorAll('button[data-act]').forEach(function(b){ b.onclick=function(){ driverAction(b.dataset.act); }; });
$('repeatBtn').onclick=function(){
  if(G.level==='advanced') say(G.destType.n+'まで。'+fullInstruction());
  else if(G.level==='super'){ var a=G.actions[G.step]; say(a==='right'?'右に 曲がってください。':a==='left'?'左に 曲がってください。':a==='stop'?(G.destType.n+'で 止まってください。'):'まっすぐ 行ってください。'); }
  else say(instructionText(G.step));
};
$('micBtn').onclick=startVoice;
$('newBtn').onclick=function(){ leavePlay(); startGame(); };
$('homeBtn').onclick=function(){ leavePlay(); show('home'); };
$('againBtn').onclick=function(){ leavePlay(); startGame(); };
$('win2home').onclick=function(){ leavePlay(); show('home'); };
$('backBtn').onclick=function(){ if(!$('play').classList.contains('hidden')||!$('win').classList.contains('hidden')){ leavePlay(); show('home'); } else { location.href='games.html'; } };

var sk=store.get('gemini_key'); if(sk) $('key').value=sk;
function refreshKey(){ var has=($('key').value||'').trim().length>0; var el=$('keyState'); el.textContent=has?'✓ キーを保存しました（この端末のみ）':'任意です。無くても遊べます。'; el.className='keystate '+(has?'ok':'no'); }
$('key').addEventListener('input',function(){ store.set('gemini_key',($('key').value||'').trim()); refreshKey(); });
refreshKey();

var savedMode=store.get('michi_mode'); setMode(savedMode==='passenger'?'passenger':'driver');
var savedLevel=store.get('michi_level'); setLevel((savedLevel==='advanced'||savedLevel==='super')?savedLevel:'easy');
</script>
</body>
</html>
