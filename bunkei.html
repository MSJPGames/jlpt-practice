  .back-link {

  .search-input {
    width: 100%;
    font-family: inherit; font-size: 15px; color: var(--text);
    background: var(--surface);

    padding-bottom: 2px;
    scrollbar-width: none;

    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .chip:hover { border-color: #cfc9c0; }
  .chip.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }

  .result-count {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;

/* ---------- ユーティリティ ---------- */
// カタカナ→ひらがな
function kataToHira(s){ return s.replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60)); }
// 検索用に記号などを落として正規化
function norm(s){
  return kataToHira(String(s))
    .replace(/[\s　～〜~<>＜＞〈〉（）()「」『』｜|・、,\.。／\/＋+－\-]/g, "")
    .toLowerCase();
}

const qEl = document.getElementById("q");
const clearEl = document.getElementById("clear");
const chipsEl = document.getElementById("chips");
const countEl = document.getElementById("count");
const resultsEl = document.getElementById("results");

let activeBook = "all"; // "all" または textbook.id

/* ---------- チップ生成 ---------- */
function buildChips(){
  const items = [{ id: "all", label: "すべて" }].concat(TEXTBOOKS.map(b => ({ id: b.id, label: b.short })));
  chipsEl.innerHTML = "";
  items.forEach(it => {
    const c = document.createElement("button");
    c.className = "chip" + (it.id === activeBook ? " active" : "");
    c.textContent = it.label;
    c.onclick = () => { activeBook = it.id; buildChips(); render(); };
    chipsEl.appendChild(c);
  });
}

/* ---------- ハイライト ---------- */
function highlight(text, normQuery){
  if(!normQuery) return escapeHtml(text);
  // 元の文字列を1文字ずつ見て、正規化後の位置がマッチ範囲に入るか判定
  const chars = [...text];
  const map = []; // 各元文字が正規化文字列で占める開始index（落とされた文字は-1）
  let normStr = "";
  for(const ch of chars){
    const n = norm(ch);
    if(n === ""){ map.push(-1); }
    else { map.push(normStr.length); normStr += n; }
  }
  const start = normStr.indexOf(normQuery);
  if(start < 0) return escapeHtml(text);
  const end = start + normQuery.length; // [start, end)
  let out = "", inMark = false;
  for(let i=0;i<chars.length;i++){
    const pos = map[i];
    const on = (pos >= start && pos < end);
    if(on && !inMark){ out += "<mark>"; inMark = true; }
    if(!on && inMark){ out += "</mark>"; inMark = false; }
    out += escapeHtml(chars[i]);
  }
  if(inMark) out += "</mark>";
  return out;
}
function escapeHtml(s){ return s.replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

/* ---------- 描画 ---------- */
function render(){
  const raw = qEl.value.trim();
  clearEl.classList.toggle("show", raw.length > 0);

  // 課番号の抽出（「15」「15課」など）
  const numMatch = raw.match(/(\d+)/);
  const lessonNum = numMatch ? parseInt(numMatch[1], 10) : null;
  const textQuery = norm(raw.replace(/\d+\s*課?/g, ""));

  let total = 0;
  let html = "";

  for(const book of TEXTBOOKS){
    if(activeBook !== "all" && activeBook !== book.id) continue;

    let bookHtml = "";
    let bookCount = 0;

    for(const lesson of book.lessons){
      if(lessonNum !== null && lesson.l !== lessonNum) continue;

      const matched = lesson.p.filter(p => textQuery === "" || norm(p).includes(textQuery));
      if(matched.length === 0) continue;

      let rows = "";
      for(const p of matched){
        rows += '<div class="pattern-row"><span class="dot">●</span><span>' + highlight(p, textQuery) + '</span></div>';
      }
      bookHtml +=
        '<div class="lesson-card">' +
          '<div class="lesson-head">' +
            '<span class="lesson-badge" style="background:'+book.badgeBg+';color:'+book.accent+'">第'+lesson.l+'課</span>' +
            '<span class="lesson-label">'+matched.length+'つの文型</span>' +
          '</div>' + rows +
        '</div>';
      bookCount += matched.length;
    }

    if(bookCount === 0) continue;
    total += bookCount;
    html +=
      '<div class="book-section">' +
        '<div class="book-head">' +
          '<span class="book-bar" style="background:'+book.accent+'"></span>' +
          '<span class="book-title">'+book.name+'</span>' +
          '<span class="book-num">'+bookCount+'件</span>' +
        '</div>' + bookHtml +
      '</div>';
  }

  if(total === 0){
    countEl.textContent = "";
    resultsEl.innerHTML =
      '<div class="empty"><div class="big">🔍</div>該当する文型が見つかりませんでした。<br>ことば（例：たい、て形）や課番号（例：15）でお試しください。</div>';
  } else {
    countEl.textContent = (raw ? "検索結果 " : "ぜんぶで ") + total + " 件";
    resultsEl.innerHTML = html;
  }
}

/* ---------- イベント ---------- */
qEl.addEventListener("input", render);
clearEl.addEventListener("click", () => { qEl.value = ""; qEl.focus(); render(); });

buildChips();
render();
</script>
</body>
</html>
