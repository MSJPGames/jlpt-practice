<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言語の基礎 ・ 日本語の部屋</title>
<style>
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --border: #E2DDD6;
    --text: #1C1C1C; --text-muted: #6B6560; --text-hint: #9E9890;
    --radius: 14px; --radius-sm: 10px;
    --accent: #2F7168; --accent-bg: #DDEEE7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 1rem 3rem;
  }
  .container { max-width: 520px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; gap: 8px; padding: 14px 0 2px; flex-wrap: wrap; }
  .back-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 700; color: var(--text-muted); text-decoration: none;
    padding: 6px 13px 6px 9px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface); -webkit-tap-highlight-color: transparent; transition: transform 0.12s;
  }
  .back-link:active { transform: scale(0.97); }
  .back-arrow { font-size: 16px; line-height: 1; }

  .lang-header {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-left: 5px solid var(--accent); border-radius: var(--radius);
    padding: 16px; margin-top: 1rem;
  }
  .lh-chip {
    min-width: 56px; height: 56px; padding: 0 10px; border-radius: 14px;
    background: var(--accent-bg); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; flex-shrink: 0; white-space: nowrap;
  }
  .lh-name { flex: 1; min-width: 0; }
  .lh-jp { font-size: 20px; font-weight: 700; }
  .lh-native { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .lh-native .en { color: var(--text-hint); }

  .facts { display: grid; grid-template-columns: auto 1fr; gap: 5px 12px; margin-top: 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; font-size: 12.5px; }
  .facts dt { color: var(--text-hint); font-weight: 700; white-space: nowrap; }
  .facts dd { color: var(--text); line-height: 1.5; }
  .facts .tagrow { display: flex; flex-wrap: wrap; gap: 5px; }
  .ftag { font-size: 10.5px; font-weight: 700; padding: 2px 9px; border-radius: 20px; background: var(--accent-bg); color: var(--accent); }
  .ftag.g { background: #F0EEE8; color: var(--text-hint); }

  .sec-head { display: flex; align-items: center; gap: 9px; margin: 1.8rem 0 0.7rem; }
  .sec-bar { width: 4px; height: 18px; border-radius: 2px; background: var(--accent); }
  .sec-title { font-size: 15px; font-weight: 700; }
  .sec-en { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-hint); text-transform: uppercase; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 4px; }

  /* フレーズ行 */
  .prow { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .prow:last-child { border-bottom: none; }
  .p-ja { font-size: 11.5px; color: var(--text-hint); min-width: 74px; flex-shrink: 0; }
  .p-main { flex: 1; min-width: 0; }
  .p-native { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .p-kana { font-size: 11.5px; color: var(--text-hint); margin-top: 1px; }
  .say {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface); color: var(--accent);
    font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center; transition: transform 0.1s, background 0.1s;
  }
  .say:active { transform: scale(0.9); }
  .say.playing { background: var(--accent-bg); }

  /* 数字グリッド */
  .numgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .num {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px;
  }
  .num-i { width: 24px; height: 24px; border-radius: 7px; background: var(--accent-bg); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .num-main { flex: 1; min-width: 0; }
  .num-native { font-size: 14.5px; font-weight: 700; }
  .num-kana { font-size: 10.5px; color: var(--text-hint); }
  .num .say { width: 30px; height: 30px; font-size: 13px; }

  .tips { list-style: none; }
  .tips li { font-size: 13px; line-height: 1.7; padding: 4px 12px 4px 25px; position: relative; }
  .tips li::before { content: ''; position: absolute; left: 12px; top: 12px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  .hint { font-size: 11px; color: var(--text-hint); margin: 8px 2px 0; line-height: 1.6; }

  /* 支援リンク */
  .links { display: flex; flex-direction: column; gap: 9px; }
  .link {
    display: flex; align-items: center; gap: 11px; text-decoration: none; color: inherit;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px;
    -webkit-tap-highlight-color: transparent; transition: transform 0.12s, box-shadow 0.12s;
  }
  .link:active { transform: scale(0.99); }
  .link:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
  .link-ic { width: 34px; height: 34px; border-radius: 9px; background: var(--accent-bg); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .link-t { flex: 1; min-width: 0; }
  .link-n { font-size: 13.5px; font-weight: 700; }
  .link-d { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; line-height: 1.4; }
  .link-a { color: var(--text-hint); font-size: 18px; }

  .moji-cta {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin-top: 14px; text-decoration: none; color: inherit;
    background: var(--accent-bg); border: 1px solid var(--accent); border-radius: var(--radius);
    padding: 13px 16px; -webkit-tap-highlight-color: transparent; transition: transform 0.12s, box-shadow 0.12s;
  }
  .moji-cta:active { transform: scale(0.99); }
  .moji-cta:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
  .moji-cta .mc-t { font-size: 14px; font-weight: 700; color: var(--accent); }
  .moji-cta .mc-d { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
  .moji-cta .mc-a { color: var(--accent); font-size: 20px; }
  .app-footer { text-align: center; font-size: 11px; color: var(--text-hint); margin-top: 2.4rem; line-height: 1.8; }
  .notfound { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; margin-top: 1.5rem; color: var(--text-muted); }
  .bp{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:12px;padding:12px 13px;margin-bottom:8px;}
  .bp-h{display:flex;align-items:center;gap:8px;}
  .bp-chip{width:26px;height:26px;border-radius:8px;background:var(--accent-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .bp-t{font-size:13px;font-weight:700;}
  .bp-native{font-size:16px;font-weight:700;margin-top:8px;line-height:1.45;}
  .bp-read{font-size:11.5px;color:var(--text-hint);margin-top:1px;}
  .bp-ja{font-size:12px;color:var(--text-muted);margin-top:3px;}
  .bp-note{font-size:11.5px;color:var(--text-muted);margin-top:7px;background:var(--accent-bg);border-radius:8px;padding:6px 9px;line-height:1.55;}
  .bp-link{display:inline-flex;align-items:center;gap:5px;margin-top:4px;font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-bg);border-radius:999px;padding:7px 13px;text-decoration:none;}
  .bp-legend{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin:2px 0 10px;font-size:11px;color:var(--text-hint);}
  .pw{font-weight:700;border-radius:4px;padding:0 3px;}
  .pw-S{color:#155FA8;background:#DCEAF7;}
  .pw-V{color:#B5430F;background:#FBE3D3;}
  .pw-O{color:#0C7268;background:#D3EEE9;}
  .pw-C{color:#824099;background:#EFE0F5;}
  .pw-P{color:#8C6210;background:#F6E9C8;}
  .bp-extra{margin-top:9px;padding-top:8px;border-top:1px dashed var(--border);}
  .bp-ex-label{font-size:10.5px;font-weight:700;color:var(--accent);margin-bottom:3px;}
  .tone-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:2px;}
  .tone-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 10px 9px;}
  .tone-head{display:flex;align-items:baseline;justify-content:space-between;gap:6px;}
  .tone-name{font-size:12px;font-weight:700;color:var(--accent);}
  .tone-mark{font-size:15px;color:var(--text-muted);letter-spacing:-1px;}
  .tone-svg{width:100%;height:auto;display:block;margin:5px 0 3px;}
  .tref{stroke:#EEEAE3;stroke-width:1;}
  .tpath{fill:none;stroke:var(--accent);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;}
  .tdot{fill:var(--accent);}
  .tone-ex{font-size:14px;line-height:1.35;text-align:center;}
  .tone-ex .tr{color:var(--text-muted);font-size:12px;}
  .tone-ex .tm{color:var(--text-hint);font-size:11px;}
  .tone-btns{display:flex;gap:6px;margin-top:7px;}
  .tone-btn{flex:1;font-family:inherit;font-size:11.5px;font-weight:700;border:1px solid var(--border);background:#F2EFE9;color:var(--text-muted);border-radius:999px;padding:6px 3px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s;}
  .tone-btn:active{transform:scale(.95);}
  .conj-sub{font-size:12px;font-weight:700;color:var(--text-muted);margin:16px 2px 5px;}
  .conj-verb{margin-top:10px;}
  .conj-h{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
  .conj-inf{font-size:15px;font-weight:700;color:var(--accent);}
  .conj-mean{font-size:12px;color:var(--text-muted);}
  .conj-grp{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-bg);border-radius:6px;padding:1px 7px;}
  .conj-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:10px;}
  .conj-table{border-collapse:collapse;width:100%;min-width:360px;font-size:11.5px;}
  .conj-table th,.conj-table td{padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  .conj-table thead th{background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:700;line-height:1.25;}
  .conj-table thead .tn2{font-weight:400;font-size:9.5px;color:var(--text-muted);}
  .conj-table tbody th{color:var(--text-hint);font-weight:600;font-size:11px;}
  .conj-table tbody tr:last-child td,.conj-table tbody tr:last-child th{border-bottom:none;}
  .conj-table td.cf{cursor:pointer;}
  .conj-table td.cf:active{background:var(--accent-bg);}
  .conj-t2label{font-size:11px;font-weight:700;color:var(--text-hint);margin:9px 2px 3px;}
  .cj-tabs{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 7px;}
  .cj-tab{font-family:inherit;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);border-radius:999px;padding:5px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s;}
  .cj-tab:active{transform:scale(.96);}
  .cj-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .cj-view[hidden]{display:none;}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="topbar">
    <a href="gaikokugo.html" class="back-link"><span class="back-arrow">‹</span>一覧へ</a>
    <a href="index.html" class="back-link">ホーム<span class="en" style="color:inherit;margin-left:3px;">/ Home</span></a>
  </div>
  <div id="content"></div>
  <div class="app-footer">© 2025 日本語の部屋</div>
</div>

<script src="langdata.js"></script>
<script src="patterns.js"></script>
<script src="tones.js"></script>
<script src="conjug.js"></script>
<script>
/* ---- 音声読み上げ（Web Speech API） ---- */
function speak(text, lang, btn){
  if(!('speechSynthesis' in window)){ return; }
  try{
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = 0.9;
    if(btn){ btn.classList.add('playing'); u.onend = function(){ btn.classList.remove('playing'); }; u.onerror = function(){ btn.classList.remove('playing'); }; }
    window.speechSynthesis.speak(u);
  }catch(e){}
}
window.__speak = speak;
window.__tone = function(str){
  try{
    if(!window.__actx){ window.__actx = new (window.AudioContext||window.webkitAudioContext)(); }
    var c=window.__actx; if(c.state==='suspended') c.resume();
    var pts=str.split(',').map(Number);
    var o=c.createOscillator(), g=c.createGain(); o.type='sine';
    var t0=c.currentTime, dur=0.78, f=function(p){ return 196*Math.pow(330/196,(p-1)/4); };
    o.frequency.setValueAtTime(f(pts[0]), t0);
    if(pts.length<2){ o.frequency.setValueAtTime(f(pts[0]), t0+dur); }
    else { for(var i=1;i<pts.length;i++){ o.frequency.linearRampToValueAtTime(f(pts[i]), t0+dur*i/(pts.length-1)); } }
    g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.3,t0+0.03);
    g.gain.setValueAtTime(0.3,t0+dur-0.08); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g); g.connect(c.destination); o.start(t0); o.stop(t0+dur+0.03);
  }catch(e){}
};

/* ---- パラメータから言語を特定 ---- */
function getParam(name){
  var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
  return m ? decodeURIComponent(m[1]) : null;
}
var code = getParam('code');
var L = (window.LANGS || []).filter(function(x){ return x.code === code; })[0];
var content = document.getElementById('content');

if(!L){
  document.title = '言語が見つかりません ・ 日本語の部屋';
  content.innerHTML = '<div class="notfound">言語が指定されていません。<br><a href="gaikokugo.html" style="color:#2F7168;font-weight:700;">一覧から選んでください ›</a></div>';
} else {
  document.title = L.jp + ' の基礎 ・ 日本語の部屋';
  document.documentElement.style.setProperty('--accent', L.accent);
  document.documentElement.style.setProperty('--accent-bg', L.bg);

  var esc = function(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
  var sayBtn = function(text){ return '<button type="button" class="say" aria-label="読み上げ" onclick="__speak(\'' + esc(text).replace(/'/g,'\\\'') + '\',\'' + L.tts + '\',this)">🔊</button>'; };

  var tags = '';
  if(L.core) tags += '<span class="ftag">重点5言語</span>';
  if(L.resRank) tags += '<span class="ftag g">在留' + L.resRank + '</span>';
  if(L.learnRank) tags += '<span class="ftag g">学習者' + L.learnRank + '</span>';

  var phrasesHtml = L.phrases.map(function(p){
    return '<div class="prow"><div class="p-ja">' + esc(p[0]) + '</div>'
      + '<div class="p-main"><div class="p-native">' + esc(p[1]) + '</div><div class="p-kana">' + esc(p[2]) + '</div></div>'
      + sayBtn(p[1]) + '</div>';
  }).join('');

  var numsHtml = L.numbers.map(function(n, i){
    return '<div class="num"><div class="num-i">' + (i+1) + '</div>'
      + '<div class="num-main"><div class="num-native">' + esc(n[0]) + '</div><div class="num-kana">' + esc(n[1]) + '</div></div>'
      + sayBtn(n[0]) + '</div>';
  }).join('');

  var introHtml = L.selfintro.map(function(p){
    return '<div class="prow"><div class="p-ja">' + esc(p[0]) + '</div>'
      + '<div class="p-main"><div class="p-native">' + esc(p[1]) + '</div><div class="p-kana">' + esc(p[2]) + '</div></div>'
      + sayBtn(p[1]) + '</div>';
  }).join('');

  var tipsHtml = L.tips.map(function(t){ return '<li>' + esc(t) + '</li>'; }).join('');

  var supportHtml =
      link('https://www.moj.go.jp/isa/support/portal/index.html', '外国人生活支援ポータルサイト', '入管庁。生活のルールや手続きを多言語で案内')
    + link('https://www.moj.go.jp/isa/support/portal/guidebook_all.html', '生活・就労ガイドブック（多言語）', '入管庁。各言語版をダウンロードできる')
    + link('https://casta-net.mext.go.jp/', 'かすたねっと（文部科学省）', '外国人の子ども向け教材・多言語の学校文書を検索');

  var P = (window.PATTERNS||{})[code];
  var patHtml = '';
  if(P){
    var colorize = function(str){ var out='', re=/\{([SVOCP])\|([^}]*)\}/g, last=0, m; while((m=re.exec(str))){ out+=esc(str.slice(last,m.index)); out+='<span class="pw pw-'+m[1]+'">'+esc(m[2])+'</span>'; last=m.index+m[0].length; } out+=esc(str.slice(last)); return out; };
    var pt=[['名','名詞文','meishi'],['動','動詞文','doushi'],['形','形容詞文','keiyo']];
    patHtml = '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">基本文型</span><span class="sec-en">Basic sentences</span></div>'
      + '<div class="bp-legend">色分け：<span class="pw pw-S">主語</span><span class="pw pw-V">述語（動詞）</span><span class="pw pw-O">目的語</span><span class="pw pw-C">コピュラ</span><span class="pw pw-P">補語</span></div>'
      + pt.map(function(t){ var d=P[t[2]]; if(!d) return '';
          var rd = d[1] ? '<div class="bp-read">'+esc(d[1])+'</div>' : '';
          var ex = d[4] ? ('<div class="bp-extra"><div class="bp-ex-label">＋ '+esc(d[4].label)+'</div><div class="bp-native">'+colorize(d[4].native)+'</div>'+(d[4].read?'<div class="bp-read">'+esc(d[4].read)+'</div>':'')+'<div class="bp-ja">'+colorize(d[4].ja)+'</div><div class="bp-note">'+esc(d[4].note)+'</div></div>') : '';
          return '<div class="bp"><div class="bp-h"><span class="bp-chip">'+t[0]+'</span><span class="bp-t">'+t[1]+'</span></div>'
            + '<div class="bp-native">'+colorize(d[0])+'</div>'+rd
            + '<div class="bp-ja">'+colorize(d[2])+'</div><div class="bp-note">'+esc(d[3])+'</div>'+ex+'</div>'; }).join('')
      + '<a class="bp-link" href="kihon_bunkei.html">日本語の基本文型と見くらべる ›</a>';
  }
  var TN = (window.TONES||{})[code];
  var toneHtml = '';
  if(TN){
    toneHtml = '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">声調</span><span class="sec-en">Tones</span></div>'
      + '<div class="hint">' + esc(TN.system) + ' ・ ' + esc(TN.note) + '</div>'
      + '<div class="tone-wrap">'
      + TN.tones.map(function(t){
          var pts=t.contour, n=pts.length;
          var px=function(i){ return (n>1)?(12+72*i/(n-1)):48; };
          var py=function(i){ return 46-(pts[i]-1)*8; };
          var poly=''; for(var i=0;i<n;i++){ poly+=(i?' L':'M')+px(i).toFixed(1)+' '+py(i).toFixed(1); }
          var refs=''; for(var p=1;p<=5;p++){ var y=46-(p-1)*8; refs+='<line x1="10" y1="'+y+'" x2="86" y2="'+y+'" class="tref"/>'; }
          var svg='<svg class="tone-svg" viewBox="0 0 96 56">'+refs+'<path d="'+poly+'" class="tpath"/><circle cx="'+px(0).toFixed(1)+'" cy="'+py(0).toFixed(1)+'" r="3.6" class="tdot"/></svg>';
          var ex=t.ex;
          return '<div class="tone-card"><div class="tone-head"><span class="tone-name">'+esc(t.name)+'</span><span class="tone-mark">'+esc(t.mark)+'</span></div>'
            + svg
            + '<div class="tone-ex"><b>'+esc(ex[0])+'</b> <span class="tr">'+esc(ex[1])+'</span><br><span class="tm">'+esc(ex[2])+'</span></div>'
            + '<div class="tone-btns"><button type="button" class="tone-btn" data-tone="'+pts.join(',')+'">🔊 声調</button>'
            + '<button type="button" class="tone-btn" data-say="'+esc(ex[0])+'">🗣 例</button></div></div>';
        }).join('')
      + '</div>';
    content.addEventListener('click', function(e){
      var a=e.target.closest('[data-tone]'); if(a){ window.__tone(a.getAttribute('data-tone')); return; }
      var b=e.target.closest('[data-say]'); if(b){ speak(b.getAttribute('data-say'), L.tts, b); }
    });
  }
  var CJ = (window.CONJ||{})[code];
  var conjHtml = '';
  if(CJ){
    var cjTbl = function(tenses, forms){
      var head = '<tr><th></th>' + tenses.map(function(t){ return '<th>'+esc(t[0])+'<br><span class="tn2">'+esc(t[1])+'</span></th>'; }).join('') + '</tr>';
      var body = CJ.persons.map(function(pn,pi){
        return '<tr><th>'+esc(pn)+'</th>' + forms.map(function(row){ var f=row[pi]; var cl=(f&&f!=='—')?' class="cf" data-say="'+esc(f)+'"':''; return '<td'+cl+'>'+esc(f)+'</td>'; }).join('') + '</tr>';
      }).join('');
      return '<div class="conj-scroll"><table class="conj-table"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
    };
    var balSplit = function(n){ var nv=Math.ceil(n/4), per=Math.ceil(n/nv), out=[]; for(var i=0;i<n;i+=per){ out.push([i, Math.min(i+per,n)]); } return out; };
    var vtab = function(v){
      var grp = v.group ? '<span class="conj-grp">'+esc(v.group)+'</span>' : '';
      var views = [];
      balSplit(CJ.tenses.length).forEach(function(rng,k,ar){
        views.push({ label:(ar.length>1?'直説法 '+'①②③④'[k]:'直説法'), tenses:CJ.tenses.slice(rng[0],rng[1]), cols:v.forms.slice(rng[0],rng[1]) });
      });
      if(v.forms2 && CJ.tenses2){
        balSplit(CJ.tenses2.length).forEach(function(rng,k,ar){
          views.push({ label:(ar.length>1?'接続法・命令法 '+'①②③④'[k]:'接続法・命令法'), tenses:CJ.tenses2.slice(rng[0],rng[1]), cols:v.forms2.slice(rng[0],rng[1]) });
        });
      }
      var tabs = views.map(function(vw,i){ return '<button type="button" class="cj-tab'+(i===0?' active':'')+'" data-v="'+i+'">'+esc(vw.label)+'</button>'; }).join('');
      var bodies = views.map(function(vw,i){ return '<div class="cj-view" data-v="'+i+'"'+(i===0?'':' hidden')+'>'+cjTbl(vw.tenses, vw.cols)+'</div>'; }).join('');
      return '<div class="conj-verb"><div class="conj-h"><span class="conj-inf">'+esc(v.inf)+'</span>'+grp+'<span class="conj-mean">'+esc(v.meaning)+'</span></div>'
        + '<div class="cj-tabs">'+tabs+'</div>' + bodies + '</div>';
    };
    conjHtml = '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">動詞の活用</span><span class="sec-en">Verb conjugation</span></div>'
      + '<div class="hint">規則活用と、よく使う不規則動詞。<b>時制はタブで切り替え</b>、活用形を<b>タップすると読み上げ</b>ます。' + (CJ.note?esc(CJ.note):'') + '</div>'
      + '<div class="conj-sub">規則活用 ・ Regular</div>' + CJ.regular.map(vtab).join('')
      + '<div class="conj-sub">不規則活用 ・ Irregular</div>' + CJ.irregular.map(vtab).join('');
    content.addEventListener('click', function(e){ var c=e.target.closest('.cf[data-say]'); if(c){ speak(c.getAttribute('data-say'), L.tts, c); } });
    content.addEventListener('click', function(e){ var tab=e.target.closest('.cj-tab'); if(!tab) return; var verb=tab.closest('.conj-verb'); var vv=tab.getAttribute('data-v'); var ts=verb.querySelectorAll('.cj-tab'); for(var i=0;i<ts.length;i++){ ts[i].className='cj-tab'+(ts[i]===tab?' active':''); } var vs=verb.querySelectorAll('.cj-view'); for(var j=0;j<vs.length;j++){ vs[j].hidden=(vs[j].getAttribute('data-v')!==vv); } });
  }
  content.innerHTML =
      '<div class="lang-header"><div class="lh-chip">' + esc(L.chip) + '</div>'
      + '<div class="lh-name"><div class="lh-jp">' + esc(L.jp) + '</div>'
      + '<div class="lh-native">' + esc(L.autonym) + ' <span class="en">・ ' + esc(L.en) + '</span></div></div></div>'

    + '<dl class="facts">'
      + '<dt>地域</dt><dd>' + esc(L.region) + '</dd>'
      + '<dt>文字</dt><dd>' + esc(L.script) + '</dd>'
      + '<dt>語族</dt><dd>' + esc(L.family) + '</dd>'
      + '<dt>語順</dt><dd>' + esc(L.order) + '</dd>'
      + (tags ? '<dt>目安</dt><dd class="tagrow">' + tags + '</dd>' : '')
    + '</dl>'

    + '<a class="moji-cta" href="moji.html?code=' + L.code + '">'
      + '<div><div class="mc-t">✎ 文字を見て、なぞり書きする</div><div class="mc-d">' + esc(L.script) + ' の字母を練習</div></div>'
      + '<span class="mc-a">›</span></a>'

    + '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">あいさつ</span><span class="sec-en">Greetings</span></div>'
    + '<div class="card">' + phrasesHtml + '</div>'
    + '<div class="hint">🔊は端末の音声エンジンを使います。対応する音声が入っていない言語では再生されないことがあります。カナ読みはおおよその目安です。</div>'

    + '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">数字（1〜10）</span><span class="sec-en">Numbers</span></div>'
    + '<div class="numgrid">' + numsHtml + '</div>'

    + '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">自己紹介</span><span class="sec-en">Self-intro</span></div>'
    + '<div class="card">' + introHtml + '</div>'
    + '<div class="hint">〇〇 に名前を入れて使います。</div>'

    + patHtml

    + toneHtml

    + conjHtml

    + '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">学習のワンポイント</span><span class="sec-en">Notes</span></div>'
    + '<div class="card"><ul class="tips">' + tipsHtml + '</ul></div>'

    + '<div class="sec-head"><div class="sec-bar"></div><span class="sec-title">生活・就学の支援（多言語）</span><span class="sec-en">Support</span></div>'
    + '<div class="links">' + supportHtml + '</div>'
    + '<div class="hint">各サイトで表示言語を選べます。就学案内・相談窓口・生活情報などを母語で確認できます。</div>';
}

function link(url, name, desc){
  return '<a class="link" href="' + url + '" target="_blank" rel="noopener">'
    + '<div class="link-ic">🌐</div>'
    + '<div class="link-t"><div class="link-n">' + name + '</div><div class="link-d">' + desc + '</div></div>'
    + '<span class="link-a">›</span></a>';
}
</script>

<script>
/* === EN表示トグル === */
(function(){
  var KEY='nnh_en_off';
  var st=document.createElement('style');
  st.textContent=
    "body.hide-en .en,body.hide-en .pb-en,body.hide-en .sec-en,body.hide-en .gh-en,"
   +"body.hide-en .sh-en,body.hide-en .level-en{display:none!important;}"
   +".en-toggle{position:fixed;top:10px;right:10px;z-index:9999;font-family:inherit;font-size:11px;"
   +"font-weight:700;letter-spacing:.04em;padding:6px 11px;border-radius:999px;border:1px solid #E2DDD6;"
   +"background:rgba(255,255,255,.92);color:#1C1C1C;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);"
   +"-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent;}"
   +".en-toggle .d{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2F7168;"
   +"margin-left:6px;vertical-align:middle;}"
   +".en-toggle.off{color:#9E9890;}.en-toggle.off .d{background:#C9C2B8;}";
  document.head.appendChild(st);
  var off=false; try{ off=localStorage.getItem(KEY)==='1'; }catch(e){}
  if(off) document.body.classList.add('hide-en');
  var b=document.createElement('button'); b.type='button';
  function paint(){ var h=document.body.classList.contains('hide-en');
    b.className='en-toggle'+(h?' off':''); b.innerHTML='EN<span class="d"></span>';
    b.title=h?'英語の補助：OFF':'英語の補助：ON'; }
  b.addEventListener('click',function(){
    var h=document.body.classList.toggle('hide-en');
    try{ localStorage.setItem(KEY, h?'1':'0'); }catch(e){}
    paint();
  });
  paint(); document.body.appendChild(b);
})();
</script>
